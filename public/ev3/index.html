<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newton AI</title>
    <link rel="icon" href="https://i.imghippo.com/files/YVls8804tw.png" type="image/png">
    <style>
        :root {
            /* Dark Mode Palette */
            --bg-main: #212121; 
            --bg-sidebar: #1a1a1a;
            --bg-input: #2f2f2f;
            --bg-user-msg: #2a2a2a; 
            --bg-chip: rgba(255, 255, 255, 0.05);
            
            --text-primary: #ededed;
            --text-secondary: #a1a1a1;
            --text-tertiary: #737373;
            
            --border-color: #3d3d3d;
            --accent-color: #d97757; 
            
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-serif: Georgia, Cambria, "Times New Roman", Times, serif;
            --font-mono: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 64px; background-color: var(--bg-sidebar);
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 0; border-right: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }
        .nav-icons { display: flex; flex-direction: column; gap: 20px; flex: 1; }
        .icon-btn {
            background: none; border: none; color: var(--text-secondary); cursor: pointer;
            width: 36px; height: 36px; border-radius: 8px; display: flex;
            align-items: center; justify-content: center; transition: all 0.2s;
        }
        .icon-btn:hover { background-color: var(--bg-chip); color: var(--text-primary); }
        .icon-btn svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 1.5; fill: none; }

        .user-profile {
            position: relative; width: 32px; height: 32px; border-radius: 50%;
            background-color: #e5e5e5; color: #111; display: flex; align-items: center;
            justify-content: center; font-weight: 600; font-size: 13px; cursor: pointer;
            margin-bottom: 10px; text-transform: uppercase;
        }
        .status-dot {
            position: absolute; bottom: -2px; right: -2px; width: 10px; height: 10px;
            background-color: #4d90fe; border: 2px solid var(--bg-sidebar); border-radius: 50%;
        }

        /* --- Main Content Area --- */
        .main-content {
            flex: 1; display: flex; flex-direction: column; position: relative; height: 100vh;
        }
        .top-right-nav { position: absolute; top: 20px; right: 20px; z-index: 5; }

        /* --- Landing View --- */
        .landing-content {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 0 20px; transform: translateY(-8vh); 
            transition: opacity 0.3s ease;
        }
        .plan-badge {
            display: flex; align-items: center; gap: 8px; background-color: rgba(255, 255, 255, 0.05);
            padding: 6px 14px; border-radius: 20px; font-size: 12px; color: var(--text-secondary);
            margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05);
        }
        .plan-badge a { color: var(--text-primary); text-decoration: none; }
        .greeting {
            font-family: var(--font-serif); font-size: 40px; font-weight: 400;
            margin-bottom: 40px; display: flex; align-items: center; gap: 12px;
            letter-spacing: -0.2px; color: #f0f0f0; text-align: center;
        }
        .greeting-icon { width: 44px; height: 44px; border-radius: 8px; object-fit: contain; }

        /* --- Chat View --- */
        .chat-history {
            display: none; flex: 1; overflow-y: auto;
            padding: 60px 20px 20px 20px; flex-direction: column;
            align-items: center; width: 100%;
        }
        .message-wrapper { width: 100%; max-width: 760px; display: flex; flex-direction: column; }

        /* User Message */
        .user-message-container {
            position: relative; align-self: flex-end; background-color: var(--bg-user-msg);
            border-radius: 16px; max-width: 80%; margin-bottom: 30px; 
            overflow: hidden; border: 1px solid rgba(255,255,255,0.03);
        }
        .user-message-content {
            padding: 16px 20px; font-size: 15px; font-family: var(--font-sans);
            line-height: 1.6; white-space: pre-wrap;
        }

        /* AI Markdown Styling */
        .ai-message {
            align-self: flex-start; max-width: 100%; font-family: var(--font-serif);
            font-size: 17px; line-height: 1.7; margin-bottom: 10px; color: var(--text-primary);
            width: 100%;
        }
        .ai-message p { margin-bottom: 16px; }
        .ai-message strong { color: #fff; font-weight: bold; }
        .ai-message em { font-style: italic; }
        .ai-message h1, .ai-message h2, .ai-message h3 {
            color: var(--text-primary); margin-top: 28px; margin-bottom: 12px;
            font-family: var(--font-serif); font-weight: 600; line-height: 1.3;
        }
        .ai-message h2 { font-size: 1.4em; border-bottom: 1px solid var(--border-color); padding-bottom: 6px; }
        .ai-message ul, .ai-message ol { margin-left: 24px; margin-bottom: 16px; }
        .ai-message li { margin-bottom: 10px; padding-left: 4px; }
        .ai-message a:not(.link-preview-card) {
            color: var(--accent-color); text-decoration: none;
            border-bottom: 1px solid transparent; transition: border-color 0.2s ease;
        }
        .ai-message a:not(.link-preview-card):hover { border-bottom-color: var(--accent-color); }
        .ai-message pre {
            background-color: #1a1a1a; padding: 16px; border-radius: 8px;
            overflow-x: auto; margin-bottom: 16px; border: 1px solid var(--border-color);
            font-family: var(--font-mono); font-size: 14px;
        }
        .ai-message code { font-family: var(--font-mono); font-size: 14.5px; color: #d1d1d1; }

        /* --- Link Preview Card (Dark Theme) --- */
        .link-preview-card {
            display: flex; flex-direction: column; text-decoration: none;
            background-color: var(--bg-input); border: 1px solid var(--border-color);
            border-radius: 12px; overflow: hidden; margin-top: 16px; margin-bottom: 24px;
            width: 100%; max-width: 450px; transition: border-color 0.2s ease, background-color 0.2s ease;
            cursor: pointer;
        }
        .link-preview-card:hover { border-color: #555; background-color: #383838; }
        .link-preview-image {
            width: 100%; height: 200px; object-fit: cover; background-color: #1a1a1a;
            border-bottom: 1px solid var(--border-color);
        }
        .link-preview-content { padding: 14px 16px; display: flex; flex-direction: column; gap: 6px; font-family: var(--font-sans); }
        .link-preview-title { font-size: 16px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .link-preview-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .link-preview-footer { display: flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 12px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        .link-preview-favicon { width: 16px; height: 16px; border-radius: 3px; object-fit: contain; background-color: #fff; }

        /* --- AI Action Buttons Bar --- */
        .ai-action-bar { display: flex; gap: 8px; margin-bottom: 40px; margin-top: 4px; }
        .action-icon-btn {
            background: none; border: none; color: var(--text-tertiary);
            cursor: pointer; padding: 6px; border-radius: 6px; display: flex;
            align-items: center; justify-content: center; transition: all 0.2s;
        }
        .action-icon-btn:hover { color: var(--text-secondary); background: rgba(255,255,255,0.05); }
        .action-icon-btn svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.8; fill: none; }

        /* --- Input Area --- */
        .input-wrapper { width: 100%; max-width: 760px; margin: 0 auto; z-index: 10; }
        .input-container {
            background-color: var(--bg-input); width: 100%; border-radius: 16px;
            padding: 16px; display: flex; flex-direction: column;
            border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .input-container:focus-within { border-color: #555; }
        .message-input {
            background: transparent; border: none; color: var(--text-primary);
            font-size: 16px; resize: none; outline: none; min-height: 48px;
            max-height: 200px; font-family: var(--font-sans); padding: 4px 8px; overflow-y: auto;
        }
        .message-input::placeholder { color: var(--text-secondary); }
        .input-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
        .control-group { display: flex; align-items: center; gap: 8px; }
        .model-selector {
            display: flex; align-items: center; gap: 4px; color: var(--text-secondary);
            font-size: 12px; cursor: pointer; background: none; border: none;
            padding: 6px 10px; border-radius: 6px; transition: all 0.2s;
        }
        .model-selector:hover { background: var(--bg-chip); color: var(--text-primary); }

        /* --- Chat Bottom Fixed Container --- */
        .chat-bottom-container {
            display: none; flex-direction: column; align-items: center;
            width: 100%; padding: 10px 20px 20px 20px; background: var(--bg-main);
            flex-shrink: 0; z-index: 20;
        }
        .disclaimer { text-align: center; font-size: 11.5px; color: var(--text-tertiary); margin-top: 12px; }

        /* --- State Changes for Chat Mode --- */
        body.chat-active .landing-content { display: none; }
        body.chat-active .chat-history { display: flex; }
        body.chat-active .chat-bottom-container { display: flex; }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="nav-icons">
            <button class="icon-btn" title="Sidebar"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg></button>
            <button class="icon-btn" title="New Chat" onclick="location.reload()"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg></button>
            <button class="icon-btn" title="Search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg></button>
        </div>
        <div class="user-profile" id="userAvatar">NT<div class="status-dot"></div></div>
    </aside>

    <main class="main-content" id="appMain">
        <div class="top-right-nav">
            <button class="icon-btn" style="border-radius: 50%; background: rgba(255,255,255,0.05);" onclick="logout()">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
        </div>

        <div class="landing-content" id="landingView">
            <div class="plan-badge">Free plan &bull; <a href="#">Upgrade</a></div>
            <h1 class="greeting">
                <img src="https://i.imghippo.com/files/YVls8804tw.png" class="greeting-icon" alt="Newton"> 
                Are You Curious, <span id="userNameDisplay">User</span>?
            </h1>
            
            <div class="input-wrapper" id="mainInputWrapper">
                <div class="input-container">
                    <textarea class="message-input" id="chatInput" placeholder="Spend a learning experience with Newton" rows="1"></textarea>
                    <div class="input-controls">
                        <div class="control-group">
                            <button class="icon-btn" style="width: 28px; height: 28px;"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>
                        </div>
                        <div class="control-group">
                            <button class="model-selector">Groq Llama 3.3 <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></button>
                            <button class="icon-btn" style="width: 28px; height: 28px;"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-history" id="chatHistory">
            <div class="message-wrapper" id="messageWrapper"></div>
        </div>

        <div class="chat-bottom-container" id="chatBottomContainer">
            <div class="disclaimer">Newton is AI and can make mistakes. Please double-check responses.</div>
        </div>
    </main>

    <script>
        // --- AUTHENTICATION LOGIC ---
        window.addEventListener('DOMContentLoaded', () => {
            // Check multiple common keys in case the login system uses a different one
            const authUserString = localStorage.getItem('authUser') || localStorage.getItem('user');
            const token = localStorage.getItem('token');
            
            // If absolutely nothing is found indicating a session
            if (!authUserString && !token) {
                // Redirect to login, and tell the login page to send them back here when done
                const currentUrl = encodeURIComponent(window.location.href);
                window.location.href = `/login?redirect=${currentUrl}`;
                return;
            }

            let userName = "User";

            // Safely parse the user name
            try {
                if (authUserString) {
                    const user = JSON.parse(authUserString);
                    // Handle different JSON structures
                    userName = user.displayName || user.name || user.username || "User";
                }
            } catch (error) {
                // If it's not JSON (like just a raw string name), use the string itself
                if (typeof authUserString === 'string' && authUserString.length > 0) {
                    userName = authUserString;
                }
            }
            
            // Update UI with authenticated user's name
            document.getElementById('userNameDisplay').textContent = userName;
            
            // Create Initials for Avatar
            let initials = "U";
            if (userName && userName.length > 0) {
                const parts = userName.trim().split(' ');
                initials = parts.length > 1 
                    ? (parts[0][0] + parts[1][0]).toUpperCase()
                    : userName.substring(0, 2).toUpperCase();
            }
            document.getElementById('userAvatar').innerHTML = `${initials}<div class="status-dot"></div>`;
        });

        // Logout helper function
        function logout() {
            localStorage.removeItem('authUser');
            localStorage.removeItem('user');
            localStorage.removeItem('token');
            window.location.href = '/login';
        }

        // --- CORE CHAT LOGIC ---
        const chatInput = document.getElementById('chatInput');
        const appBody = document.body;
        const messageWrapper = document.getElementById('messageWrapper');
        const chatHistoryContainer = document.getElementById('chatHistory');
        let conversationHistory = []; 

        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if(this.value === '') this.style.height = '48px';
        });

        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const text = this.value.trim();
                if (text !== "") handleUserSubmit(text);
            }
        });

        function getApiKey() {
            let key = localStorage.getItem("groqApiKey");
            if (!key) {
                key = prompt("Please enter your Groq API Key to chat:");
                if(key) localStorage.setItem("groqApiKey", key);
            }
            return key;
        }

        function parseMarkdown(text) {
            let html = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            html = html
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
                .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>')
                .replace(/^#\s+(.+)$/gm, '<h1>$1</h1>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                .replace(/^\s*\d+\.\s+(.+)$/gm, '<ol><li>$1</li></ol>')
                .replace(/^\s*[-*]\s+(.+)$/gm, '<ul><li>$1</li></ul>')
                .replace(/<\/ul>\n<ul>/g, '') 
                .replace(/<\/ol>\n<ol>/g, '') 
                .split('\n\n').map(p => {
                    const cleanP = p.trim();
                    if (!cleanP) return '';
                    if (cleanP.startsWith('<pre') || cleanP.startsWith('<h') || cleanP.startsWith('<ul') || cleanP.startsWith('<ol')) return cleanP; 
                    return `<p>${cleanP.replace(/\n/g, '<br>')}</p>`;
                }).join('');
            return html;
        }

        // --- DYNAMIC WEB PREVIEW LOGIC ---
        async function buildLinkPreviews(messageElement) {
            const anchorTags = messageElement.querySelectorAll('a:not(.link-preview-card)');
            const links = Array.from(anchorTags).map(a => a.href);
            const uniqueLinks = [...new Set(links)].slice(0, 2); 

            for (const url of uniqueLinks) {
                try {
                    if (!url.startsWith('http')) continue;
                    const hostname = new URL(url).hostname;
                    
                    const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
                    const json = await res.json();
                    
                    if (json.status === 'success' && json.data) {
                        const data = json.data;
                        const title = data.title || hostname;
                        const desc = data.description || '';
                        const imgUrl = data.image?.url;
                        const favUrl = data.logo?.url || `https://www.google.com/s2/favicons?domain=${hostname}&sz=64`;
                        
                        const card = document.createElement('a');
                        card.href = url;
                        card.target = "_blank";
                        card.className = 'link-preview-card';
                        
                        let imgHtml = '';
                        if (imgUrl) {
                            imgHtml = `<img src="${imgUrl}" class="link-preview-image" alt="Preview" onerror="this.style.display='none'">`;
                        }
                        
                        card.innerHTML = `
                            ${imgHtml}
                            <div class="link-preview-content">
                                <div class="link-preview-title">${title}</div>
                                ${desc ? `<div class="link-preview-desc">${desc}</div>` : ''}
                                <div class="link-preview-footer">
                                    <img src="${favUrl}" class="link-preview-favicon" onerror="this.style.display='none'">
                                    <span>${hostname.replace('www.', '').toUpperCase()}</span>
                                </div>
                            </div>
                        `;
                        messageElement.appendChild(card);
                        scrollToBottom();
                    }
                } catch (e) {
                    console.error("Link preview failed for", url);
                }
            }
        }

        async function fetchAIResponse(loadingId) {
            const apiKey = getApiKey();
            if (!apiKey) return;

            try {
                let messagesToSend = [...conversationHistory];
                if (messagesToSend.length > 0 && messagesToSend[0].role !== "system") {
                    messagesToSend.unshift({ 
                        role: "system", 
                        content: "You are Newton, an intelligent and articulate AI assistant. Share relevant helpful links when providing information." 
                    });
                }

                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: messagesToSend,
                        temperature: 0.6,
                        max_tokens: 4096
                    })
                });

                if (!response.ok) throw new Error("Failed to fetch response.");

                const data = await response.json();
                const aiResponseText = data.choices[0].message.content;

                conversationHistory.push({ role: "assistant", content: aiResponseText });
                replaceLoadingWithMessage(loadingId, parseMarkdown(aiResponseText), aiResponseText);

            } catch (error) {
                replaceLoadingWithMessage(loadingId, `<p style="color: #ff8b8b;">⚠️ Error: ${error.message}</p>`, "");
            }
        }

        async function handleUserSubmit(text) {
            if (!appBody.classList.contains('chat-active')) {
                appBody.classList.add('chat-active');
                const bottomContainer = document.getElementById('chatBottomContainer');
                bottomContainer.insertBefore(document.getElementById('mainInputWrapper'), bottomContainer.firstChild);
            }

            chatInput.value = '';
            chatInput.style.height = '48px';

            appendUserMessage(text);
            conversationHistory.push({ role: "user", content: text });

            const loadingId = 'ai-msg-' + Date.now();
            appendLoading(loadingId);
            
            await fetchAIResponse(loadingId);
        }

        function appendUserMessage(text) {
            const wrapperDiv = document.createElement('div');
            wrapperDiv.className = 'user-message-container';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'user-message-content';
            contentDiv.textContent = text;
            wrapperDiv.appendChild(contentDiv);
            messageWrapper.appendChild(wrapperDiv);
            scrollToBottom();
        }

        function appendLoading(id) {
            const div = document.createElement('div');
            div.className = 'ai-message';
            div.id = id;
            div.innerHTML = `<span style="opacity:0.5;">Thinking...</span>`;
            messageWrapper.appendChild(div);
            scrollToBottom();
        }

        function replaceLoadingWithMessage(id, htmlContent, rawText) {
            const el = document.getElementById(id);
            if (el) {
                el.innerHTML = htmlContent;
                
                const actionBar = document.createElement('div');
                actionBar.className = 'ai-action-bar';
                actionBar.innerHTML = `
                    <button class="action-icon-btn" title="Copy"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
                    <button class="action-icon-btn" title="Good"><svg viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg></button>
                    <button class="action-icon-btn" title="Bad"><svg viewBox="0 0 24 24"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-2"></path></svg></button>
                    <button class="action-icon-btn" title="Retry"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg></button>
                `;
                el.parentNode.insertBefore(actionBar, el.nextSibling);

                buildLinkPreviews(el);

                const copyBtn = actionBar.querySelector('button[title="Copy"]');
                copyBtn.addEventListener('click', () => {
                    navigator.clipboard.writeText(rawText);
                    copyBtn.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
                    setTimeout(() => copyBtn.innerHTML = `<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`, 2000);
                });

                const retryBtn = actionBar.querySelector('button[title="Retry"]');
                retryBtn.addEventListener('click', () => {
                    el.remove();
                    actionBar.remove();
                    conversationHistory.pop();
                    const newId = 'ai-msg-' + Date.now();
                    appendLoading(newId);
                    fetchAIResponse(newId);
                });

                scrollToBottom();
            }
        }

        function scrollToBottom() {
            chatHistoryContainer.scrollTop = chatHistoryContainer.scrollHeight;
        }
    </script>
