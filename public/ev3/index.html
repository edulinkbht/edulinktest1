<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newton AI</title>
    <link rel="icon" href="https://i.imghippo.com/files/YVls8804tw.png" type="image/png">
    <style>
        :root {
            /* Dark Mode Palette - Claude Inspired */
            --bg-main: #212121; 
            --bg-sidebar: #1a1a1a;
            --bg-input: #2f2f2f;
            --bg-user-msg: #2f2f2f; 
            --bg-chip: rgba(255, 255, 255, 0.05);
            
            --text-primary: #e5e5e5;
            --text-secondary: #a1a1a1;
            --text-tertiary: #737373;
            
            --border-color: #3d3d3d;
            --accent-color: #d97757; /* Accent copper color */
            
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            --font-serif: Georgia, Cambria, "Times New Roman", Times, serif;
            --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Auth Overlay Modal --- */
        .auth-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
            opacity: 1; transition: opacity 0.3s ease;
        }
        .auth-card {
            width: 100%; max-width: 400px; background: var(--bg-sidebar); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center;
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .auth-logo { width: 56px; height: 56px; border-radius: 12px; margin-bottom: 16px; }
        .auth-title { font-family: var(--font-sans); font-weight: 600; font-size: 24px; color: var(--text-primary); margin-bottom: 8px; }
        .auth-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }
        .auth-input {
            width: 100%; padding: 12px 16px; margin-bottom: 16px; background: var(--bg-input); border: 1px solid var(--border-color);
            border-radius: 8px; color: var(--text-primary); font-size: 15px; outline: none;
        }
        .auth-input:focus { border-color: var(--accent-color); }
        .btn {
            width: 100%; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s;
        }
        .btn-primary { background: var(--accent-color); color: #fff; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-google { background: #fff; color: #111; margin-top: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-google:hover { background: #eee; }
        .auth-divider { display: flex; align-items: center; text-align: center; color: var(--text-tertiary); font-size: 12px; margin: 24px 0; }
        .auth-divider::before, .auth-divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
        .auth-divider:not(:empty)::before { margin-right: .25em; }
        .auth-divider:not(:empty)::after { margin-left: .25em; }
        .auth-error { color: #ff6b6b; font-size: 13px; margin-bottom: 16px; display: none; }

        /* --- Sidebar --- */
        .sidebar {
            width: 64px; background-color: var(--bg-sidebar); display: flex; flex-direction: column; align-items: center;
            padding: 20px 0; border-right: 1px solid var(--border-color); z-index: 10;
        }
        .nav-icons { display: flex; flex-direction: column; gap: 20px; flex: 1; }
        .icon-btn {
            background: none; border: none; color: var(--text-secondary); cursor: pointer; width: 36px; height: 36px;
            border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .icon-btn:hover { background-color: var(--bg-chip); color: var(--text-primary); }
        .icon-btn svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 1.5; fill: none; }
        .user-profile {
            position: relative; width: 32px; height: 32px; border-radius: 50%; background-color: #e5e5e5; color: #111;
            display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; cursor: pointer;
            margin-bottom: 10px; text-transform: uppercase;
        }
        .status-dot {
            position: absolute; bottom: -2px; right: -2px; width: 10px; height: 10px; background-color: #4d90fe;
            border: 2px solid var(--bg-sidebar); border-radius: 50%;
        }

        /* --- Main Content Area --- */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; height: 100vh; }
        .top-right-nav { position: absolute; top: 20px; right: 20px; z-index: 5; }

        /* --- Landing View --- */
        .landing-content {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 0 20px; transform: translateY(-8vh); transition: opacity 0.3s ease;
        }
        .greeting {
            font-family: var(--font-serif); font-size: 38px; font-weight: 400; margin-bottom: 40px;
            display: flex; align-items: center; gap: 12px; letter-spacing: -0.2px; color: #f0f0f0; text-align: center;
        }
        .greeting-icon { width: 40px; height: 40px; object-fit: contain; color: var(--accent-color); }

        /* --- Chat View --- */
        .chat-history {
            display: none; flex: 1; overflow-y: auto; padding: 60px 20px 20px 20px;
            flex-direction: column; align-items: center; width: 100%;
            scroll-behavior: smooth;
        }
        .message-wrapper { width: 100%; max-width: 760px; display: flex; flex-direction: column; }

        /* User Message */
        .user-message-container {
            align-self: flex-end; background-color: var(--bg-user-msg); border-radius: 16px;
            max-width: 85%; margin-bottom: 32px; overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .user-message-content { padding: 14px 18px; font-size: 15px; font-family: var(--font-sans); line-height: 1.5; white-space: pre-wrap; }

        /* AI Message (Reverted to Serif per request) */
        .ai-message {
            align-self: flex-start; max-width: 100%; font-family: var(--font-serif);
            font-size: 16px; line-height: 1.65; margin-bottom: 12px; color: var(--text-primary); width: 100%;
        }
        .ai-message p { margin-bottom: 16px; }
        .ai-message strong { color: #fff; font-weight: 600; }
        .ai-message em { font-style: italic; }
        .ai-message h1, .ai-message h2, .ai-message h3 {
            color: #fff; margin-top: 32px; margin-bottom: 16px; font-weight: 600; line-height: 1.3; font-family: var(--font-serif);
        }
        .ai-message h1 { font-size: 1.5em; }
        .ai-message h2 { font-size: 1.25em; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .ai-message h3 { font-size: 1.1em; }
        .ai-message ul, .ai-message ol { margin-left: 20px; margin-bottom: 16px; padding-left: 0; }
        .ai-message li { margin-bottom: 8px; padding-left: 4px; }
        .ai-message a:not(.link-preview-card) {
            color: var(--text-primary); text-decoration: underline; text-decoration-color: var(--text-tertiary); text-underline-offset: 3px; transition: all 0.2s ease;
        }
        .ai-message a:not(.link-preview-card):hover { text-decoration-color: var(--text-primary); }
        
        /* Inline Code */
        .ai-message code:not(.code-block code) {
            background-color: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px;
            font-family: var(--font-mono); font-size: 13.5px; color: #dcdcdc;
        }

        /* --- Collapsible "Show More" Wrapper --- */
        .collapsible-wrapper {
            position: relative;
            max-height: 250px;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .collapsible-wrapper.expanded {
            max-height: 5000px; /* Arbitrary large number to allow full expansion */
        }
        .fade-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 100px;
            background: linear-gradient(to bottom, transparent, var(--bg-main));
            display: flex; align-items: flex-end; padding-bottom: 8px;
            z-index: 2; pointer-events: none;
        }
        /* Adjusted fade for inside code blocks */
        .code-block .fade-overlay { background: linear-gradient(to bottom, transparent, #151515); padding-left: 16px; padding-bottom: 16px; }
        
        .show-more-btn {
            background: none; border: none; color: var(--text-secondary); cursor: pointer;
            font-size: 13px; font-weight: 600; pointer-events: auto; font-family: var(--font-sans);
            display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 4px; transition: color 0.2s;
        }
        .show-more-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .collapsible-wrapper.expanded .fade-overlay {
            height: auto; position: static; background: none; padding-top: 12px; pointer-events: auto;
        }

        /* --- UPDATED Code Block Container --- */
        .code-block {
            background-color: #151515; /* Deeper dark */
            border-radius: 12px;
            margin: 24px 0;
            border: 1px solid #333;
            font-family: var(--font-sans);
            position: relative;
        }
        .code-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; color: #a1a1a1;
        }
        .code-lang {
            display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .code-lang svg { width: 16px; height: 16px; fill: currentColor; }
        .code-actions { display: flex; align-items: center; gap: 6px; }
        .code-action-btn {
            background: rgba(255,255,255,0.05); border: 1px solid transparent; color: #a1a1a1; cursor: pointer;
            width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .code-action-btn:hover { background: rgba(255,255,255,0.1); border-color: #444; color: #fff; }
        .code-action-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; }
        
        .code-content-wrapper pre { margin: 0; padding: 0 16px 16px 16px; overflow-x: auto; }
        .code-content-wrapper code { font-family: var(--font-mono); font-size: 14px; color: #e5e5e5; line-height: 1.6; tab-size: 4; }

        /* --- Link Preview Cards (Skeleton & Loaded) --- */
        .link-preview-card {
            display: flex; flex-direction: row; text-decoration: none !important; background-color: transparent;
            border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden;
            margin: 20px 0; width: 100%; max-width: 600px; height: 110px;
            transition: background-color 0.2s ease, border-color 0.2s ease; cursor: pointer;
        }
        .link-preview-card:hover { background-color: rgba(255,255,255,0.02); border-color: #555; }
        .link-preview-image { width: 140px; height: 100%; object-fit: cover; background-color: #222; border-right: 1px solid var(--border-color); }
        .link-preview-content { padding: 14px 16px; display: flex; flex-direction: column; justify-content: center; flex: 1; min-width: 0; }
        .link-preview-title {
            font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: var(--font-sans);
        }
        .link-preview-desc {
            font-size: 13.5px; color: var(--text-secondary); line-height: 1.4; display: -webkit-box;
            -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px; font-family: var(--font-sans);
        }
        .link-preview-footer { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-tertiary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; font-family: var(--font-sans); }
        .link-preview-favicon { width: 14px; height: 14px; border-radius: 3px; object-fit: contain; background-color: #fff; }

        /* Link Skeleton Loader */
        .skeleton { background: #333; background: linear-gradient(110deg, #222 8%, #2a2a2a 18%, #222 33%); background-size: 200% 100%; animation: shimmer 1.5s linear infinite; }
        @keyframes shimmer { to { background-position-x: -200%; } }
        .skeleton-img { width: 140px; height: 100%; border-right: 1px solid var(--border-color); }
        .skeleton-text { height: 14px; border-radius: 4px; margin-bottom: 8px; }
        .skeleton-title { width: 70%; height: 16px; }
        .skeleton-desc { width: 90%; }
        .skeleton-footer { width: 40%; height: 12px; margin-top: auto; }

        /* --- AI Action Buttons Bar --- */
        .ai-action-bar { display: flex; gap: 6px; margin-bottom: 40px; margin-top: 4px; }
        .action-icon-btn {
            background: none; border: none; color: var(--text-tertiary); cursor: pointer; padding: 6px;
            border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .action-icon-btn:hover { color: var(--text-secondary); background: rgba(255,255,255,0.05); }
        .action-icon-btn svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.8; fill: none; }

        /* --- Input Area --- */
        .input-wrapper { width: 100%; max-width: 760px; margin: 0 auto; z-index: 10; }
        .input-container {
            background-color: var(--bg-input); width: 100%; border-radius: 16px; padding: 16px;
            display: flex; flex-direction: column; border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .input-container:focus-within { border-color: #555; }
        .message-input {
            background: transparent; border: none; color: var(--text-primary); font-size: 16px; resize: none;
            outline: none; min-height: 48px; max-height: 200px; font-family: var(--font-sans); padding: 4px 8px; overflow-y: auto; line-height: 1.5;
        }
        .message-input::placeholder { color: var(--text-tertiary); }
        .input-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
        .control-group { display: flex; align-items: center; gap: 8px; }
        .model-selector {
            display: flex; align-items: center; gap: 4px; color: var(--text-secondary); font-size: 13px; font-weight: 500;
            cursor: pointer; background: none; border: none; padding: 6px 10px; border-radius: 6px; transition: all 0.2s;
        }
        .model-selector:hover { background: var(--bg-chip); color: var(--text-primary); }

        /* --- Chat Bottom Fixed Container --- */
        .chat-bottom-container {
            display: none; flex-direction: column; align-items: center; width: 100%;
            padding: 10px 20px 20px 20px; background: var(--bg-main); flex-shrink: 0; z-index: 20;
        }
        .disclaimer { text-align: center; font-size: 12px; color: var(--text-tertiary); margin-top: 12px; }

        body.chat-active .landing-content { display: none; }
        body.chat-active .chat-history { display: flex; }
        body.chat-active .chat-bottom-container { display: flex; }

    </style>
</head>
<body>

    <div class="auth-overlay" id="authOverlay" style="display: none;">
        <div class="auth-card">
            <img src="https://i.imghippo.com/files/YVls8804tw.png" class="auth-logo" alt="Newton">
            <div class="auth-title">Welcome to Newton</div>
            <div class="auth-subtitle">Sign in to continue your learning journey</div>
            
            <div id="authError" class="auth-error"></div>
            
            <input type="email" id="emailInput" class="auth-input" placeholder="Email Address">
            <input type="password" id="passwordInput" class="auth-input" placeholder="Password">
            
            <button class="btn btn-primary" id="emailLoginBtn">Sign In / Register</button>
            
            <div class="auth-divider">OR</div>
            
            <button class="btn btn-google" id="googleLoginBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.16v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.16C1.43 8.55 1 10.22 1 12s.43 3.45 1.16 4.93l3.68-2.84z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.16 7.07l3.68 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign in with Google
            </button>
        </div>
    </div>

    <aside class="sidebar">
        <div class="nav-icons">
            <button class="icon-btn" title="Sidebar"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg></button>
            <button class="icon-btn" title="New Chat" onclick="location.reload()"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg></button>
            <button class="icon-btn" title="Search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg></button>
        </div>
        <div class="user-profile" id="userAvatar">U<div class="status-dot"></div></div>
    </aside>

    <main class="main-content" id="appMain">
        <div class="top-right-nav">
            <button class="icon-btn" style="border-radius: 50%; background: var(--bg-chip);" onclick="logoutUser()" title="Logout">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
        </div>

        <div class="landing-content" id="landingView">
            <h1 class="greeting">
                <svg class="greeting-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                Back at it, <span id="userNameDisplay">User</span>
            </h1>
            
            <div class="input-wrapper" id="mainInputWrapper">
                <div class="input-container">
                    <textarea class="message-input" id="chatInput" placeholder="Type a message or / for skills" rows="1"></textarea>
                    <div class="input-controls">
                        <div class="control-group">
                            <button class="icon-btn" style="width: 28px; height: 28px;"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>
                        </div>
                        <div class="control-group">
                            <button class="model-selector">Groq Llama 3.3 <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></button>
                            <button class="icon-btn" style="width: 28px; height: 28px;"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-history" id="chatHistory">
            <div class="message-wrapper" id="messageWrapper"></div>
        </div>

        <div class="chat-bottom-container" id="chatBottomContainer">
            <div class="disclaimer">Newton is AI and can make mistakes. Please double-check responses.</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJH79UQl0rc96Qug0DKLevO4ZI_sn8Kno",
            authDomain: "edulinki.firebaseapp.com",
            projectId: "edulinki",
            storageBucket: "edulinki.firebasestorage.app",
            messagingSenderId: "248886466474",
            appId: "1:248886466474:web:160043201a6b28bafbbdd3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();
        
        const overlay = document.getElementById('authOverlay');
        const errBox = document.getElementById('authError');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 300);
                const name = user.displayName || user.email.split('@')[0];
                updateUI(name);
            } else {
                overlay.style.display = 'flex';
                setTimeout(() => overlay.style.opacity = '1', 10);
            }
        });

        document.getElementById('googleLoginBtn').addEventListener('click', async () => {
            try { await signInWithPopup(auth, googleProvider); } 
            catch (err) { showError(err.message); }
        });

        document.getElementById('emailLoginBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value.trim();
            const pwd = document.getElementById('passwordInput').value.trim();
            if(!email || !pwd) return showError("Please enter email and password.");
            
            try {
                await signInWithEmailAndPassword(auth, email, pwd);
            } catch (err) {
                if(err.code === 'auth/invalid-credential' || err.code === 'auth/user-not-found') {
                    try { await createUserWithEmailAndPassword(auth, email, pwd); } 
                    catch(creationErr) { showError(creationErr.message); }
                } else {
                    showError(err.message);
                }
            }
        });

        window.logoutUser = async () => {
            await signOut(auth);
            localStorage.removeItem('groqApiKey'); 
            window.location.reload();
        };

        function showError(msg) {
            errBox.style.display = 'block';
            errBox.textContent = msg.replace('Firebase:', '').trim();
        }

        function updateUI(userName) {
            document.getElementById('userNameDisplay').textContent = userName;
            let initials = "U";
            if (userName && userName.length > 0) {
                const parts = userName.trim().split(' ');
                initials = parts.length > 1 ? (parts[0][0] + parts[1][0]).toUpperCase() : userName.substring(0, 2).toUpperCase();
            }
            document.getElementById('userAvatar').innerHTML = `${initials}<div class="status-dot"></div>`;
        }
    </script>

    <script>
        const chatInput = document.getElementById('chatInput');
        const appBody = document.body;
        const messageWrapper = document.getElementById('messageWrapper');
        const chatHistoryContainer = document.getElementById('chatHistory');
        let conversationHistory = []; 

        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if(this.value === '') this.style.height = '48px';
        });

        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const text = this.value.trim();
                if (text !== "") handleUserSubmit(text);
            }
        });

        function getApiKey() {
            let key = localStorage.getItem("groqApiKey");
            if (!key) {
                key = prompt("Please enter your Groq API Key to chat:");
                if(key) localStorage.setItem("groqApiKey", key);
            }
            return key;
        }

        // Collapse functionality for Show More/Less
        window.toggleCollapse = function(btn) {
            const wrapper = btn.closest('.collapsible-wrapper');
            if(wrapper.classList.contains('expanded')) {
                wrapper.classList.remove('expanded');
                btn.innerHTML = 'Show more';
            } else {
                wrapper.classList.add('expanded');
                btn.innerHTML = 'Show less';
            }
        }

        function parseMarkdown(text) {
            let html = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            // NEW Code Container matched to image
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, lang, code) {
                const language = lang ? lang.toUpperCase() : 'TEXT';
                return `<div class="code-block collapsible-wrapper">
                            <div class="code-header">
                                <div class="code-lang">
                                    <svg viewBox="0 0 24 24"><path d="M16 18l6-6-6-6M8 6l-6 6 6 6"></path></svg> ${language}
                                </div>
                                <div class="code-actions">
                                    <button class="code-action-btn" title="Copy" onclick="navigator.clipboard.writeText(this.closest('.code-block').querySelector('code').innerText);"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
                                    <button class="code-action-btn" title="Edit"><svg viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg></button>
                                    <button class="code-action-btn" title="Expand"><svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"></path></svg></button>
                                    <button class="code-action-btn" title="Run"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></button>
                                </div>
                            </div>
                            <div class="code-content-wrapper">
                                <pre><code>${code}</code></pre>
                            </div>
                        </div>`;
            });

            // Standard Markdown
            html = html
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
                .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>')
                .replace(/^#\s+(.+)$/gm, '<h1>$1</h1>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                .replace(/^\s*\d+\.\s+(.+)$/gm, '<ol><li>$1</li></ol>')
                .replace(/^\s*[-*]\s+(.+)$/gm, '<ul><li>$1</li></ul>')
                .replace(/<\/ul>\n<ul>/g, '') 
                .replace(/<\/ol>\n<ol>/g, '') 
                .split('\n\n').map(p => {
                    const cleanP = p.trim();
                    if (!cleanP) return '';
                    if (cleanP.startsWith('<div class="code-block"') || cleanP.startsWith('<h') || cleanP.startsWith('<ul') || cleanP.startsWith('<ol')) return cleanP; 
                    return `<p>${cleanP.replace(/\n/g, '<br>')}</p>`;
                }).join('');
            return html;
        }

        async function buildLinkPreviews(messageElement) {
            const anchorTags = messageElement.querySelectorAll('a:not(.link-preview-card)');
            const links = Array.from(anchorTags).map(a => a.href);
            const uniqueLinks = [...new Set(links)].slice(0, 2); 

            for (const url of uniqueLinks) {
                try {
                    if (!url.startsWith('http')) continue;
                    const hostname = new URL(url).hostname;
                    
                    // Insert Fast Skeleton Loader Immediately
                    const card = document.createElement('a');
                    card.href = url; card.target = "_blank"; card.className = 'link-preview-card';
                    card.innerHTML = `
                        <div class="skeleton skeleton-img"></div>
                        <div class="link-preview-content">
                            <div class="skeleton skeleton-text skeleton-title"></div>
                            <div class="skeleton skeleton-text skeleton-desc"></div>
                            <div class="skeleton skeleton-text skeleton-footer"></div>
                        </div>
                    `;
                    messageElement.appendChild(card);
                    scrollToBottom();

                    // Async fetch real data
                    fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`)
                        .then(res => res.json())
                        .then(json => {
                            if (json.status === 'success' && json.data) {
                                const data = json.data;
                                const title = data.title || hostname;
                                const desc = data.description || '';
                                const imgUrl = data.image?.url;
                                const favUrl = data.logo?.url || `https://www.google.com/s2/favicons?domain=${hostname}&sz=64`;
                                
                                let imgHtml = imgUrl ? `<img src="${imgUrl}" class="link-preview-image" alt="Preview" onerror="this.style.display='none'">` : '';
                                card.innerHTML = `
                                    ${imgHtml}
                                    <div class="link-preview-content">
                                        <div class="link-preview-title">${title}</div>
                                        ${desc ? `<div class="link-preview-desc">${desc}</div>` : ''}
                                        <div class="link-preview-footer">
                                            <img src="${favUrl}" class="link-preview-favicon" onerror="this.style.display='none'">
                                            <span>${hostname.replace('www.', '').toUpperCase()}</span>
                                        </div>
                                    </div>
                                `;
                            } else {
                                card.remove(); // Remove skeleton if fetch fails to find good meta
                            }
                        }).catch(() => card.remove());
                } catch (e) {
                    console.error("Link preview failed", url);
                }
            }
        }

        function applyShowMoreLogic(element) {
            // Check code blocks
            element.querySelectorAll('.code-block').forEach(block => {
                if (block.scrollHeight > 250) {
                    const fade = document.createElement('div');
                    fade.className = 'fade-overlay';
                    fade.innerHTML = `<button class="show-more-btn" onclick="toggleCollapse(this)">Show more</button>`;
                    block.appendChild(fade);
                } else {
                    block.classList.remove('collapsible-wrapper'); // Remove if not tall enough
                }
            });

            // Check overall message length for generic text fade
            if (element.scrollHeight > 600) {
                element.classList.add('collapsible-wrapper');
                const fade = document.createElement('div');
                fade.className = 'fade-overlay';
                fade.innerHTML = `<button class="show-more-btn" onclick="toggleCollapse(this)">Show more</button>`;
                element.appendChild(fade);
            }
        }

        async function fetchAIResponse(loadingId) {
            const apiKey = getApiKey();
            if (!apiKey) return;

            try {
                let messagesToSend = [...conversationHistory];
                if (messagesToSend.length > 0 && messagesToSend[0].role !== "system") {
                    messagesToSend.unshift({ role: "system", content: "You are Newton. Format text carefully." });
                }

                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: messagesToSend,
                        temperature: 0.6,
                        max_tokens: 4096
                    })
                });

                if (!response.ok) throw new Error("Failed to fetch response.");

                const data = await response.json();
                const aiResponseText = data.choices[0].message.content;

                conversationHistory.push({ role: "assistant", content: aiResponseText });
                replaceLoadingWithMessage(loadingId, parseMarkdown(aiResponseText), aiResponseText);

            } catch (error) {
                replaceLoadingWithMessage(loadingId, `<p style="color: #ff8b8b;">⚠️ Error: ${error.message}</p>`, "");
            }
        }

        function handleUserSubmit(text) {
            if (!appBody.classList.contains('chat-active')) {
                appBody.classList.add('chat-active');
                const bottomContainer = document.getElementById('chatBottomContainer');
                bottomContainer.insertBefore(document.getElementById('mainInputWrapper'), bottomContainer.firstChild);
            }

            chatInput.value = '';
            chatInput.style.height = '48px';

            appendUserMessage(text);
            conversationHistory.push({ role: "user", content: text });

            const loadingId = 'ai-msg-' + Date.now();
            appendLoading(loadingId);
            fetchAIResponse(loadingId);
        }

        function appendUserMessage(text) {
            const wrapperDiv = document.createElement('div');
            wrapperDiv.className = 'user-message-container';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'user-message-content';
            contentDiv.textContent = text;
            wrapperDiv.appendChild(contentDiv);
            messageWrapper.appendChild(wrapperDiv);
            scrollToBottom();
        }

        function appendLoading(id) {
            const div = document.createElement('div');
            div.className = 'ai-message';
            div.id = id;
            div.innerHTML = `<span style="opacity:0.5;">Thinking...</span>`;
            messageWrapper.appendChild(div);
            scrollToBottom();
        }

        function replaceLoadingWithMessage(id, htmlContent, rawText) {
            const el = document.getElementById(id);
            if (el) {
                el.innerHTML = htmlContent;
                
                // Add Claude Style Action Bar underneath
                const actionBar = document.createElement('div');
                actionBar.className = 'ai-action-bar';
                actionBar.innerHTML = `
                    <button class="action-icon-btn" title="Copy"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
                    <button class="action-icon-btn" title="Good"><svg viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg></button>
                    <button class="action-icon-btn" title="Bad"><svg viewBox="0 0 24 24"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-2"></path></svg></button>
                    <button class="action-icon-btn" title="Retry"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg></button>
                `;
                el.parentNode.insertBefore(actionBar, el.nextSibling);

                // Run Link Previews (with Skeleton loader)
                buildLinkPreviews(el);
                
                // Run Show More logic
                setTimeout(() => applyShowMoreLogic(el), 50);

                const copyBtn = actionBar.querySelector('button[title="Copy"]');
                copyBtn.addEventListener('click', () => {
                    navigator.clipboard.writeText(rawText);
                });

                const retryBtn = actionBar.querySelector('button[title="Retry"]');
                retryBtn.addEventListener('click', () => {
                    el.remove(); actionBar.remove();
                    conversationHistory.pop();
                    const newId = 'ai-msg-' + Date.now();
                    appendLoading(newId);
                    fetchAIResponse(newId);
                });

                scrollToBottom();
            }
        }

        function scrollToBottom() {
            chatHistoryContainer.scrollTop = chatHistoryContainer.scrollHeight;
        }
    </script>
</body>
</html>
