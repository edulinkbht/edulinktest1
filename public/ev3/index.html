<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Landing</title>
    <style>
        :root {
            /* Claude/Grok Dark Mode Palette */
            --bg-main: #1e1e1e;
            --bg-sidebar: #171717;
            --bg-panel: #262626;
            --bg-input: #2a2a2a;
            --bg-chip: rgba(255, 255, 255, 0.05);
            
            --text-primary: #ededed;
            --text-secondary: #a1a1a1;
            --text-tertiary: #666666;
            
            --border-color: #333333;
            --accent-color: #e59c7a; /* For the star icon */
            
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-serif: "Charter", "Bitstream Charter", "Sitka Text", Cambria, serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 60px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            border-right: 1px solid var(--border-color);
            z-index: 10;
        }

        .nav-icons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background-color: var(--bg-panel);
            color: var(--text-primary);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
        }

        .user-profile {
            position: relative;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #ddd;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .status-dot {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 10px;
            height: 10px;
            background-color: #4d90fe;
            border: 2px solid var(--bg-sidebar);
            border-radius: 50%;
        }

        /* --- Main Content (Landing) --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .top-right-nav {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .landing-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            transform: translateY(-5%);
        }

        .plan-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .plan-badge a {
            color: var(--text-primary);
            text-decoration: none;
        }

        .greeting {
            font-family: var(--font-serif);
            font-size: 42px;
            font-weight: 400;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
            color: #f0f0f0;
        }

        .greeting-icon {
            color: var(--accent-color);
            font-size: 38px;
            user-select: none;
        }

        /* --- Input Area --- */
        .input-container {
            background-color: var(--bg-input);
            width: 100%;
            max-width: 720px;
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            border: 1px solid transparent;
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
            transition: border-color 0.2s;
            margin-bottom: 24px;
        }

        .input-container:focus-within {
            border-color: var(--border-color);
        }

        .message-input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            resize: none;
            outline: none;
            min-height: 48px;
            font-family: var(--font-sans);
            padding-top: 4px;
        }

        .message-input::placeholder {
            color: var(--text-secondary);
        }

        .input-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .model-selector {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        
        .model-selector:hover {
            background: var(--bg-chip);
            color: var(--text-primary);
        }

        /* --- Action Chips --- */
        .action-chips {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 720px;
        }

        .chip {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip:hover {
            background-color: var(--bg-chip);
            color: var(--text-primary);
        }

        .chip svg {
            width: 16px;
            height: 16px;
        }

        /* --- API Key Modal --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            padding: 32px;
            border-radius: 16px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .modal-title {
            font-size: 20px;
            margin-bottom: 12px;
            font-family: var(--font-serif);
        }

        .modal-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .api-input {
            width: 100%;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 20px;
            outline: none;
        }

        .api-input:focus {
            border-color: var(--accent-color);
        }

        .save-btn {
            width: 100%;
            background-color: var(--text-primary);
            color: var(--bg-main);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .save-btn:hover {
            opacity: 0.9;
        }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="nav-icons">
            <button class="icon-btn" title="Sidebar">
                <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <button class="icon-btn" title="New Chat">
                <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
            </button>
            <button class="icon-btn" title="Search">
                <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
            </button>
            <button class="icon-btn" title="Chats">
                <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            </button>
            <button class="icon-btn" title="Artifacts">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><path d="M9 3v18M15 3v18M3 9h18M3 15h18"></path></svg>
            </button>
            <button class="icon-btn" title="Code">
                <svg viewBox="0 0 24 24"><path d="m18 16 4-4-4-4M6 8l-4 4 4 4M14.5 4l-5 16"></path></svg>
            </button>
        </div>
        <div class="user-profile">
            NT
            <div class="status-dot"></div>
        </div>
    </aside>

    <main class="main-content">
        
        <div class="top-right-nav">
            <button class="icon-btn">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </button>
        </div>

        <div class="landing-container">
            
            <div class="plan-badge">
                Free plan &bull; <a href="#">Upgrade</a>
            </div>

            <h1 class="greeting">
                <span class="greeting-icon">✴</span> Back at it, Ngawang Tshogyal Phuentshok
            </h1>
            
            <div class="input-container">
                <textarea class="message-input" placeholder="Type / for skills" rows="1"></textarea>
                
                <div class="input-controls">
                    <div class="control-group">
                        <button class="icon-btn" style="width: 24px; height: 24px;">
                            <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                        </button>
                    </div>
                    
                    <div class="control-group">
                        <button class="model-selector">
                            Sonnet 4.6 
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
                        </button>
                        <button class="icon-btn" style="width: 24px; height: 24px;">
                            <svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="action-chips">
                <button class="chip">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m16 18 6-6-6-6M8 6l-6 6 6 6"/></svg>
                    Code
                </button>
                <button class="chip">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
                    Write
                </button>
                <button class="chip">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
                    Learn
                </button>
                <button class="chip">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>
                    Life stuff
                </button>
                <button class="chip">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                    Claude's choice
                </button>
            </div>
        </div>

    </main>

    <div class="modal-overlay" id="apiModal">
        <div class="modal-content">
            <h2 class="modal-title">Welcome to Nexus AI</h2>
            <p class="modal-desc">To get started, please enter your Groq API key. Your key is stored securely in your browser's local storage.</p>
            <input type="password" class="api-input" id="apiKeyInput" placeholder="gsk_..." autocomplete="off">
            <button class="save-btn" onclick="saveApiKey()">Save API Key</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAJH79UQl0rc96Qug0DKLevO4ZI_sn8Kno",
            authDomain: "edulinki.firebaseapp.com",
            projectId: "edulinki",
            storageBucket: "edulinki.firebasestorage.app",
            messagingSenderId: "248886466474",
            appId: "1:248886466474:web:160043201a6b28bafbbdd3",
            measurementId: "G-MQBH12VL7N"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);

        // Check Login History Status
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                // User is signed out, redirect them to login page
                console.log("No user detected. Redirecting to /login...");
                window.location.href = '/login'; 
            } else {
                // User is signed in, optionally update the name here dynamically
                console.log("User is logged in:", user.email);
            }
        });
    </script>

    <script>
        // --- API KEY LOGIC ---
        document.addEventListener("DOMContentLoaded", () => {
            const savedKey = localStorage.getItem("groqApiKey");
            if (!savedKey) {
                document.getElementById("apiModal").classList.add("active");
            }
        });

        function saveApiKey() {
            const keyInput = document.getElementById("apiKeyInput").value.trim();
            if (keyInput) {
                localStorage.setItem("groqApiKey", keyInput);
                document.getElementById("apiModal").classList.remove("active");
            } else {
                alert("Please enter a valid API key.");
            }
        }

        // --- UI Interactions ---
        const textarea = document.querySelector('.message-input');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if(this.value === '') {
                this.style.height = '48px';
            }
        });
    </script>
</body>
</html>
