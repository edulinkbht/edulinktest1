<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newton</title>
    <link rel="icon" href="https://i.imghippo.com/files/YVls8804tw.png" type="image/png">
    <style>
        :root {
            /* Dark Mode Palette */
            --bg-main: #212121; 
            --bg-sidebar: #1a1a1a;
            --bg-input: #2f2f2f;
            --bg-user-msg: #2f2f2f; 
            --bg-chip: rgba(255, 255, 255, 0.05);
            
            --text-primary: #e5e5e5;
            --text-secondary: #a1a1a1;
            --text-tertiary: #737373;
            
            --border-color: #3d3d3d;
            --accent-color: #d97757; /* Accent copper color */
            
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            --font-serif: Georgia, Cambria, "Times New Roman", Times, serif;
            --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Auth Overlay Modal --- */
        .auth-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
            opacity: 1; transition: opacity 0.3s ease;
        }
        .auth-card {
            width: 100%; max-width: 400px; background: var(--bg-sidebar); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center;
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .auth-logo { width: 56px; height: 56px; border-radius: 12px; margin-bottom: 16px; }
        .auth-title { font-family: var(--font-sans); font-weight: 600; font-size: 24px; color: var(--text-primary); margin-bottom: 8px; }
        .auth-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }
        .auth-input {
            width: 100%; padding: 12px 16px; margin-bottom: 16px; background: var(--bg-input); border: 1px solid var(--border-color);
            border-radius: 8px; color: var(--text-primary); font-size: 15px; outline: none;
        }
        .auth-input:focus { border-color: var(--accent-color); }
        .btn {
            width: 100%; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s;
        }
        .btn-primary { background: var(--accent-color); color: #fff; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-google { background: #fff; color: #111; margin-top: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-google:hover { background: #eee; }
        .auth-divider { display: flex; align-items: center; text-align: center; color: var(--text-tertiary); font-size: 12px; margin: 24px 0; }
        .auth-divider::before, .auth-divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
        .auth-divider:not(:empty)::before { margin-right: .25em; }
        .auth-divider:not(:empty)::after { margin-left: .25em; }
        .auth-error { color: #ff6b6b; font-size: 13px; margin-bottom: 16px; display: none; }

        /* --- Sidebar --- */
        .sidebar {
            width: 64px; background-color: var(--bg-sidebar); display: flex; flex-direction: column; align-items: center;
            padding: 20px 0; border-right: 1px solid var(--border-color); z-index: 10;
        }
        .nav-icons { display: flex; flex-direction: column; gap: 20px; flex: 1; }
        .icon-btn {
            background: none; border: none; color: var(--text-secondary); cursor: pointer; width: 36px; height: 36px;
            border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .icon-btn:hover { background-color: var(--bg-chip); color: var(--text-primary); }
        .icon-btn svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 1.5; fill: none; }
        .user-profile {
            position: relative; width: 32px; height: 32px; border-radius: 50%; background-color: #e5e5e5; color: #111;
            display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; cursor: pointer;
            margin-bottom: 10px; text-transform: uppercase;
        }
        .status-dot {
            position: absolute; bottom: -2px; right: -2px; width: 10px; height: 10px; background-color: #4d90fe;
            border: 2px solid var(--bg-sidebar); border-radius: 50%;
        }

        /* --- Main Content Area --- */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; height: 100vh; }
        .top-right-nav { position: absolute; top: 20px; right: 20px; z-index: 5; }

        /* --- Landing View --- */
        .landing-content {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 0 20px; transform: translateY(-8vh); transition: opacity 0.3s ease;
        }
        .greeting {
            font-family: var(--font-serif); font-size: 38px; font-weight: 400; margin-bottom: 40px;
            display: flex; flex-direction: column; align-items: center; gap: 16px; letter-spacing: -0.2px; color: #f0f0f0; text-align: center;
        }
        .greeting-logo { 
            width: 44px;
            height: 44px;
            object-fit: contain;
            margin-bottom: 8px;
        }

        /* --- Chat View --- */
        .chat-history {
            display: none; flex: 1; overflow-y: auto; padding: 60px 20px 20px 20px;
            flex-direction: column; align-items: center; width: 100%;
            scroll-behavior: smooth;
        }
        .message-wrapper { width: 100%; max-width: 760px; display: flex; flex-direction: column; }

        /* User Message */
        .user-message-container {
            align-self: flex-end; background-color: var(--bg-user-msg); border-radius: 16px;
            max-width: 85%; margin-bottom: 12px; overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .user-message-content { padding: 14px 18px; font-size: 15px; font-family: var(--font-sans); line-height: 1.5; white-space: pre-wrap; }
        
        .user-action-bar {
            display: flex; gap: 4px; align-self: flex-end; margin-bottom: 32px; margin-top: 4px; opacity: 0; transition: opacity 0.2s;
        }
        .user-message-wrapper:hover .user-action-bar { opacity: 1; }
        .user-message-wrapper { display: flex; flex-direction: column; width: 100%; align-items: flex-end; }

        /* AI Message (Reverted to Serif per request) */
        .ai-message {
            align-self: flex-start; max-width: 100%; font-family: var(--font-serif);
            font-size: 16px; line-height: 1.65; margin-bottom: 12px; color: var(--text-primary); width: 100%;
        }
        .ai-message p { margin-bottom: 16px; }
        .ai-message strong { color: #fff; font-weight: 600; }
        .ai-message em { font-style: italic; }
        .ai-message h1, .ai-message h2, .ai-message h3 {
            color: #fff; margin-top: 32px; margin-bottom: 16px; font-weight: 600; line-height: 1.3; font-family: var(--font-serif);
        }
        .ai-message h1 { font-size: 1.5em; }
        .ai-message h2 { font-size: 1.25em; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .ai-message h3 { font-size: 1.1em; }
        .ai-message ul, .ai-message ol { margin-left: 20px; margin-bottom: 16px; padding-left: 0; }
        .ai-message li { margin-bottom: 8px; padding-left: 4px; }
        .ai-message a:not(.link-preview-card) {
            color: var(--text-primary); text-decoration: underline; text-decoration-color: var(--text-tertiary); text-underline-offset: 3px; transition: all 0.2s ease;
        }
        .ai-message a:not(.link-preview-card):hover { text-decoration-color: var(--text-primary); }
        
        /* Inline Code */
        .ai-message code:not(.code-block code) {
            background-color: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px;
            font-family: var(--font-mono); font-size: 13.5px; color: #dcdcdc;
        }

        /* --- Collapsible "Show More" Wrapper --- */
        .collapsible-wrapper {
            position: relative;
            max-height: 200px; /* Reduced for user questions */
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .collapsible-wrapper.expanded {
            max-height: 5000px;
        }
        .fade-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 80px;
            background: linear-gradient(to bottom, transparent, var(--bg-user-msg));
            display: flex; align-items: flex-end; justify-content: center;
            padding-bottom: 12px;
            z-index: 2; pointer-events: none;
            transition: opacity 0.3s;
        }
        /* When expanded, we still show the button at the bottom but without the fade */
        .collapsible-wrapper.expanded .fade-overlay {
            position: relative;
            height: 40px;
            background: none;
            padding-top: 8px;
            pointer-events: auto;
            opacity: 1;
        }
        
        .show-more-btn {
            background: rgba(255, 255, 255, 0.08); 
            border: 1px solid var(--border-color); 
            color: var(--text-secondary); 
            cursor: pointer;
            font-size: 12px; font-weight: 500; pointer-events: auto; font-family: var(--font-sans);
            display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; 
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        .show-more-btn:hover { 
            color: #fff; 
            background: rgba(255,255,255,0.15); 
            border-color: #666;
            transform: translateY(-1px);
        }
        .show-more-btn svg { width: 12px; height: 12px; transition: transform 0.3s; }
        .collapsible-wrapper.expanded .show-more-btn svg { transform: rotate(180deg); }

        /* Adjusted fade for inside code blocks - though we might disable it for AI as per request */
        .code-block .fade-overlay { background: linear-gradient(to bottom, transparent, #151515); }

        /* --- UPDATED Code Block Container --- */
        .code-block {
            background-color: #0d0d0d; /* Even darker */
            border-radius: 12px;
            margin: 24px 0;
            border: 1px solid #222;
            font-family: var(--font-sans);
            position: relative;
            overflow: hidden;
        }
        .code-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; border-bottom: 1px solid #1a1a1a;
            color: #a1a1a1;
        }
        .code-lang {
            display: flex; align-items: center; gap: 10px; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; color: #888;
        }
        .code-lang svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2.5; fill: none; }
        .code-actions { display: flex; align-items: center; gap: 8px; }
        .code-action-btn {
            background: #1a1a1a; border: 1px solid #2a2a2a; color: #999; cursor: pointer;
            width: 30px; height: 30px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .code-action-btn:hover { background: #252525; border-color: #444; color: #fff; transform: scale(1.05); }
        .code-action-btn.copy-success { color: #4ade80; border-color: #4ade80; }
        .code-action-btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; }
        
        .code-content-wrapper pre { 
            margin: 0; padding: 16px; overflow-x: auto; 
            background: #0d0d0d;
        }
        .code-content-wrapper code { 
            font-family: var(--font-mono); font-size: 13px; color: #d1d1d1; line-height: 1.6; tab-size: 4; 
            display: block;
        }

        .code-block.expanded-view {
            position: fixed;
            top: 50px; left: 50px; right: 50px; bottom: 50px;
            z-index: 10000;
            margin: 0;
            background: #0d0d0d;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }
        .code-block.expanded-view .code-content-wrapper pre {
            height: calc(100% - 50px);
            max-height: none;
        }

        /* Basic syntax highlight colors */
        .code-content-wrapper .token-keyword { color: #c678dd; }
        .code-content-wrapper .token-string { color: #98c379; }
        .code-content-wrapper .token-comment { color: #5c6370; font-style: italic; }
        .code-content-wrapper .token-function { color: #61afef; }
        .code-content-wrapper .token-attr { color: #d19a66; }
        .code-content-wrapper .token-tag { color: #e06c75; }

        /* --- Link Preview Cards (Skeleton & Loaded) --- */
        .link-preview-card {
            display: flex; flex-direction: row; text-decoration: none !important; background-color: transparent;
            border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden;
            margin: 20px 0; width: 100%; max-width: 600px; height: 110px;
            transition: background-color 0.2s ease, border-color 0.2s ease; cursor: pointer;
        }
        .link-preview-card:hover { background-color: rgba(255,255,255,0.02); border-color: #555; }
        .link-preview-image { width: 140px; height: 100%; object-fit: cover; background-color: #222; border-right: 1px solid var(--border-color); }
        .link-preview-content { padding: 14px 16px; display: flex; flex-direction: column; justify-content: center; flex: 1; min-width: 0; }
        .link-preview-title {
            font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: var(--font-sans);
        }
        .link-preview-desc {
            font-size: 13.5px; color: var(--text-secondary); line-height: 1.4; display: -webkit-box;
            -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px; font-family: var(--font-sans);
        }
        .link-preview-footer { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-tertiary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; font-family: var(--font-sans); }
        .link-preview-favicon { width: 14px; height: 14px; border-radius: 3px; object-fit: contain; background-color: #fff; }

        /* Link Skeleton Loader */
        .skeleton { background: #333; background: linear-gradient(110deg, #222 8%, #2a2a2a 18%, #222 33%); background-size: 200% 100%; animation: shimmer 1.5s linear infinite; }
        @keyframes shimmer { to { background-position-x: -200%; } }
        .skeleton-img { width: 140px; height: 100%; border-right: 1px solid var(--border-color); }
        .skeleton-text { height: 14px; border-radius: 4px; margin-bottom: 8px; }
        .skeleton-title { width: 70%; height: 16px; }
        .skeleton-desc { width: 90%; }
        .skeleton-footer { width: 40%; height: 12px; margin-top: auto; }

        /* --- AI Action Buttons Bar --- */
        .ai-action-bar { display: flex; gap: 6px; margin-bottom: 40px; margin-top: 4px; }
        .action-icon-btn {
            background: none; border: none; color: var(--text-tertiary); cursor: pointer; padding: 6px;
            border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .action-icon-btn:hover { color: var(--text-secondary); background: rgba(255,255,255,0.05); }
        .action-icon-btn.copy-success { color: #4ade80; }
        .action-icon-btn svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.8; fill: none; }

        /* --- Input Area --- */
        .input-wrapper { width: 100%; max-width: 760px; margin: 0 auto; z-index: 10; }
        .input-container {
            background-color: var(--bg-input); width: 100%; border-radius: 16px; padding: 16px;
            display: flex; flex-direction: column; border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .input-container:focus-within { border-color: #555; }
        .message-input {
            background: transparent; border: none; color: var(--text-primary); font-size: 16px; resize: none;
            outline: none; min-height: 48px; max-height: 200px; font-family: var(--font-sans); padding: 4px 8px; overflow-y: auto; line-height: 1.5;
        }
        .message-input::placeholder { color: var(--text-tertiary); }
        .input-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
        .control-group { display: flex; align-items: center; gap: 8px; }
        .model-selector {
            display: flex; align-items: center; gap: 4px; color: var(--text-secondary); font-size: 13px; font-weight: 500;
            cursor: pointer; background: none; border: none; padding: 6px 10px; border-radius: 6px; transition: all 0.2s;
        }
        .model-selector:hover { background: var(--bg-chip); color: var(--text-primary); }

        /* --- Chat Bottom Fixed Container --- */
        .chat-bottom-container {
            display: none; flex-direction: column; align-items: center; width: 100%;
            padding: 10px 20px 20px 20px; background: var(--bg-main); flex-shrink: 0; z-index: 20;
        }
        .disclaimer { text-align: center; font-size: 12px; color: var(--text-tertiary); margin-top: 12px; }

        /* --- Claude-like Thinking UI --- */
        .thinking-container {
            display: flex; align-items: center; gap: 10px; padding: 12px 0;
            color: var(--text-tertiary); font-family: var(--font-sans); font-size: 14px; font-weight: 500;
        }
        .thinking-icon {
            width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
        }
        .thinking-icon svg { width: 100%; height: 100%; stroke: currentColor; stroke-width: 1.5; fill: none; }
        .thinking-status { letter-spacing: 0.2px; }

        /* --- Interrupted UI --- */
        .interrupted-container {
            display: flex; align-items: center; justify-content: space-between;
            background: #1a1a1a; border: 1px solid var(--border-color); border-radius: 12px;
            padding: 12px 16px; margin: 12px 0; color: var(--text-secondary);
            font-family: var(--font-sans); font-size: 14px;
        }
        .interrupted-info { display: flex; align-items: center; gap: 10px; }
        .interrupted-info svg { width: 18px; height: 18px; color: var(--text-tertiary); }
        .retry-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border-color);
            color: var(--text-primary); padding: 6px 16px; border-radius: 8px;
            cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s;
        }
        .retry-btn:hover { background: rgba(255,255,255,0.1); border-color: #555; }

        /* --- Stop Button --- */
        #stopResponseBtn {
            display: none; background: #222; border: 1px solid #333; color: #eee;
            width: 32px; height: 32px; border-radius: 50%; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        #stopResponseBtn:hover { background: #333; border-color: #444; }
        #stopResponseBtn svg { width: 14px; height: 14px; fill: currentColor; }

        #voiceInputBtn.recording {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            animation: pulse-mic 1.5s infinite;
        }
        @keyframes pulse-mic {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        body.chat-active .landing-content { display: none; }
        body.chat-active .chat-history { display: flex; }
        body.chat-active .chat-bottom-container { display: flex; }

        /* --- EduLink AI Modal --- */
        .edulink-modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(12px);
            z-index: 10001; display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .edulink-modal {
            width: 90%; max-width: 800px; height: 80vh; background: var(--bg-sidebar); 
            border: 1px solid var(--border-color); border-radius: 24px; display: flex; flex-direction: column;
            overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            animation: modalScaleUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes modalScaleUp { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .edulink-modal-header {
            padding: 20px 24px; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .edulink-modal-title { display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 18px; }
        .edulink-modal-title img { width: 28px; height: 28px; }
        
        .edulink-modal-content { flex: 1; display: flex; overflow: hidden; }
        .edulink-modal-sidebar {
            width: 300px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column;
            background: rgba(255,255,255,0.02);
        }
        .edulink-search-box { padding: 16px; border-bottom: 1px solid var(--border-color); }
        .edulink-search-input {
            width: 100%; padding: 10px 14px; background: var(--bg-input); border: 1px solid var(--border-color);
            border-radius: 10px; color: var(--text-primary); font-size: 14px; outline: none;
        }
        .edulink-search-input:focus { border-color: var(--accent-color); }
        
        .edulink-post-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
        .edulink-post-item {
            padding: 12px; border-radius: 12px; border: 1px solid transparent; cursor: pointer;
            transition: all 0.2s; background: rgba(255,255,255,0.03);
        }
        .edulink-post-item:hover { border-color: var(--border-color); background: rgba(255,255,255,0.06); }
        .edulink-post-item.active { border-color: var(--accent-color); background: rgba(217, 119, 87, 0.1); }
        .edulink-post-author { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
        .edulink-post-snippet { font-size: 13px; color: var(--text-primary); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .edulink-main-view { flex: 1; display: flex; flex-direction: column; padding: 24px; overflow-y: auto; }
        .edulink-summary-section { margin-bottom: 32px; }
        .edulink-section-label { font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 12px; letter-spacing: 1px; }
        .edulink-summary-content { font-family: var(--font-serif); font-size: 16px; line-height: 1.6; color: var(--text-primary); }
        
        .edulink-full-post { border-top: 1px solid var(--border-color); padding-top: 24px; margin-top: 24px; }
        .edulink-full-post-content { font-size: 15px; line-height: 1.6; color: var(--text-secondary); white-space: pre-wrap; }

        function parseMarkdown(text) {
            let html = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            // NEW Code Container matched to image
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, lang, code) {
                const language = lang ? lang.toUpperCase() : 'CODE';
                
                // Basic Syntax Highlighting Logic
                let highlightedCode = code.trim();
                if (language === 'HTML' || language === 'XML') {
                    highlightedCode = highlightedCode
                        .replace(/(&lt;!--[\s\S]*?--&gt;)/g, '<span class="token-comment">$1</span>')
                        .replace(/(&lt;\/?[a-z1-6]+)/gi, '<span class="token-tag">$1</span>')
                        .replace(/([a-z-]+)=(&quot;.*?&quot;)/gi, '<span class="token-attr">$1</span>=<span class="token-string">$2</span>');
                } else {
                    highlightedCode = highlightedCode
                        .replace(/(\/\/.+)/g, '<span class="token-comment">$1</span>')
                        .replace(/\b(const|let|var|function|return|if|else|for|while|import|export|from|class|extends|new|try|catch|finally|async|await)\b/g, '<span class="token-keyword">$1</span>')
                        .replace(/(&quot;.*?&quot;|'.*?'|`.*?`)/g, '<span class="token-string">$1</span>')
                        .replace(/\b([a-z_][a-z0-9_]*)(?=\s*\()/gi, '<span class="token-function">$1</span>');
                }

                return `<div class="code-block">
                            <div class="code-header">
                                <div class="code-lang">
                                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="m18 16 4-4-4-4M6 8l-4 4 4 4"/></svg>
                                    ${language}
                                </div>
                                <div class="code-actions">
                                    <button class="code-action-btn" title="Copy" onclick="copyToClipboard(this.closest('.code-block').querySelector('code').innerText, this);">
                                        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                    </button>
                                    <button class="code-action-btn" title="Expand" onclick="this.closest('.code-block').classList.toggle('expanded-view')">
                                        <svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"></path></svg>
                                    </button>
                                    <button class="code-action-btn" title="Run" onclick="window.open().document.write(this.closest('.code-block').querySelector('code').innerText)">
                                        <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                                    </button>
                                </div>
                            </div>
                            <div class="code-content-wrapper">
                                <pre><code contenteditable="true" spellcheck="false">${highlightedCode}</code></pre>
                            </div>
                        </div>`;
            });

            // Standard Markdown
            html = html
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
                .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>')
                .replace(/^#\s+(.+)$/gm, '<h1>$1</h1>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                .replace(/^\s*\d+\.\s+(.+)$/gm, '<ol><li>$1</li></ol>')
                .replace(/^\s*[-*]\s+(.+)$/gm, '<ul><li>$1</li></ul>')
                .replace(/<\/ul>\n<ul>/g, '') 
                .replace(/<\/ol>\n<ol>/g, '') 
                .split('\n\n').map(p => {
                    const cleanP = p.trim();
                    if (!cleanP) return '';
                    if (cleanP.startsWith('<div class="code-block"') || cleanP.startsWith('<h') || cleanP.startsWith('<ul') || cleanP.startsWith('<ol')) return cleanP; 
                    return `<p>${cleanP.replace(/\n/g, '<br>')}</p>`;
                }).join('');
            return html;
        }

        async function buildLinkPreviews(messageElement) {
            const anchorTags = messageElement.querySelectorAll('a:not(.link-preview-card)');
            const links = Array.from(anchorTags).map(a => a.href);
            const uniqueLinks = [...new Set(links)].slice(0, 2); 

            for (const url of uniqueLinks) {
                try {
                    if (!url.startsWith('http')) continue;
                    const hostname = new URL(url).hostname;
                    
                    // Insert Fast Skeleton Loader Immediately
                    const card = document.createElement('a');
                    card.href = url; card.target = "_blank"; card.className = 'link-preview-card';
                    card.innerHTML = `
                        <div class="skeleton skeleton-img"></div>
                        <div class="link-preview-content">
                            <div class="skeleton skeleton-text skeleton-title"></div>
                            <div class="skeleton skeleton-text skeleton-desc"></div>
                            <div class="skeleton skeleton-text skeleton-footer"></div>
                        </div>
                    `;
                    messageElement.appendChild(card);
                    scrollToBottom();

                    // Async fetch real data
                    fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`)
                        .then(res => res.json())
                        .then(json => {
                            if (json.status === 'success' && json.data) {
                                const data = json.data;
                                const title = data.title || hostname;
                                const desc = data.description || '';
                                const imgUrl = data.image?.url;
                                const favUrl = data.logo?.url || `https://www.google.com/s2/favicons?domain=${hostname}&sz=64`;
                                
                                let imgHtml = imgUrl ? `<img src="${imgUrl}" class="link-preview-image" alt="Preview" onerror="this.style.display='none'">` : '';
                                card.innerHTML = `
                                    ${imgHtml}
                                    <div class="link-preview-content">
                                        <div class="link-preview-title">${title}</div>
                                        ${desc ? `<div class="link-preview-desc">${desc}</div>` : ''}
                                        <div class="link-preview-footer">
                                            <img src="${favUrl}" class="link-preview-favicon" onerror="this.style.display='none'">
                                            <span>${hostname.replace('www.', '').toUpperCase()}</span>
                                        </div>
                                    </div>
                                `;
                            } else {
                                card.remove(); // Remove skeleton if fetch fails to find good meta
                            }
                        }).catch(() => card.remove());
                } catch (e) {
                    console.error("Link preview failed", url);
                }
            }
        }

            }

                    signal: currentAbortController.signal,
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: messagesToSend,
                        temperature: 0.6,
                        max_tokens: 4096
                    })
                });

                if (!response.ok) throw new Error("Failed to fetch response.");

                const data = await response.json();
                const aiResponseText = data.choices[0].message.content;

                conversationHistory.push({ role: "assistant", content: aiResponseText });
                replaceLoadingWithMessage(loadingId, parseMarkdown(aiResponseText), aiResponseText);

            } catch (error) {
                if (error.name === 'AbortError') {
                    showInterruptedUI(loadingId);
                } else {
                    replaceLoadingWithMessage(loadingId, `<p style="color: #ff8b8b;">⚠️ Error: ${error.message}</p>`, "");
                }
            } finally {
                currentAbortController = null;
                stopResponseBtn.style.display = 'none';
            }
        }

        function showInterruptedUI(loadingId) {
            const el = document.getElementById(loadingId);
            if (el) {
                el.innerHTML = `
                    <div class="interrupted-container">
                        <div class="interrupted-info">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                            <span>Newton's response was interrupted</span>
                        </div>
                        <button class="retry-btn" onclick="retryLastMessage('${loadingId}')">Retry</button>
                    </div>
                `;
            }
        }

        window.retryLastMessage = function(loadingId) {
            const el = document.getElementById(loadingId);
            if (el) el.remove();
            
            // Remove last assistant message if it was interrupted
            if (conversationHistory.length > 0 && conversationHistory[conversationHistory.length-1].role === 'assistant') {
                // Do nothing if it's already there, but here it likely isn't because of AbortError
            }
            
            const lastUserMsg = conversationHistory.findLast(m => m.role === 'user');
            if (lastUserMsg) {
                const newId = 'ai-msg-' + Date.now();
                const status = determineThinkingStatus(lastUserMsg.content);
                appendLoading(newId, status);
                fetchAIResponse(newId);
            }
        }

        stopResponseBtn.addEventListener('click', () => {
            if (currentAbortController) {
                currentAbortController.abort();
            }
        });

        function handleUserSubmit(text) {
            if (!appBody.classList.contains('chat-active')) {
                appBody.classList.add('chat-active');
                const bottomContainer = document.getElementById('chatBottomContainer');
                bottomContainer.insertBefore(document.getElementById('mainInputWrapper'), bottomContainer.firstChild);
            }

            chatInput.value = '';
            chatInput.style.height = '48px';

            appendUserMessage(text);
            conversationHistory.push({ role: "user", content: text });

            const loadingId = 'ai-msg-' + Date.now();
            const status = determineThinkingStatus(text);
            appendLoading(loadingId, status);
            fetchAIResponse(loadingId);
        }

        function determineThinkingStatus(text) {
            const lower = text.toLowerCase();
            if (lower.includes('code') || lower.includes('program') || lower.includes('function') || lower.includes('script') || lower.includes('{')) return 'Coding';
            if (lower.includes('read') || lower.includes('summarize') || lower.includes('analyze') || lower.includes('check')) return 'Reading';
            if (lower.includes('write') || lower.includes('draft') || lower.includes('create') || lower.includes('essay')) return 'Writing';
            return 'Thinking';
        }

        function appendUserMessage(text) {
            const wrapper = document.createElement('div');
            wrapper.className = 'user-message-wrapper';
            
            const containerDiv = document.createElement('div');
            containerDiv.className = 'user-message-container';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'user-message-content';
            contentDiv.textContent = text;
            containerDiv.appendChild(contentDiv);
            
            // Action Bar for User Message
            const actionBar = document.createElement('div');
            actionBar.className = 'user-action-bar';
            actionBar.innerHTML = `
                <button class="action-icon-btn" title="Edit Question"><svg viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg></button>
                <button class="action-icon-btn" title="Copy Question"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
            `;
            
            wrapper.appendChild(containerDiv);
            wrapper.appendChild(actionBar);
            messageWrapper.appendChild(wrapper);
            
            // Functionality for user action buttons
            const editBtn = actionBar.querySelector('button[title="Edit Question"]');
            editBtn.addEventListener('click', () => {
                chatInput.value = text;
                chatInput.focus();
                chatInput.style.height = 'auto';
                chatInput.style.height = (chatInput.scrollHeight) + 'px';
                // Optional: remove the message from history or just allow re-editing
            });

            const copyBtn = actionBar.querySelector('button[title="Copy Question"]');
            copyBtn.addEventListener('click', () => {
                copyToClipboard(text, copyBtn);
            });

            // Apply show more logic to user message
            setTimeout(() => applyShowMoreLogic(containerDiv, 250), 50);
            
            scrollToBottom();
        }

        function appendLoading(id, status = 'Thinking') {
            const div = document.createElement('div');
            div.className = 'ai-message';
            div.id = id;
            
            let iconSVG = '<div class="thinking-icon"></div>';
            if (status === 'Coding') iconSVG = '<div class="thinking-icon"><svg viewBox="0 0 24 24"><path d="m16 18 6-6-6-6M8 6l-6 6 6 6"/></svg></div>';
            if (status === 'Reading') iconSVG = '<div class="thinking-icon"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a4 4 0 0 0-4-4H2zM22 3h-6a4 4 0 0 0-4 4v14a4 4 0 0 1 4-4h6z"/></svg></div>';
            if (status === 'Writing') iconSVG = '<div class="thinking-icon"><svg viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></div>';

            div.innerHTML = `
                <div class="thinking-container">
                    ${iconSVG}
                    <span class="thinking-status">${status}...</span>
                </div>
            `;
            messageWrapper.appendChild(div);
            scrollToBottom();
        }

        function replaceLoadingWithMessage(id, htmlContent, rawText) {
            const el = document.getElementById(id);
            if (el) {
                el.innerHTML = htmlContent;
                
                // Add Claude Style Action Bar underneath
                const actionBar = document.createElement('div');
                actionBar.className = 'ai-action-bar';
                actionBar.innerHTML = `
                    <button class="action-icon-btn" title="Copy"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
                    <button class="action-icon-btn" title="EduLink Share"><img src="https://i.imghippo.com/files/vgr8207c.png" style="width: 18px; height: 18px; filter: grayscale(1) opacity(0.7);"></button>
                    <button class="action-icon-btn" title="Good"><svg viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg></button>
                    <button class="action-icon-btn" title="Bad"><svg viewBox="0 0 24 24"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-2"></path></svg></button>
                    <button class="action-icon-btn" title="Retry"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg></button>
                `;
                el.parentNode.insertBefore(actionBar, el.nextSibling);

                // Run Link Previews (with Skeleton loader)
                buildLinkPreviews(el);
                
                const copyBtn = actionBar.querySelector('button[title="Copy"]');
                copyBtn.addEventListener('click', () => {
                    copyToClipboard(rawText, copyBtn);
                });

                const eduBtn = actionBar.querySelector('button[title="EduLink Share"]');
                eduBtn.addEventListener('click', () => {
                    openEduLinkModal(rawText);
                });

                const retryBtn = actionBar.querySelector('button[title="Retry"]');
                retryBtn.addEventListener('click', () => {
                    const lastActionBar = el.nextSibling;
                    if (lastActionBar && lastActionBar.className === 'ai-action-bar') lastActionBar.remove();
                    el.remove();
                    conversationHistory.pop();
                    const newId = 'ai-msg-' + Date.now();
                    const lastUserMsg = conversationHistory.findLast(m => m.role === 'user');
                    const status = determineThinkingStatus(lastUserMsg ? lastUserMsg.content : '');
                    appendLoading(newId, status);
                    fetchAIResponse(newId);
                });

                scrollToBottom();
            }
        }

        function scrollToBottom() {
            chatHistoryContainer.scrollTop = chatHistoryContainer.scrollHeight;
        }

        // --- EduLink Modal Logic ---
        window.openEduLinkModal = async (initialText) => {
            const modal = document.getElementById('edulinkModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.style.opacity = '1', 10);
            document.body.classList.add('modal-open');
            
            // Initial search based on post content
            const searchInput = document.getElementById('edulinkSearch');
            // Extract some keywords from initialText for search
            const keywords = initialText.split(' ').slice(0, 5).join(' ');
            searchInput.value = keywords;
            
            searchEduLinkPosts(keywords);
        };

        window.closeEduLinkModal = () => {
            const modal = document.getElementById('edulinkModal');
            modal.style.opacity = '0';
            setTimeout(() => modal.style.display = 'none', 300);
            document.body.classList.remove('modal-open');
        };

        async function searchEduLinkPosts(searchQuery) {
            const postList = document.getElementById('edulinkPostList');
            postList.innerHTML = '<div class="thinking-container" style="padding: 20px;"><span class="thinking-status">Searching posts...</span></div>';
            
            try {
                // Fetch posts from Firestore
                const q = query(collection(db, "posts"), limit(20));
                const snap = await getDocs(q);
                
                let posts = [];
                snap.forEach(doc => {
                    const data = doc.data();
                    // Simple client-side search filtering
                    if (!searchQuery || data.content.toLowerCase().includes(searchQuery.toLowerCase())) {
                        posts.push({ id: doc.id, ...data });
                    }
                });

                if (posts.length === 0) {
                    postList.innerHTML = '<div style="padding: 20px; color: var(--text-tertiary); font-size: 14px; text-align: center;">No related posts found.</div>';
                    return;
                }

                postList.innerHTML = '';
                posts.forEach(post => {
                    const div = document.createElement('div');
                    div.className = 'edulink-post-item';
                    div.innerHTML = `
                        <div class="edulink-post-author">${post.authorName || 'Anonymous'}</div>
                        <div class="edulink-post-snippet">${post.content}</div>
                    `;
                    div.onclick = () => selectEduLinkPost(post);
                    postList.appendChild(div);
                });

                // Auto-select first post
                if (posts.length > 0) selectEduLinkPost(posts[0]);

            } catch (err) {
                console.error("EduLink search error:", err);
                postList.innerHTML = '<div style="padding: 20px; color: #ff8b8b;">Error fetching posts.</div>';
            }
        }

        async function selectEduLinkPost(post) {
            // UI updates
            document.querySelectorAll('.edulink-post-item').forEach(el => el.classList.remove('active'));
            const items = document.querySelectorAll('.edulink-post-item');
            for (let item of items) {
                if (item.querySelector('.edulink-post-snippet').textContent === post.content) {
                    item.classList.add('active');
                    break;
                }
            }

            document.getElementById('edulinkFullContent').textContent = post.content;
            
            // AI Summary
            const summaryEl = document.getElementById('edulinkSummary');
            summaryEl.innerHTML = '<div class="thinking-container"><span class="thinking-status">AI is summarizing...</span></div>';
            
            const apiKey = getApiKey();
            if (!apiKey) {
                summaryEl.textContent = "API key required for AI summary.";
                return;
            }

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            { role: "system", content: "You are a concise summarizer. Summarize the following social media post in 2-3 sentences." },
                            { role: "user", content: post.content }
                        ],
                        temperature: 0.5,
                        max_tokens: 200
                    })
                });

                const data = await response.json();
                summaryEl.textContent = data.choices[0].message.content;

            } catch (err) {
                summaryEl.textContent = "Error generating summary: " + err.message;
            }
        }

        document.getElementById('edulinkSearch').addEventListener('input', (e) => {
            const val = e.target.value.trim();
            if (window.searchTimeout) clearTimeout(window.searchTimeout);
            window.searchTimeout = setTimeout(() => searchEduLinkPosts(val), 500);
        });
    </script>
</body>
</html>
