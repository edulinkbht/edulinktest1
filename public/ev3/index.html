<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Chat</title>
    <style>
        :root {
            /* Claude/Grok Dark Mode Palette */
            --bg-main: #1e1e1e;
            --bg-sidebar: #171717;
            --bg-panel: #262626;
            --bg-input: #2a2a2a;
            --bg-user-msg: #2d2d2d;
            --bg-chip: rgba(255, 255, 255, 0.05);
            
            --text-primary: #ededed;
            --text-secondary: #a1a1a1;
            --text-tertiary: #666666;
            
            --border-color: #333333;
            --accent-color: #e59c7a; /* Star icon color */
            
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-serif: "Charter", "Bitstream Charter", "Sitka Text", Cambria, serif;
            --font-mono: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 60px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            border-right: 1px solid var(--border-color);
            z-index: 10;
        }

        .nav-icons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background-color: var(--bg-panel);
            color: var(--text-primary);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
        }

        .user-profile {
            position: relative;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #ddd;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .status-dot {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 10px;
            height: 10px;
            background-color: #4d90fe;
            border: 2px solid var(--bg-sidebar);
            border-radius: 50%;
        }

        /* --- Main Content Area --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100vh;
        }

        .top-right-nav {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 5;
        }

        /* --- Landing View --- */
        .landing-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .plan-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .plan-badge a {
            color: var(--text-primary);
            text-decoration: none;
        }

        .greeting {
            font-family: var(--font-serif);
            font-size: 42px;
            font-weight: 400;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
            color: #f0f0f0;
        }

        .greeting-icon {
            color: var(--accent-color);
            font-size: 38px;
            user-select: none;
        }

        .action-chips {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 720px;
            margin-top: 24px;
        }

        .chip {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip:hover {
            background-color: var(--bg-chip);
            color: var(--text-primary);
        }

        .chip svg {
            width: 16px; height: 16px;
        }

        /* --- Chat View --- */
        .chat-history {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px 140px 20px;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .message-wrapper {
            width: 100%;
            max-width: 760px;
            display: flex;
            flex-direction: column;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--bg-user-msg);
            padding: 16px 20px;
            border-radius: 16px;
            max-width: 80%;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 24px;
            white-space: pre-wrap;
        }

        .ai-message {
            align-self: flex-start;
            max-width: 100%;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 40px;
            color: var(--text-primary);
            white-space: pre-wrap;
        }
        
        /* Loading Dots Animation */
        .typing-indicator {
            display: inline-flex;
            gap: 4px;
        }
        .typing-indicator span {
            width: 6px; height: 6px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* --- Input Area --- */
        .input-wrapper {
            width: 100%;
            max-width: 760px;
            margin: 0 auto;
            z-index: 10;
        }

        .input-container {
            background-color: var(--bg-input);
            width: 100%;
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            border: 1px solid transparent;
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
            transition: border-color 0.2s;
        }

        .input-container:focus-within {
            border-color: var(--border-color);
        }

        .message-input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            resize: none;
            outline: none;
            min-height: 48px;
            max-height: 200px;
            font-family: var(--font-sans);
            padding-top: 4px;
            overflow-y: auto;
        }

        .message-input::placeholder {
            color: var(--text-secondary);
        }

        .input-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .model-selector {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        
        .model-selector:hover {
            background: var(--bg-chip);
            color: var(--text-primary);
        }

        /* --- State Changes for Chat Mode --- */
        body.chat-active .landing-content {
            display: none;
        }
        body.chat-active .chat-history {
            display: flex;
        }
        body.chat-active .input-wrapper {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* --- API Key Modal --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            padding: 32px;
            border-radius: 16px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .modal-title {
            font-size: 20px;
            margin-bottom: 12px;
            font-family: var(--font-serif);
        }

        .modal-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .api-input {
            width: 100%;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 20px;
            outline: none;
        }

        .api-input:focus {
            border-color: var(--accent-color);
        }

        .save-btn {
            width: 100%;
            background-color: var(--text-primary);
            color: var(--bg-main);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .save-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="nav-icons">
            <button class="icon-btn" title="Sidebar"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg></button>
            <button class="icon-btn" title="New Chat" onclick="location.reload()"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg></button>
            <button class="icon-btn" title="Search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg></button>
            <button class="icon-btn" title="Chats"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></button>
        </div>
        <div class="user-profile">
            NT
            <div class="status-dot"></div>
        </div>
    </aside>

    <main class="main-content" id="appMain">
        
        <div class="top-right-nav">
            <button class="icon-btn">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </button>
        </div>

        <div class="landing-content" id="landingView">
            <div class="plan-badge">
                Free plan &bull; <a href="#">Upgrade</a>
            </div>
            <h1 class="greeting">
                <span class="greeting-icon">✴</span> Back at it, Ngawang
            </h1>
            
            <div class="input-wrapper" id="mainInputWrapper">
                <div class="input-container">
                    <textarea class="message-input" id="chatInput" placeholder="Type a message or / for skills" rows="1"></textarea>
                    
                    <div class="input-controls">
                        <div class="control-group">
                            <button class="icon-btn" style="width: 24px; height: 24px;">
                                <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                            </button>
                        </div>
                        <div class="control-group">
                            <button class="model-selector">
                                Groq Llama-3
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
                            </button>
                            <button class="icon-btn" style="width: 24px; height: 24px;">
                                <svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-chips">
                <button class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m16 18 6-6-6-6M8 6l-6 6 6 6"/></svg>Code</button>
                <button class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>Write</button>
                <button class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>Learn</button>
                <button class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="M2 12h2"/><path d="M20 12h2"/></svg>Surprise Me</button>
            </div>
        </div>

        <div class="chat-history" id="chatHistory">
            <div class="message-wrapper" id="messageWrapper">
                </div>
        </div>

    </main>

    <div class="modal-overlay" id="apiModal">
        <div class="modal-content">
            <h2 class="modal-title">Welcome to Nexus AI</h2>
            <p class="modal-desc">To start chatting, please enter your Groq API key. It will be stored locally in your browser.</p>
            <input type="password" class="api-input" id="apiKeyInput" placeholder="gsk_..." autocomplete="off">
            <button class="save-btn" onclick="saveApiKey()">Save API Key</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJH79UQl0rc96Qug0DKLevO4ZI_sn8Kno",
            authDomain: "edulinki.firebaseapp.com",
            projectId: "edulinki",
            storageBucket: "edulinki.firebasestorage.app",
            messagingSenderId: "248886466474",
            appId: "1:248886466474:web:160043201a6b28bafbbdd3",
            measurementId: "G-MQBH12VL7N"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                console.log("Not logged in. Redirecting to /login");
                // window.location.href = '/login'; // Uncomment to enable redirect
            }
        });
    </script>

    <script>
        const chatInput = document.getElementById('chatInput');
        const appBody = document.body;
        const messageWrapper = document.getElementById('messageWrapper');
        const chatHistoryContainer = document.getElementById('chatHistory');
        
        let conversationHistory = []; // Stores context for the API

        // Auto-resize textarea
        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if(this.value === '') this.style.height = '48px';
        });

        // Trigger on Enter
        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const text = this.value.trim();
                if (text !== "") {
                    handleUserSubmit(text);
                }
            }
        });

        // --- API & UI Flow ---

        function checkApiKey() {
            const key = localStorage.getItem("groqApiKey");
            if (!key) {
                document.getElementById("apiModal").classList.add("active");
                return null;
            }
            return key;
        }

        function saveApiKey() {
            const keyInput = document.getElementById("apiKeyInput").value.trim();
            if (keyInput) {
                localStorage.setItem("groqApiKey", keyInput);
                document.getElementById("apiModal").classList.remove("active");
            } else {
                alert("Please enter a valid Groq API key.");
            }
        }

        async function handleUserSubmit(text) {
            const apiKey = checkApiKey();
            if (!apiKey) return; // Stop if no key

            // 1. Enter Chat Mode UI
            if (!appBody.classList.contains('chat-active')) {
                appBody.classList.add('chat-active');
                // Move input to be attached to the main window layout visually
                document.getElementById('appMain').appendChild(document.getElementById('mainInputWrapper'));
            }

            // 2. Clear input
            chatInput.value = '';
            chatInput.style.height = '48px';

            // 3. Render User Message
            appendMessage(text, 'user');
            conversationHistory.push({ role: "user", content: text });

            // 4. Render AI Loading State
            const loadingId = 'ai-msg-' + Date.now();
            appendLoading(loadingId);

            // 5. Call API
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192", // Fast Groq model
                        messages: conversationHistory,
                        temperature: 0.7
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || "Failed to fetch response");
                }

                const data = await response.json();
                const aiResponseText = data.choices[0].message.content;

                // Update Context History
                conversationHistory.push({ role: "assistant", content: aiResponseText });
                
                // Update UI
                replaceLoadingWithMessage(loadingId, aiResponseText);

            } catch (error) {
                replaceLoadingWithMessage(loadingId, "⚠️ Error: " + error.message);
            }
        }

        // --- DOM Manipulation Helpers ---

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = sender === 'user' ? 'user-message' : 'ai-message';
            div.textContent = text;
            messageWrapper.appendChild(div);
            scrollToBottom();
        }

        function appendLoading(id) {
            const div = document.createElement('div');
            div.className = 'ai-message';
            div.id = id;
            div.innerHTML = `
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            messageWrapper.appendChild(div);
            scrollToBottom();
        }

        function replaceLoadingWithMessage(id, text) {
            const el = document.getElementById(id);
            if (el) {
                el.innerHTML = ''; 
                el.textContent = text;
                scrollToBottom();
            }
        }

        function scrollToBottom() {
            chatHistoryContainer.scrollTop = chatHistoryContainer.scrollHeight;
        }

        // Check key on load
        document.addEventListener("DOMContentLoaded", () => {
            if (!localStorage.getItem("groqApiKey")) {
                document.getElementById("apiModal").classList.add("active");
            }
        });
    </script>
</body>
</html>
