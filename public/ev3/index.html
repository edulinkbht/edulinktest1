<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newton</title>
    <link rel="icon" href="https://i.imghippo.com/files/YVls8804tw.png" type="image/png">
    <style>
        :root {
            /* Dark Mode Palette */
            --bg-main: #212121; 
            --bg-sidebar: #1a1a1a;
            --bg-input: #2f2f2f;
            --bg-user-msg: #2a2a2a; /* rgb(42, 42, 42) */
            --bg-chip: rgba(255, 255, 255, 0.05);
            
            --text-primary: #ededed;
            --text-secondary: #a1a1a1;
            --text-tertiary: #737373;
            
            --border-color: #3d3d3d;
            --accent-color: #d97757; /* Accent copper color */
            
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-serif: Georgia, Cambria, "Times New Roman", Times, serif;
            --font-mono: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 64px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            border-right: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }

        .nav-icons { display: flex; flex-direction: column; gap: 20px; flex: 1; }
        .icon-btn {
            background: none; border: none; color: var(--text-secondary); cursor: pointer;
            width: 36px; height: 36px; border-radius: 8px; display: flex;
            align-items: center; justify-content: center; transition: all 0.2s;
        }
        .icon-btn:hover { background-color: var(--bg-chip); color: var(--text-primary); }
        .icon-btn svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 1.5; fill: none; }

        .user-profile {
            position: relative; width: 32px; height: 32px; border-radius: 50%;
            background-color: #e5e5e5; color: #111; display: flex; align-items: center;
            justify-content: center; font-weight: 600; font-size: 13px; cursor: pointer;
            margin-bottom: 10px;
        }

        .status-dot {
            position: absolute; bottom: -2px; right: -2px; width: 10px; height: 10px;
            background-color: #4d90fe; border: 2px solid var(--bg-sidebar); border-radius: 50%;
        }

        /* --- Main Content Area --- */
        .main-content {
            flex: 1; display: flex; flex-direction: column; position: relative; height: 100vh;
        }

        .top-right-nav { position: absolute; top: 20px; right: 20px; z-index: 5; }

        /* --- Landing View --- */
        .landing-content {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 0 20px; transform: translateY(-8vh); 
            transition: opacity 0.3s ease;
        }

        .plan-badge {
            display: flex; align-items: center; gap: 8px; background-color: rgba(255, 255, 255, 0.05);
            padding: 6px 14px; border-radius: 20px; font-size: 12px; color: var(--text-secondary);
            margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05);
        }
        .plan-badge a { color: var(--text-primary); text-decoration: none; }

        .greeting {
            font-family: var(--font-serif); font-size: 40px; font-weight: 400;
            margin-bottom: 40px; display: flex; align-items: center; gap: 12px;
            letter-spacing: -0.2px; color: #f0f0f0;
        }
        
        .greeting-icon { 
            width: 44px; height: 44px; 
            border-radius: 8px; 
            object-fit: contain; 
        }

        .action-chips {
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
            max-width: 720px; margin-top: 20px;
        }

        .chip {
            display: flex; align-items: center; gap: 8px; background-color: transparent;
            border: 1px solid var(--border-color); color: var(--text-secondary);
            padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s;
        }
        .chip:hover { background-color: var(--bg-chip); color: var(--text-primary); }
        .chip svg { width: 14px; height: 14px; }

        /* --- Chat View --- */
        .chat-history {
            display: none; flex: 1; overflow-y: auto;
            padding: 60px 20px 20px 20px; flex-direction: column;
            align-items: center; width: 100%;
        }

        .message-wrapper { width: 100%; max-width: 760px; display: flex; flex-direction: column; }

        /* User Message with Fade & Expand */
        .user-message-container {
            position: relative; align-self: flex-end; background-color: var(--bg-user-msg);
            border-radius: 16px; max-width: 80%; margin-bottom: 30px; 
            overflow: hidden; border: 1px solid rgba(255,255,255,0.03);
        }

        .user-message-content {
            padding: 16px 20px; font-size: 15px; font-family: var(--font-sans);
            line-height: 1.6; white-space: pre-wrap;
            max-height: 150px; /* Truncation height */
            overflow: hidden; transition: max-height 0.3s ease;
        }

        .user-message-content.expanded { max-height: 5000px; padding-bottom: 20px; }

        /* PERFECTED FADE DESIGN */
        .message-fade {
            position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
            /* Matches the exact user message background color (#2a2a2a) to create a seamless fade */
            background: linear-gradient(180deg, rgba(42, 42, 42, 0) 0%, rgba(42, 42, 42, 0.9) 60%, rgba(42, 42, 42, 1) 100%);
            display: flex; align-items: flex-end; justify-content: flex-start;
            padding: 12px 20px; pointer-events: none;
            border-bottom-left-radius: 16px; border-bottom-right-radius: 16px;
        }

        .show-more-btn {
            pointer-events: auto; background: none; border: none; color: #fff;
            font-size: 14px; cursor: pointer; font-weight: 600; font-family: var(--font-sans);
            padding: 0; margin-bottom: 4px; text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            transition: color 0.2s;
        }
        .show-more-btn:hover { color: var(--accent-color); }

        /* --- AI Markdown Styling --- */
        .ai-message {
            align-self: flex-start; max-width: 100%; font-family: var(--font-serif);
            font-size: 17px; line-height: 1.7; margin-bottom: 10px; color: var(--text-primary);
            width: 100%;
        }
        
        .ai-message p { margin-bottom: 16px; }
        .ai-message strong { color: #fff; font-weight: bold; }
        .ai-message em { font-style: italic; }
        .ai-message h1, .ai-message h2, .ai-message h3 {
            color: var(--text-primary); margin-top: 28px; margin-bottom: 12px;
            font-family: var(--font-serif); font-weight: 600; line-height: 1.3;
        }
        .ai-message h1 { font-size: 1.6em; }
        .ai-message h2 { font-size: 1.4em; border-bottom: 1px solid var(--border-color); padding-bottom: 6px; }
        .ai-message h3 { font-size: 1.2em; color: #f0f0f0; }
        .ai-message ul, .ai-message ol { margin-left: 24px; margin-bottom: 16px; }
        .ai-message li { margin-bottom: 10px; padding-left: 4px; }
        .ai-message a {
            color: var(--accent-color); text-decoration: none;
            border-bottom: 1px solid transparent; transition: border-color 0.2s ease;
        }
        .ai-message a:hover { border-bottom-color: var(--accent-color); }
        .ai-message pre {
            background-color: #1a1a1a; padding: 16px; border-radius: 8px;
            overflow-x: auto; margin-bottom: 16px; border: 1px solid var(--border-color);
            font-family: var(--font-mono); font-size: 14px;
        }
        .ai-message code { font-family: var(--font-mono); font-size: 14.5px; color: #d1d1d1; }
        .ai-message :not(pre) > code {
            background-color: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px;
            color: #e59c7a; font-size: 14px;
        }

        /* --- AI Action Buttons Bar --- */
        .ai-action-bar {
            align-self: flex-start; display: flex; gap: 8px; margin-bottom: 40px; margin-top: 4px;
        }
        .action-icon-btn {
            background: none; border: none; color: var(--text-tertiary);
            cursor: pointer; padding: 6px; border-radius: 6px; display: flex;
            align-items: center; justify-content: center; transition: all 0.2s;
        }
        .action-icon-btn:hover { color: var(--text-secondary); background: rgba(255,255,255,0.05); }
        .action-icon-btn svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.8; fill: none; transition: stroke 0.2s; }
        .action-icon-btn.active { color: var(--accent-color); }

        /* --- Input Area --- */
        .input-wrapper { width: 100%; max-width: 760px; margin: 0 auto; z-index: 10; }
        .input-container {
            background-color: var(--bg-input); width: 100%; border-radius: 16px;
            padding: 16px; display: flex; flex-direction: column;
            border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: border-color 0.2s;
        }
        .input-container:focus-within { border-color: #555; }
        .message-input {
            background: transparent; border: none; color: var(--text-primary);
            font-size: 16px; resize: none; outline: none; min-height: 48px;
            max-height: 200px; font-family: var(--font-sans); padding: 4px 8px; overflow-y: auto;
        }
        .message-input::placeholder { color: var(--text-secondary); }
        .input-controls {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 8px; padding: 0 4px;
        }
        .control-group { display: flex; align-items: center; gap: 8px; }
        .model-selector {
            display: flex; align-items: center; gap: 4px; color: var(--text-secondary);
            font-size: 12px; cursor: pointer; background: none; border: none;
            padding: 6px 10px; border-radius: 6px; transition: all 0.2s;
        }
        .model-selector:hover { background: var(--bg-chip); color: var(--text-primary); }

        /* --- Chat Bottom Fixed Container --- */
        .chat-bottom-container {
            display: none; flex-direction: column; align-items: center;
            width: 100%; padding: 10px 20px 20px 20px; background: var(--bg-main);
            flex-shrink: 0; z-index: 20;
        }
        .disclaimer {
            text-align: center; font-size: 11.5px; color: var(--text-tertiary);
            font-family: var(--font-sans); margin-top: 12px;
        }

        /* --- State Changes for Chat Mode --- */
        body.chat-active .landing-content { display: none; }
        body.chat-active .chat-history { display: flex; }
        body.chat-active .chat-bottom-container { display: flex; }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="nav-icons">
            <button class="icon-btn" title="Sidebar"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg></button>
            <button class="icon-btn" title="New Chat" onclick="location.reload()"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg></button>
            <button class="icon-btn" title="Search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg></button>
        </div>
        <div class="user-profile" id="userAvatar">NT<div class="status-dot"></div></div>
    </aside>

    <main class="main-content" id="appMain">
        
        <div class="top-right-nav">
            <button class="icon-btn" style="border-radius: 50%; background: rgba(255,255,255,0.05);">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </button>
        </div>

        <div class="landing-content" id="landingView">
            <div class="plan-badge">Free plan &bull; <a href="#">Upgrade</a></div>
            
            <h1 class="greeting">
                <img src="https://i.imghippo.com/files/YVls8804tw.png" class="greeting-icon" alt="Newton"> 
                Are You Curious, <span id="userNameDisplay">User</span>?
            </h1>
            
            <div class="input-wrapper" id="mainInputWrapper">
                <div class="input-container">
                    <textarea class="message-input" id="chatInput" placeholder="Spend a learning experience with Newton" rows="1"></textarea>
                    
                    <div class="input-controls">
                        <div class="control-group">
                            <button class="icon-btn" style="width: 28px; height: 28px;">
                                <svg viewBox="0 0 24 24" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                            </button>
                        </div>
                        <div class="control-group">
                            <button class="model-selector">Groq Llama 3.3 <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></button>
                            <button class="icon-btn" style="width: 28px; height: 28px;">
                                <svg viewBox="0 0 24 24" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-chips">
                <button class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m16 18 6-6-6-6M8 6l-6 6 6 6"/></svg>Code</button>
                <button class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>Write</button>
            </div>
        </div>

        <div class="chat-history" id="chatHistory">
            <div class="message-wrapper" id="messageWrapper"></div>
        </div>

        <div class="chat-bottom-container" id="chatBottomContainer">
            <div class="disclaimer">Newton is AI and can make mistakes. Please double-check responses.</div>
        </div>
    </main>

    <script>
        const chatInput = document.getElementById('chatInput');
        const appBody = document.body;
        const messageWrapper = document.getElementById('messageWrapper');
        const chatHistoryContainer = document.getElementById('chatHistory');
        const userNameDisplay = document.getElementById('userNameDisplay');
        const userAvatar = document.getElementById('userAvatar');
        let conversationHistory = []; 

        // Set User Name Logic
        window.addEventListener('DOMContentLoaded', () => {
            let storedName = localStorage.getItem('newtonUserName');
            if (!storedName) {
                storedName = prompt("What is your name?") || "Friend";
                localStorage.setItem('newtonUserName', storedName);
            }
            userNameDisplay.textContent = storedName;
            
            // Set initials for the avatar
            let initials = storedName.substring(0, 2).toUpperCase();
            if(storedName.includes(' ')) {
                const parts = storedName.split(' ');
                initials = (parts[0][0] + parts[1][0]).toUpperCase();
            }
            userAvatar.innerHTML = `${initials}<div class="status-dot"></div>`;
        });

        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if(this.value === '') this.style.height = '48px';
        });

        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const text = this.value.trim();
                if (text !== "") handleUserSubmit(text);
            }
        });

        function getApiKey() {
            let key = localStorage.getItem("groqApiKey");
            if (!key) {
                key = prompt("Welcome! Please enter your Groq API Key to chat:");
                if(key) localStorage.setItem("groqApiKey", key);
            }
            return key;
        }

        function parseMarkdown(text) {
            let html = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            html = html
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
                .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>')
                .replace(/^#\s+(.+)$/gm, '<h1>$1</h1>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                .replace(/^\s*\d+\.\s+(.+)$/gm, '<ol><li>$1</li></ol>')
                .replace(/^\s*[-*]\s+(.+)$/gm, '<ul><li>$1</li></ul>')
                .replace(/<\/ul>\n<ul>/g, '') 
                .replace(/<\/ol>\n<ol>/g, '') 
                .split('\n\n').map(p => {
                    const cleanP = p.trim();
                    if (!cleanP) return '';
                    if (cleanP.startsWith('<pre') || cleanP.startsWith('<h') || cleanP.startsWith('<ul') || cleanP.startsWith('<ol')) {
                        return cleanP; 
                    }
                    return `<p>${cleanP.replace(/\n/g, '<br>')}</p>`;
                }).join('');
            return html;
        }

        async function fetchAIResponse(loadingId) {
            const apiKey = getApiKey();
            if (!apiKey) return;

            try {
                let messagesToSend = [...conversationHistory];
                if (messagesToSend.length > 0 && messagesToSend[0].role !== "system") {
                    messagesToSend.unshift({ 
                        role: "system", 
                        content: "You are Newton, an intelligent and articulate AI assistant. Structure your responses beautifully using standard markdown formatting." 
                    });
                }

                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: messagesToSend,
                        temperature: 0.6,
                        max_tokens: 4096
                    })
                });

                if (!response.ok) throw new Error("Failed to fetch response.");

                const data = await response.json();
                const aiResponseText = data.choices[0].message.content;

                conversationHistory.push({ role: "assistant", content: aiResponseText });
                replaceLoadingWithMessage(loadingId, parseMarkdown(aiResponseText), aiResponseText);

            } catch (error) {
                replaceLoadingWithMessage(loadingId, `<p style="color: #ff8b8b;">⚠️ Error: ${error.message}</p>`, "");
            }
        }

        async function handleUserSubmit(text) {
            if (!appBody.classList.contains('chat-active')) {
                appBody.classList.add('chat-active');
                const bottomContainer = document.getElementById('chatBottomContainer');
                bottomContainer.insertBefore(document.getElementById('mainInputWrapper'), bottomContainer.firstChild);
            }

            chatInput.value = '';
            chatInput.style.height = '48px';

            appendUserMessage(text);
            conversationHistory.push({ role: "user", content: text });

            const loadingId = 'ai-msg-' + Date.now();
            appendLoading(loadingId);
            
            await fetchAIResponse(loadingId);
        }

        function appendUserMessage(text) {
            const wrapperDiv = document.createElement('div');
            wrapperDiv.className = 'user-message-container';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'user-message-content';
            contentDiv.textContent = text;
            
            wrapperDiv.appendChild(contentDiv);
            messageWrapper.appendChild(wrapperDiv);

            requestAnimationFrame(() => {
                // If text is larger than the max-height, add the perfect fade
                if (contentDiv.scrollHeight > 150) {
                    const fadeDiv = document.createElement('div');
                    fadeDiv.className = 'message-fade';
                    
                    const btn = document.createElement('button');
                    btn.className = 'show-more-btn';
                    btn.textContent = 'Show more';
                    
                    btn.onclick = () => {
                        contentDiv.classList.add('expanded');
                        fadeDiv.style.opacity = '0'; 
                        setTimeout(() => fadeDiv.remove(), 300);
                    };
                    
                    fadeDiv.appendChild(btn);
                    wrapperDiv.appendChild(fadeDiv);
                }
                scrollToBottom();
            });
        }

        function appendLoading(id) {
            const div = document.createElement('div');
            div.className = 'ai-message';
            div.id = id;
            div.innerHTML = `<span style="opacity:0.5;">Thinking...</span>`;
            messageWrapper.appendChild(div);
            scrollToBottom();
        }

        function replaceLoadingWithMessage(id, htmlContent, rawText) {
            const el = document.getElementById(id);
            if (el) {
                el.innerHTML = htmlContent;
                
                const actionBar = document.createElement('div');
                actionBar.className = 'ai-action-bar';
                actionBar.innerHTML = `
                    <button class="action-icon-btn" title="Copy">
                        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                    <button class="action-icon-btn" title="Good response">
                        <svg viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>
                    </button>
                    <button class="action-icon-btn" title="Bad response">
                        <svg viewBox="0 0 24 24"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-2"></path></svg>
                    </button>
                    <button class="action-icon-btn" title="Retry">
                        <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                    </button>
                `;
                
                el.parentNode.insertBefore(actionBar, el.nextSibling);

                const copyBtn = actionBar.querySelector('button[title="Copy"]');
                copyBtn.addEventListener('click', () => {
                    navigator.clipboard.writeText(rawText || el.innerText);
                    copyBtn.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
                    setTimeout(() => {
                        copyBtn.innerHTML = `<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
                    }, 2000);
                });

                const likeBtn = actionBar.querySelector('button[title="Good response"]');
                const dislikeBtn = actionBar.querySelector('button[title="Bad response"]');
                
                likeBtn.addEventListener('click', () => {
                    likeBtn.classList.toggle('active');
                    dislikeBtn.classList.remove('active');
                });
                
                dislikeBtn.addEventListener('click', () => {
                    dislikeBtn.classList.toggle('active');
                    likeBtn.classList.remove('active');
                });

                const retryBtn = actionBar.querySelector('button[title="Retry"]');
                retryBtn.addEventListener('click', () => {
                    el.remove();
                    actionBar.remove();
                    if (conversationHistory.length > 0 && conversationHistory[conversationHistory.length - 1].role === "assistant") {
                        conversationHistory.pop();
                    }
                    const newLoadingId = 'ai-msg-' + Date.now();
                    appendLoading(newLoadingId);
                    fetchAIResponse(newLoadingId);
                });

                scrollToBottom();
            }
        }

        function scrollToBottom() {
            chatHistoryContainer.scrollTop = chatHistoryContainer.scrollHeight;
        }
    </script>
</body>
</html>
