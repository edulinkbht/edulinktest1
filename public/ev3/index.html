<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Chat</title>
    <style>
        :root {
            /* Claude Dark Mode Palette */
            --bg-main: #212121; 
            --bg-sidebar: #1a1a1a;
            --bg-input: #2f2f2f;
            --bg-user-msg: #2f2f2f;
            --bg-chip: rgba(255, 255, 255, 0.05);
            
            --text-primary: #ededed;
            --text-secondary: #a1a1a1;
            --text-tertiary: #737373;
            
            --border-color: #3d3d3d;
            --accent-color: #d97757; /* Claude copper color */
            
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-serif: Georgia, Cambria, "Times New Roman", Times, serif;
            --font-mono: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 64px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            border-right: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }

        .nav-icons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background-color: var(--bg-chip);
            color: var(--text-primary);
        }

        .icon-btn svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 1.5; fill: none; }

        .user-profile {
            position: relative; width: 32px; height: 32px; border-radius: 50%;
            background-color: #e5e5e5; color: #111; display: flex; align-items: center;
            justify-content: center; font-weight: 600; font-size: 13px; cursor: pointer;
            margin-bottom: 10px;
        }

        .status-dot {
            position: absolute; bottom: -2px; right: -2px; width: 10px; height: 10px;
            background-color: #4d90fe; border: 2px solid var(--bg-sidebar); border-radius: 50%;
        }

        /* --- Main Content Area --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100vh;
        }

        .top-right-nav {
            position: absolute; top: 20px; right: 20px; z-index: 5;
        }

        /* --- Landing View --- */
        .landing-content {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 0 20px; transform: translateY(-8vh); 
            transition: opacity 0.3s ease;
        }

        .plan-badge {
            display: flex; align-items: center; gap: 8px; background-color: rgba(255, 255, 255, 0.05);
            padding: 6px 14px; border-radius: 20px; font-size: 12px; color: var(--text-secondary);
            margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05);
        }
        .plan-badge a { color: var(--text-primary); text-decoration: none; }

        .greeting {
            font-family: var(--font-serif); font-size: 40px; font-weight: 400;
            margin-bottom: 40px; display: flex; align-items: center; gap: 12px;
            letter-spacing: -0.2px; color: #f0f0f0;
        }
        .greeting-icon { color: var(--accent-color); font-size: 34px; user-select: none; }

        .action-chips {
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
            max-width: 720px; margin-top: 20px;
        }

        .chip {
            display: flex; align-items: center; gap: 8px; background-color: transparent;
            border: 1px solid var(--border-color); color: var(--text-secondary);
            padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s;
        }
        .chip:hover { background-color: var(--bg-chip); color: var(--text-primary); }
        .chip svg { width: 14px; height: 14px; }

        /* --- Chat View --- */
        .chat-history {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 60px 20px 20px 20px; /* Reduced bottom padding */
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .message-wrapper {
            width: 100%; max-width: 760px; display: flex; flex-direction: column;
        }

        .user-message {
            align-self: flex-end; background-color: var(--bg-user-msg);
            padding: 16px 20px; border-radius: 16px; max-width: 80%;
            font-size: 15px; font-family: var(--font-sans); line-height: 1.6;
            margin-bottom: 30px; white-space: pre-wrap;
        }

        /* --- AI Markdown Styling --- */
        .ai-message {
            align-self: flex-start; max-width: 100%; font-family: var(--font-serif);
            font-size: 17px; line-height: 1.7; margin-bottom: 40px; color: var(--text-primary);
        }
        
        .ai-message p { margin-bottom: 16px; }
        .ai-message strong { color: #fff; font-weight: bold; }
        .ai-message em { font-style: italic; }
        
        /* Headings */
        .ai-message h1, .ai-message h2, .ai-message h3 {
            color: var(--text-primary); margin-top: 28px; margin-bottom: 12px;
            font-family: var(--font-serif); font-weight: 600; line-height: 1.3;
        }
        .ai-message h1 { font-size: 1.6em; }
        .ai-message h2 { font-size: 1.4em; border-bottom: 1px solid var(--border-color); padding-bottom: 6px; }
        .ai-message h3 { font-size: 1.2em; color: #f0f0f0; }

        /* Lists for Steps */
        .ai-message ul, .ai-message ol { margin-left: 24px; margin-bottom: 16px; }
        .ai-message li { margin-bottom: 10px; padding-left: 4px; }
        .ai-message li > p { margin-bottom: 0; }

        /* Links */
        .ai-message a {
            color: var(--accent-color);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease;
        }
        .ai-message a:hover { border-bottom-color: var(--accent-color); }
        
        /* Code blocks */
        .ai-message pre {
            background-color: #1a1a1a; padding: 16px; border-radius: 8px;
            overflow-x: auto; margin-bottom: 16px; border: 1px solid var(--border-color);
            font-family: var(--font-mono); font-size: 14px;
        }
        .ai-message code { font-family: var(--font-mono); font-size: 14.5px; color: #d1d1d1; }
        .ai-message :not(pre) > code {
            background-color: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px;
            color: #e59c7a; font-size: 14px;
        }

        /* --- Input Area --- */
        .input-wrapper {
            width: 100%; max-width: 760px; margin: 0 auto; z-index: 10;
        }

        .input-container {
            background-color: var(--bg-input); width: 100%; border-radius: 16px;
            padding: 16px; display: flex; flex-direction: column;
            border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: border-color 0.2s;
        }
        .input-container:focus-within { border-color: #555; }

        .message-input {
            background: transparent; border: none; color: var(--text-primary);
            font-size: 16px; resize: none; outline: none; min-height: 48px;
            max-height: 200px; font-family: var(--font-sans); padding: 4px 8px; overflow-y: auto;
        }
        .message-input::placeholder { color: var(--text-secondary); }

        .input-controls {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 8px; padding: 0 4px;
        }
        .control-group { display: flex; align-items: center; gap: 8px; }

        .model-selector {
            display: flex; align-items: center; gap: 4px; color: var(--text-secondary);
            font-size: 12px; cursor: pointer; background: none; border: none;
            padding: 6px 10px; border-radius: 6px; transition: all 0.2s;
        }
        .model-selector:hover { background: var(--bg-chip); color: var(--text-primary); }

        /* --- Chat Bottom Fixed Container (Prevents Overlap) --- */
        .chat-bottom-container {
            display: none; /* Flex when chat is active */
            flex-direction: column; align-items: center;
            width: 100%; padding: 10px 20px 20px 20px;
            background: var(--bg-main); /* Solid background to block chat text scrolling behind it */
            flex-shrink: 0; z-index: 20;
        }

        /* Disclaimer */
        .disclaimer {
            text-align: center; font-size: 11.5px; color: var(--text-tertiary);
            font-family: var(--font-sans); margin-top: 12px;
        }

        /* --- State Changes for Chat Mode --- */
        body.chat-active .landing-content { display: none; }
        body.chat-active .chat-history { display: flex; }
        body.chat-active .chat-bottom-container { display: flex; }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="nav-icons">
            <button class="icon-btn" title="Sidebar"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg></button>
            <button class="icon-btn" title="New Chat" onclick="location.reload()"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg></button>
            <button class="icon-btn" title="Search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg></button>
        </div>
        <div class="user-profile">NT<div class="status-dot"></div></div>
    </aside>

    <main class="main-content" id="appMain">
        
        <div class="top-right-nav">
            <button class="icon-btn" style="border-radius: 50%; background: rgba(255,255,255,0.05);">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </button>
        </div>

        <div class="landing-content" id="landingView">
            <div class="plan-badge">Free plan &bull; <a href="#">Upgrade</a></div>
            <h1 class="greeting"><span class="greeting-icon">✴</span> Back at it, Ngawang</h1>
            
            <div class="input-wrapper" id="mainInputWrapper">
                <div class="input-container">
                    <textarea class="message-input" id="chatInput" placeholder="Type a message or / for skills" rows="1"></textarea>
                    
                    <div class="input-controls">
                        <div class="control-group">
                            <button class="icon-btn" style="width: 28px; height: 28px;">
                                <svg viewBox="0 0 24 24" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                            </button>
                        </div>
                        <div class="control-group">
                            <button class="model-selector">Groq Llama 3.3 <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></button>
                            <button class="icon-btn" style="width: 28px; height: 28px;">
                                <svg viewBox="0 0 24 24" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-chips">
                <button class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m16 18 6-6-6-6M8 6l-6 6 6 6"/></svg>Code</button>
                <button class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>Write</button>
            </div>
        </div>

        <div class="chat-history" id="chatHistory">
            <div class="message-wrapper" id="messageWrapper"></div>
        </div>

        <div class="chat-bottom-container" id="chatBottomContainer">
            <div class="disclaimer">Claude is AI and can make mistakes. Please double-check responses.</div>
        </div>

    </main>

    <script>
        const chatInput = document.getElementById('chatInput');
        const appBody = document.body;
        const messageWrapper = document.getElementById('messageWrapper');
        const chatHistoryContainer = document.getElementById('chatHistory');
        
        let conversationHistory = []; 

        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if(this.value === '') this.style.height = '48px';
        });

        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const text = this.value.trim();
                if (text !== "") handleUserSubmit(text);
            }
        });

        function getApiKey() {
            let key = localStorage.getItem("groqApiKey");
            if (!key) {
                key = prompt("Welcome! Please enter your Groq API Key to chat:");
                if(key) localStorage.setItem("groqApiKey", key);
            }
            return key;
        }

        // --- UPGRADED CLAUDE-STYLE MARKDOWN PARSER ---
        function parseMarkdown(text) {
            // Escape HTML tags to prevent breaking
            let html = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            html = html
                // Code blocks
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                // Inline code
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                // Headers (H3, H2, H1) - Fixed the raw ### issue
                .replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
                .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>')
                .replace(/^#\s+(.+)$/gm, '<h1>$1</h1>')
                // Bold and Italics
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                // Links - Clickable Claude-style links
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>')
                // Ordered Lists (1. Step one...)
                .replace(/^\s*\d+\.\s+(.+)$/gm, '<ol><li>$1</li></ol>')
                // Unordered Lists (- Item one...)
                .replace(/^\s*[-*]\s+(.+)$/gm, '<ul><li>$1</li></ul>')
                // Merge adjacent lists
                .replace(/<\/ul>\n<ul>/g, '') 
                .replace(/<\/ol>\n<ol>/g, '') 
                // Paragraphs (wrap text that isn't a block element)
                .split('\n\n').map(p => {
                    const cleanP = p.trim();
                    if (!cleanP) return '';
                    if (cleanP.startsWith('<pre') || cleanP.startsWith('<h') || cleanP.startsWith('<ul') || cleanP.startsWith('<ol')) {
                        return cleanP; 
                    }
                    return `<p>${cleanP.replace(/\n/g, '<br>')}</p>`;
                }).join('');

            return html;
        }

        async function handleUserSubmit(text) {
            const apiKey = getApiKey();
            if (!apiKey) return; 

            // Switch layout to chat mode
            if (!appBody.classList.contains('chat-active')) {
                appBody.classList.add('chat-active');
                // Move input inside the bottom container to prevent overlap
                const bottomContainer = document.getElementById('chatBottomContainer');
                bottomContainer.insertBefore(document.getElementById('mainInputWrapper'), bottomContainer.firstChild);
            }

            chatInput.value = '';
            chatInput.style.height = '48px';

            appendMessage(text, 'user');
            conversationHistory.push({ role: "user", content: text });

            const loadingId = 'ai-msg-' + Date.now();
            appendLoading(loadingId);

            try {
                let messagesToSend = [...conversationHistory];
                if (messagesToSend.length === 1) {
                    messagesToSend.unshift({ 
                        role: "system", 
                        // Tell AI to format beautifully using standard markdown steps
                        content: "You are an intelligent, articulate AI assistant. Always structure your responses beautifully. Use standard markdown for headings (#, ##, ###), bold text for emphasis, and use numbered lists (1., 2.) for steps. Provide highly accurate, nuanced answers." 
                    });
                }

                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: messagesToSend,
                        temperature: 0.6,
                        max_tokens: 4096
                    })
                });

                if (!response.ok) throw new Error("Failed to fetch response.");

                const data = await response.json();
                const aiResponseText = data.choices[0].message.content;

                conversationHistory.push({ role: "assistant", content: aiResponseText });
                replaceLoadingWithMessage(loadingId, parseMarkdown(aiResponseText));

            } catch (error) {
                replaceLoadingWithMessage(loadingId, `<p style="color: #ff8b8b;">⚠️ Error: ${error.message}</p>`);
            }
        }

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = sender === 'user' ? 'user-message' : 'ai-message';
            div.textContent = text;
            messageWrapper.appendChild(div);
            scrollToBottom();
        }

        function appendLoading(id) {
            const div = document.createElement('div');
            div.className = 'ai-message';
            div.id = id;
            div.innerHTML = `<span style="opacity:0.5;">Thinking...</span>`;
            messageWrapper.appendChild(div);
            scrollToBottom();
        }

        function replaceLoadingWithMessage(id, htmlContent) {
            const el = document.getElementById(id);
            if (el) {
                el.innerHTML = htmlContent;
                scrollToBottom();
            }
        }

        function scrollToBottom() {
            // Scroll the history container
            chatHistoryContainer.scrollTop = chatHistoryContainer.scrollHeight;
        }
    </script>
</body>
</html>
