<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edulinki | English-Dzongkha AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen">

    <div id="authPanel" class="flex flex-col items-center justify-center h-screen space-y-4">
        <h1 class="text-3xl font-bold text-orange-500">Edulinki AI</h1>
        <button onclick="login()" class="bg-white text-black px-6 py-3 rounded-xl font-bold flex items-center gap-2">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Sign in with Google
        </button>
    </div>

    <div id="chatPanel" class="hidden max-w-4xl mx-auto p-6">
        <header class="flex justify-between border-b border-slate-700 pb-4 mb-6">
            <h2 class="text-xl font-bold">Dzongkha Dictionary AI</h2>
            <p id="status" class="text-xs text-yellow-500 italic">⏳ Loading 2023 Dictionary...</p>
        </header>

        <div class="space-y-4 mb-6">
            <input type="password" id="groqKey" placeholder="Paste Groq API Key here" class="w-full bg-slate-800 p-3 rounded-lg text-sm border border-slate-700">
            <div class="flex gap-2">
                <input type="text" id="userInput" placeholder="Ask in English (e.g., What is 'Active'?)" class="flex-1 bg-slate-950 p-4 rounded-xl border border-slate-700 outline-none focus:ring-2 focus:ring-orange-500">
                <button onclick="askAI()" class="bg-orange-600 px-8 rounded-xl font-bold">Ask</button>
            </div>
        </div>

        <div id="response" class="bg-slate-800 p-6 rounded-2xl border border-slate-700 min-h-[100px]">
            <p class="text-slate-400 italic">Your answer will appear here in Dzongkha...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 1. Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAJH79UQl0rc96Qug0DKLevO4ZI_sn8Kno",
            authDomain: "edulinki.firebaseapp.com",
            projectId: "edulinki",
            storageBucket: "edulinki.firebasestorage.app",
            messagingSenderId: "248886466474",
            appId: "1:248886466474:web:160043201a6b28bafbbdd3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.login = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authPanel').classList.add('hidden');
                document.getElementById('chatPanel').classList.remove('hidden');
                loadDictionary();
            }
        });

        // 2. Load & Parse the 2023 Dictionary
        let dictText = "";
        async function loadDictionary() {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            const url = 'public/data/Eng-Dzo_Dictionary_2023_3ead53caad0798894c3908a9aedceb84.pdf';
            
            try {
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                let fullContent = "";
                for(let i=1; i<=Math.min(pdf.numPages, 100); i++) { // Scanning first 100 pages for speed
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    fullContent += content.items.map(item => item.str).join(" ") + "\n";
                }
                dictText = fullContent;
                document.getElementById('status').innerText = "✅ 2023 Dictionary Integrated";
                document.getElementById('status').className = "text-xs text-green-500 italic";
            } catch (e) {
                document.getElementById('status').innerText = "❌ Error loading PDF file";
            }
        }

        // 3. AI Logic with Context Injection
        window.askAI = async () => {
            const query = document.getElementById('userInput').value;
            const key = document.getElementById('groqKey').value;
            const display = document.getElementById('response');

            if (!query || !key) return alert("Please provide input and API key");

            display.innerHTML = "<span class='animate-pulse'>Searching DDC 2023 records...</span>";

            // Find relevant snippet in PDF
            const index = dictText.toLowerCase().indexOf(query.toLowerCase());
            let contextSnippet = (index !== -1) ? dictText.substring(index - 500, index + 1500) : "No direct match found in dictionary.";

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { 
                                role: "system", 
                                content: `You are a Dzongkha Translation Expert. 
                                IMPORTANT: Use ONLY the provided dictionary text to answer. 
                                DO NOT use Tibetan script. Use Dzongkha (Uchen) as found in the 2023 edition.
                                Dictionary Context: ${contextSnippet}` 
                            },
                            { role: "user", content: `Translate this word or answer this question using Dzongkha only: ${query}` }
                        ],
                        temperature: 0 // Keep it strict to the dictionary
                    })
                });
                const data = await res.json();
                display.innerText = data.choices[0].message.content;
            } catch (err) {
                display.innerText = "Error: API key invalid or connection failed.";
            }
        }
    </script>
</body>
</html>
