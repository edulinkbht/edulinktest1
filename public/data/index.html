<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edulinki | Official Dzongkha AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic&display=swap');
        .dzongkha-text { font-family: 'Noto Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <div id="authScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950 p-4">
        <div class="max-w-md w-full bg-slate-900 border border-slate-800 p-8 rounded-3xl text-center shadow-2xl">
            <h1 class="text-4xl font-bold text-orange-500 mb-2">Edulinki AI</h1>
            <p class="text-slate-400 mb-8">Bhutan's Open-Source Grammar & Dictionary AI</p>
            <button id="loginBtn" class="w-full bg-white text-black font-bold py-4 rounded-xl flex items-center justify-center gap-3 hover:bg-slate-200 transition-all">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6" alt="Google">
                Sign in with Google
            </button>
        </div>
    </div>

    <div id="mainApp" class="hidden opacity-0 transition-opacity duration-500 max-w-4xl mx-auto p-6">
        <header class="flex justify-between items-center mb-10 border-b border-slate-800 pb-6">
            <div>
                <h2 class="text-2xl font-bold text-orange-500">Edulinki Translator</h2>
                <div id="pdfStatus" class="text-xs text-yellow-500 italic mt-1 animate-pulse">
                    ⏳ Synchronizing with 2023 DDC Dictionary...
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="setGroqKey()" class="text-xs bg-slate-800 px-3 py-2 rounded border border-slate-700 hover:bg-slate-700 transition">Update Groq Key</button>
                <button id="logoutBtn" class="text-xs text-red-400 font-bold hover:text-red-300">LOGOUT</button>
            </div>
        </header>

        <main class="space-y-6">
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
                <label class="block text-sm font-medium text-slate-400 mb-3">Enter English Phrase to Translate:</label>
                <div class="flex flex-col md:flex-row gap-3">
                    <input type="text" id="userInput" class="flex-1 bg-slate-950 border border-slate-700 p-4 rounded-xl text-lg outline-none focus:border-orange-500 transition" placeholder="e.g. Bhutan is a beautiful country...">
                    <button id="translateBtn" class="bg-orange-600 hover:bg-orange-500 px-8 py-4 rounded-xl font-bold text-lg transition flex items-center justify-center gap-2">
                        Translate
                        <div id="loader" class="hidden animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></div>
                    </button>
                </div>
            </div>

            <div id="resultBox" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 border-l-4 border-l-orange-600 shadow-2xl">
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Dzongkha (Uchen) Output</h3>
                    <div id="output" class="dzongkha-text text-3xl leading-loose text-orange-50 whitespace-pre-wrap"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 1. Firebase Initialization
        const firebaseConfig = {
            apiKey: "AIzaSyAJH79UQl0rc96Qug0DKLevO4ZI_sn8Kno",
            authDomain: "edulinki.firebaseapp.com",
            projectId: "edulinki",
            storageBucket: "edulinki.firebasestorage.app",
            messagingSenderId: "248886466474",
            appId: "1:248886466474:web:160043201a6b28bafbbdd3",
            measurementId: "G-MQBH12VL7N"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // UI Variables
        const authScreen = document.getElementById('authScreen');
        const mainApp = document.getElementById('mainApp');
        const pdfStatus = document.getElementById('pdfStatus');

        // 2. Auth Listeners
        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
                setTimeout(() => mainApp.classList.add('opacity-100'), 50);
                checkGroqKey();
                loadDictionary();
            } else {
                authScreen.classList.remove('hidden');
                mainApp.classList.add('hidden');
                mainApp.classList.remove('opacity-100');
            }
        });

        // 3. Groq API Key Handling
        window.setGroqKey = () => {
            const key = prompt("Enter your Groq API Key (gsk_...):");
            if (key) localStorage.setItem('groq_api_key', key);
        };
        function checkGroqKey() {
            if (!localStorage.getItem('groq_api_key')) setGroqKey();
        }

        // 4. Load PDF Dictionary
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        let dictText = "";

        async function loadDictionary() {
            try {
                // Ensure the PDF is in the public/data folder on your server!
                const url = '/data/Eng-Dzo_Dictionary_2023_3ead53caad0798894c3908a9aedceb84.pdf';
                const response = await fetch(url);
                const buffer = await response.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(buffer).promise;
                
                let text = "";
                // Load first 1500 pages for the dictionary context
                for (let i = 1; i <= Math.min(pdf.numPages, 1500); i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(s => s.str).join(" ") + "\n";
                }
                dictText = text;
                pdfStatus.innerHTML = `<span class="text-green-500">✅ 2023 DDC Dictionary Active</span>`;
                pdfStatus.classList.remove('animate-pulse');
            } catch (error) {
                console.error(error);
                pdfStatus.innerHTML = `<span class="text-red-500">❌ Error: PDF not found in /data/ folder</span>`;
                pdfStatus.classList.remove('animate-pulse');
            }
        }

        // 5. AI Translation Logic with Grammar Enforcement
        document.getElementById('translateBtn').onclick = async () => {
            const query = document.getElementById('userInput').value.trim();
            const key = localStorage.getItem('groq_api_key');
            const output = document.getElementById('output');
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('resultBox');

            if (!query) return;
            if (!key) return setGroqKey();
            if (!dictText) return alert("Please wait for the dictionary to finish loading.");

            loader.classList.remove('hidden');
            resultBox.classList.remove('hidden');
            output.innerText = "Analyzing grammar and fetching dictionary records...";

            // Find context in PDF
            const index = dictText.toLowerCase().indexOf(query.toLowerCase());
            let context = "Word not directly found, use standard open-source Dzongkha knowledge.";
            if (index !== -1) {
                context = dictText.substring(Math.max(0, index - 800), index + 1500);
            }

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            {
                                role: "system",
                                content: `You are the Edulinki Dzongkha Translation Engine. 
                                INSTRUCTIONS:
                                1. Output strictly in the Dzongkha Uchen script. Do NOT use Romanized English or Tibetan.
                                2. Apply proper Dzongkha grammar rules (Subject-Object-Verb architecture, correct use of genitive/ergative particles like གི་/གིས་).
                                3. Make the sentence logically structured, natural, and respectful.
                                4. Use the following vocabulary data from the official 2023 DDC dictionary if applicable:
                                [DICTIONARY DATA: ${context}]
                                
                                Provide ONLY the translated Dzongkha text.`
                            },
                            { role: "user", content: `Translate: "${query}"` }
                        ],
                        temperature: 0.1
                    })
                });

                const data = await response.json();
                output.innerText = data.choices[0].message.content;
            } catch (err) {
                output.innerText = "Error connecting to Llama-3 AI. Check your Groq Key.";
            } finally {
                loader.classList.add('hidden');
            }
        };
    </script>
</body>
</html>
