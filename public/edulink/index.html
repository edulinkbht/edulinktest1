<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education Platform Landing Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { display: none; }
        html, body {
            -ms-overflow-style: none;
            scrollbar-width: none;
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #1a1919;
            overflow-x: hidden;
        }
        .hero-heading {
            letter-spacing: -0.03em;
            line-height: 1.1;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative bg-white">

    <!-- Header / Nav -->
    <nav class="fixed top-0 flex items-center justify-between px-6 py-4 md:px-10 w-full z-[100] bg-white">
        <div class="flex items-center gap-10">
            <div class="flex items-center gap-2 cursor-pointer">
                <img src="https://i.imghippo.com/files/vgr8207c.png" alt="Edulink Logo" class="h-8 w-auto object-contain">
            </div>
            
            <div class="hidden lg:flex items-center gap-6 text-[15px] text-gray-700 font-medium">
                <a href="#" class="hover:text-black transition-colors">Newton</a>
                <a href="#" class="hover:text-black transition-colors">Research Center</a>
                <a href="#" class="hover:text-black transition-colors">About</a>
                <a href="#" class="hover:text-black transition-colors">Newsroom</a>
                <a href="#" class="hover:text-black transition-colors">Terms</a>
            </div>
        </div>

        <div class="flex items-center gap-6 text-[15px] font-medium">
            <button class="hidden md:block text-gray-500 hover:text-black transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
            </button>
            <a href="#" class="hidden md:block text-gray-700 hover:text-black transition-colors">Contact team</a>
            <a href="#" class="hidden md:block text-gray-700 hover:text-black transition-colors">Log in</a>
            <button class="bg-[#1a1919] text-white px-5 py-2.5 rounded-full hover:bg-black transition-colors">
                Try EduLink
            </button>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center pt-28 w-full">
        
        <div class="text-center max-w-4xl mx-auto z-10 relative mt-12 md:mt-20 px-4">
            <h1 class="hero-heading text-[52px] md:text-[72px] lg:text-[80px] font-bold text-[#1a1919] mb-6">
                Making Education Fun <br> Through Interaction
            </h1>
            <p class="text-[18px] md:text-[20px] text-gray-800 mb-10 max-w-3xl mx-auto leading-relaxed">
                Making the first social media platform that helps users with their education and promoting e-learning.
            </p>
            
            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <button class="w-full sm:w-auto bg-[#1a1919] text-white px-8 py-3.5 rounded-full text-lg font-medium hover:bg-black transition-colors">
                    Try EduLink
                </button>
                <button class="w-full sm:w-auto bg-white text-[#1a1919] border border-gray-300 px-8 py-3.5 rounded-full text-lg font-medium hover:border-gray-400 transition-colors">
                    View demo
                </button>
            </div>
        </div>

        <!-- Main Video Section -->
        <div class="mt-20 w-full max-w-[1200px] mx-auto px-6 relative flex flex-col items-center mb-16">
            <div class="w-full bg-white rounded-2xl flex flex-col overflow-hidden relative border border-gray-100 shadow-sm">
                <video 
                    src="https://res.cloudinary.com/dcpuyfslg/video/upload/v1777390038/The_Gravitas._1_amv65f.mp4"
                    class="w-full h-auto object-cover block"
                    autoplay 
                    muted 
                    loop 
                    playsinline
                    alt="Edulink AI Teammate Interface"
                >
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>

        <div id="brands-section" class="w-full max-w-[1200px] mx-auto px-6 pb-24 flex items-center justify-center">
            <div class="flex items-center justify-center gap-6 md:gap-12 flex-wrap">
                <div class="text-gray-400 font-semibold text-[13px] md:text-[15px] uppercase tracking-[0.15em] mr-2 md:mr-4">
                    Trusted by
                </div>
                <div class="font-extrabold text-[20px] md:text-[24px] tracking-tight text-[#1a1919]">
                    The Royal Academy
                </div>
                <div class="font-extrabold text-[20px] md:text-[24px] tracking-tight text-[#1a1919]">
                    Druk Gyalpo's Institute
                </div>
                <div class="font-extrabold text-[20px] md:text-[24px] tracking-tight text-[#1a1919]">
                    Newton
                </div>
                <div class="font-extrabold text-[20px] md:text-[24px] tracking-tight text-[#1a1919]">
                    Gravitas
                </div>
            </div>
        </div>

        <!-- Carousel Section remains the same -->
        <div class="w-full min-h-screen bg-white py-20 flex flex-col items-center justify-center overflow-hidden">
            <div class="relative w-full max-w-[1400px] flex justify-center items-center px-4 md:px-20">
                <button id="prevBtn" class="absolute left-4 md:left-10 z-50 w-14 h-14 bg-white rounded-full border border-gray-200 hover:bg-gray-50 text-[#1a1919] transition-transform hover:scale-105 flex items-center justify-center">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <button id="nextBtn" class="absolute right-4 md:right-10 z-50 w-14 h-14 bg-white rounded-full border border-gray-200 hover:bg-gray-50 text-[#1a1919] transition-transform hover:scale-105 flex items-center justify-center">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>

                <div id="carousel-track" class="relative w-full max-w-[1100px] h-[420px] md:h-[500px] flex justify-center items-center">
                </div>
            </div>

            <div id="carousel-caption" class="mt-6 text-center px-6 max-w-md mx-auto">
                <p id="caption-desc" class="text-[#1a1919] text-sm md:text-base font-medium"></p>
            </div>
        </div>

    </main>

    <script>
        // Your existing carousel script (unchanged)
        const slideData = [
            { img: "https://i.imghippo.com/files/TbzP6437Kk.jpg", desc: "Making the beta version of Edulink and making beta users try it to improve the system." },
            { img: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80", desc: "Build your academic network" },
            { img: "https://images.unsplash.com/photo-1434030216411-0b793f4b4173?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80", desc: "Access endless materials" },
            { img: "https://images.unsplash.com/photo-1524178232363-1fb2b075b655?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80", desc: "Learn from the experts" },
            { img: "https://images.unsplash.com/photo-1531482615713-2afd69097998?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80", desc: "24/7 intelligent tutoring" }
        ];

        let currentIndex = 0;
        const track = document.getElementById('carousel-track');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function createCardHTML(slide) {
            return `
                <div class="flex-grow w-full h-full overflow-hidden rounded-[24px]">
                    <img src="${slide.img}" class="w-full h-full object-cover transition-transform duration-700 hover:scale-105" alt="">
                </div>
            `;
        }

        function updateCaption() {
            document.getElementById('caption-desc').textContent = slideData[currentIndex].desc;
        }

        function updateCarousel() {
            track.innerHTML = '';
            const total = slideData.length;

            slideData.forEach((slide, i) => {
                let offset = i - currentIndex;
                if (offset < -Math.floor(total / 2)) offset += total;
                if (offset > Math.floor(total / 2)) offset -= total;

                const card = document.createElement('div');
                card.className = 'absolute top-1/2 -translate-y-1/2 h-full rounded-[24px] overflow-hidden bg-white shadow-xl transition-all duration-500 ease-in-out flex flex-col will-change-transform';

                if (offset === 0) {
                    card.classList.add('w-[85%]', 'md:w-[45%]', 'z-30', 'scale-100', 'blur-none', 'opacity-100', 'translate-x-0');
                } else if (offset === -1) {
                    card.classList.add('w-[75%]', 'md:w-[40%]', 'z-10', 'scale-[0.85]', 'blur-[4px]', 'opacity-60', '-translate-x-[60%]', 'md:-translate-x-[80%]', 'cursor-pointer');
                    card.onclick = () => moveCarousel(-1);
                } else if (offset === 1) {
                    card.classList.add('w-[75%]', 'md:w-[40%]', 'z-10', 'scale-[0.85]', 'blur-[4px]', 'opacity-60', 'translate-x-[60%]', 'md:translate-x-[80%]', 'cursor-pointer');
                    card.onclick = () => moveCarousel(1);
                } else {
                    card.classList.add('w-[70%]', 'md:w-[40%]', 'z-0', 'scale-75', 'blur-xl', 'opacity-0', 'pointer-events-none');
                }

                card.innerHTML = createCardHTML(slide);
                track.appendChild(card);
            });

            updateCaption();
        }

        function moveCarousel(direction) {
            currentIndex = (currentIndex + direction + slideData.length) % slideData.length;
            updateCarousel();
        }

        prevBtn.addEventListener('click', () => moveCarousel(-1));
        nextBtn.addEventListener('click', () => moveCarousel(1));

        updateCarousel();
    </script>
</body>
</html>
