<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetterGram</title>
    <style>
        :root {
            --bg-color: #f4f6f8;
            --card-bg: rgba(255, 255, 255, 0.8);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        #app {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 2px solid #e5e7eb;
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-size: 24px; color: var(--primary); }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: var(--primary-hover); }

        #upload-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            display: none; /* Hidden until logged in */
        }

        .input-group { margin-bottom: 15px; }
        
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            margin-top: 5px;
        }

        .post-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .post-header {
            display: flex;
            align-items: center;
            padding: 15px;
            font-weight: bold;
        }
        
        .post-header img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .post-image {
            width: 100%;
            max-height: 600px;
            object-fit: cover;
            display: block;
        }

        .post-caption { padding: 15px; }
        .post-caption span { font-weight: bold; margin-right: 8px; }

        /* Hide sections initially */
        #feed { display: none; }
        #login-btn { display: block; }
        #logout-btn { display: none; }
    </style>
</head>
<body>

    <div id="app">
        <header>
            <h1>BetterGram✨</h1>
            <button id="login-btn">Login with Google</button>
            <button id="logout-btn">Logout</button>
        </header>

        <main>
            <section id="upload-section">
                <h3>Create a Post</h3>
                <div class="input-group">
                    <input type="file" id="image-input" accept="image/*">
                </div>
                <div class="input-group">
                    <input type="text" id="caption-input" placeholder="Write a caption...">
                </div>
                <button id="post-btn">Upload Post</button>
                <p id="upload-status" style="color: var(--primary); font-size: 14px;"></p>
            </section>

            <section id="feed">
                </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyAJH79UQl0rc96Qug0DKLevO4ZI_sn8Kno",
            authDomain: "edulinki.firebaseapp.com",
            projectId: "edulinki",
            storageBucket: "edulinki.firebasestorage.app",
            messagingSenderId: "248886466474",
            appId: "1:248886466474:web:160043201a6b28bafbbdd3",
            measurementId: "G-MQBH12VL7N"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // DOM Elements
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const uploadSection = document.getElementById('upload-section');
        const feedSection = document.getElementById('feed');
        const postBtn = document.getElementById('post-btn');
        const imageInput = document.getElementById('image-input');
        const captionInput = document.getElementById('caption-input');
        const uploadStatus = document.getElementById('upload-status');

        let currentUser = null;

        // --- AUTHENTICATION ---
        const provider = new GoogleAuthProvider();

        loginBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider).catch(err => alert(err.message));
        });

        logoutBtn.addEventListener('click', () => {
            signOut(auth).catch(err => alert(err.message));
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'block';
                uploadSection.style.display = 'block';
                feedSection.style.display = 'block';
                loadFeed();
            } else {
                currentUser = null;
                loginBtn.style.display = 'block';
                logoutBtn.style.display = 'none';
                uploadSection.style.display = 'none';
                feedSection.style.display = 'none';
                feedSection.innerHTML = ''; // Clear feed
            }
        });

        // --- UPLOAD LOGIC ---
        postBtn.addEventListener('click', async () => {
            const file = imageInput.files[0];
            const caption = captionInput.value;

            if (!file) return alert('Please select an image!');
            if (!currentUser) return alert('You must be logged in!');

            uploadStatus.innerText = "Uploading image...";
            postBtn.disabled = true;

            try {
                // 1. Upload Image to Storage
                const storageRef = ref(storage, `posts/${currentUser.uid}/${Date.now()}_${file.name}`);
                const uploadTask = await uploadBytesResumable(storageRef, file);
                const downloadURL = await getDownloadURL(uploadTask.ref);

                uploadStatus.innerText = "Saving post...";

                // 2. Save Post Data to Firestore
                await addDoc(collection(db, "posts"), {
                    imageUrl: downloadURL,
                    caption: caption,
                    userName: currentUser.displayName,
                    userPhoto: currentUser.photoURL,
                    createdAt: serverTimestamp()
                });

                // Reset form
                uploadStatus.innerText = "Post uploaded successfully!";
                setTimeout(() => { uploadStatus.innerText = ""; }, 3000);
                imageInput.value = '';
                captionInput.value = '';

            } catch (error) {
                console.error("Upload failed", error);
                uploadStatus.innerText = "Error: " + error.message;
            } finally {
                postBtn.disabled = false;
            }
        });

        // --- FEED LOGIC ---
        function loadFeed() {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            
            onSnapshot(q, (snapshot) => {
                feedSection.innerHTML = ''; // Clear current feed
                snapshot.forEach((doc) => {
                    const post = doc.data();
                    
                    const postElement = document.createElement('div');
                    postElement.className = 'post-card';
                    
                    postElement.innerHTML = `
                        <div class="post-header">
                            <img src="${post.userPhoto || 'https://via.placeholder.com/35'}" alt="User">
                            <span>${post.userName}</span>
                        </div>
                        <img class="post-image" src="${post.imageUrl}" alt="Post Image">
                        <div class="post-caption">
                            <span>${post.userName}</span> ${post.caption}
                        </div>
                    `;
                    feedSection.appendChild(postElement);
                });
            });
        }
    </script>
</body>
</html>
