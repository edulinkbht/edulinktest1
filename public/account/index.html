<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings - EduLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Google+Sans:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #0f0f0f;
        }
        
        .google-font {
            font-family: 'Google Sans', sans-serif;
        }

        .input-field {
            width: 100%;
            background-color: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: #3b82f6;
        }

        .label {
            font-weight: 600;
            font-size: 14px;
            color: #1f1f1f;
            margin-bottom: 8px;
            display: block;
        }

        .section-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        .banner-container {
            width: 100%;
            height: 180px;
            border-radius: 20px;
            background-color: #f3f4f6;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .banner-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .pfp-container {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid #ffffff;
            background-color: #f3f4f6;
            position: absolute;
            bottom: -40px;
            left: 20px;
            overflow: hidden;
            cursor: pointer;
            z-index: 10;
        }

        .pfp-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .save-btn {
            background-color: #000000;
            color: #ffffff;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 9999px;
            transition: opacity 0.2s;
        }

        .save-btn:hover {
            opacity: 0.8;
        }

        .save-btn:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-black"></div>
    </div>

    <div class="section-container">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-2xl font-bold google-font">Idem Account System</h1>
            <a href="index.html" class="text-sm text-gray-500 hover:text-black flex items-center gap-1">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Back to Home
            </a>
        </div>

        <div class="mb-16 relative">
            <div class="banner-container" onclick="document.getElementById('banner-input').click()">
                <img id="banner-preview" src="https://i.imghippo.com/files/vgr8207c.png" class="banner-image">
                <div class="pfp-container" onclick="event.stopPropagation(); document.getElementById('pfp-input').click()">
                    <img id="pfp-preview" src="https://i.imghippo.com/files/vgr8207c.png" class="pfp-image">
                </div>
            </div>
            <input type="file" id="banner-input" class="hidden" accept="image/*">
            <input type="file" id="pfp-input" class="hidden" accept="image/*">
        </div>

        <form id="account-form" class="space-y-6">
            <div>
                <label class="label">Display name</label>
                <input type="text" id="name" placeholder="Full name" class="input-field">
            </div>

            <div>
                <label class="label">Username</label>
                <input type="text" id="username" placeholder="username" class="input-field">
                <p class="text-[12px] text-gray-500 mt-2">Usernames can only contain lowercase letters, numbers, underscores, and periods (max 20 characters).</p>
            </div>

            <div>
                <label class="label">Birthday</label>
                <div class="flex gap-4">
                    <select id="dob-month" class="input-field flex-1">
                        <option value="">Month</option>
                        <option value="1">January</option><option value="2">February</option><option value="3">March</option>
                        <option value="4">April</option><option value="5">May</option><option value="6">June</option>
                        <option value="7">July</option><option value="8">August</option><option value="9">September</option>
                        <option value="10">October</option><option value="11">November</option><option value="12">December</option>
                    </select>
                    <select id="dob-day" class="input-field flex-1">
                        <option value="">Day</option>
                        <!-- Days will be populated by JS -->
                    </select>
                    <select id="dob-year" class="input-field flex-1">
                        <option value="">Year</option>
                        <!-- Years will be populated by JS -->
                    </select>
                </div>
                <p class="text-[12px] text-gray-500 mt-2"><b>Privacy Note:</b> If set to private, it will only show your birth date and month on your profile, hiding your birth year and age entirely.</p>
            </div>

            <div>
                <label class="label">Location</label>
                <input type="text" id="location" placeholder="Location" class="input-field">
            </div>

            <div>
                <label class="label">Email</label>
                <input type="email" id="email" placeholder="Email" class="input-field" disabled>
                <p id="login-method" class="text-[11px] text-gray-400 mt-1">Logged in with ...</p>
            </div>

            <div>
                <label class="label">Password</label>
                <div class="relative">
                    <input type="password" id="password" value="********" class="input-field" disabled>
                    <button type="button" onclick="alert('Password change logic would go here')" class="absolute right-4 top-1/2 -translate-y-1/2 text-blue-600 font-bold text-sm">Change</button>
                </div>
            </div>

            <div>
                <label class="label">Bio</label>
                <textarea id="bio" placeholder="Tell us about yourself" class="input-field h-24 resize-none"></textarea>
            </div>

            <div class="flex gap-4">
                <div class="flex-1">
                    <label class="label">Gender</label>
                    <select id="gender" class="input-field">
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                        <option value="Prefer not to say">Prefer not to say</option>
                    </select>
                </div>
                <div class="flex-1">
                    <label class="label">Sexual Orientation</label>
                    <select id="orientation" class="input-field">
                        <option value="">Select Orientation</option>
                        <option value="Straight">Straight</option>
                        <option value="Gay">Gay</option>
                        <option value="Lesbian">Lesbian</option>
                        <option value="Bisexual">Bisexual</option>
                        <option value="Other">Other</option>
                        <option value="Prefer not to say">Prefer not to say</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="label">Account Privacy</label>
                <div class="flex gap-4">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="privacy" value="public" checked class="w-4 h-4">
                        <span>Public</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="privacy" value="private" class="w-4 h-4">
                        <span>Private</span>
                    </label>
                </div>
            </div>

            <div class="pt-8 flex justify-end">
                <button type="submit" id="save-btn" class="save-btn">Save Changes</button>
            </div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, updateEmail, updatePassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAJH79UQl0rc96Qug0DKLevO4ZI_sn8Kno", 
            authDomain: "edulinki.firebaseapp.com", 
            projectId: "edulinki", 
            storageBucket: "edulinki.firebasestorage.app", 
            messagingSenderId: "248886466474", 
            appId: "1:248886466474:web:160043201a6b28bafbbdd3", 
            measurementId: "G-MQBH12VL7N" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentUserData = null;

        // Populate Days and Years
        const daySelect = document.getElementById('dob-day');
        for (let i = 1; i <= 31; i++) {
            const opt = document.createElement('option');
            opt.value = i; opt.textContent = i;
            daySelect.appendChild(opt);
        }

        const yearSelect = document.getElementById('dob-year');
        const currentYear = new Date().getFullYear();
        for (let i = currentYear; i >= currentYear - 100; i--) {
            const opt = document.createElement('option');
            opt.value = i; opt.textContent = i;
            yearSelect.appendChild(opt);
        }

        // Auth Check
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html'; // Redirect if not logged in
                return;
            }

            // Fetch User Data
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                currentUserData = userSnap.data();
                fillForm(currentUserData, user);
            }
            document.getElementById('loading').classList.add('hidden');
        });

        function fillForm(data, user) {
            document.getElementById('name').value = data.name || '';
            document.getElementById('username').value = data.username || '';
            document.getElementById('bio').value = data.bio || '';
            document.getElementById('location').value = data.location || '';
            document.getElementById('email').value = user.email || '';
            document.getElementById('gender').value = data.gender || '';
            document.getElementById('orientation').value = data.orientation || '';
            
            if (data.dob) {
                const [y, m, d] = data.dob.split('-');
                document.getElementById('dob-year').value = y;
                document.getElementById('dob-month').value = parseInt(m);
                document.getElementById('dob-day').value = parseInt(d);
            }

            if (data.avatar) document.getElementById('pfp-preview').src = data.avatar;
            if (data.banner) document.getElementById('banner-preview').src = data.banner;

            const isGoogle = user.providerData.some(p => p.providerId === 'google.com');
            document.getElementById('login-method').textContent = `Logged in with ${isGoogle ? 'Google' : 'Email'}`;

            const privacyRadios = document.getElementsByName('privacy');
            privacyRadios.forEach(r => {
                if (r.value === (data.privacy || 'public')) r.checked = true;
            });
        }

        // Image Previews
        document.getElementById('banner-input').onchange = e => handleImageSelect(e, 'banner-preview');
        document.getElementById('pfp-input').onchange = e => handleImageSelect(e, 'pfp-preview');

        function handleImageSelect(e, previewId) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = rev => document.getElementById(previewId).src = rev.target.result;
                reader.readAsDataURL(file);
            }
        }

        // Form Submit
        document.getElementById('account-form').onsubmit = async (e) => {
            e.preventDefault();
            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.textContent = 'Saving...';

            try {
                const user = auth.currentUser;
                const updates = {
                    name: document.getElementById('name').value,
                    username: document.getElementById('username').value.toLowerCase(),
                    bio: document.getElementById('bio').value,
                    location: document.getElementById('location').value,
                    gender: document.getElementById('gender').value,
                    orientation: document.getElementById('orientation').value,
                    privacy: document.querySelector('input[name="privacy"]:checked').value,
                    dob: `${document.getElementById('dob-year').value}-${document.getElementById('dob-month').value.padStart(2, '0')}-${document.getElementById('dob-day').value.padStart(2, '0')}`
                };

                // Upload images if changed
                const bannerFile = document.getElementById('banner-input').files[0];
                const pfpFile = document.getElementById('pfp-input').files[0];

                if (bannerFile) {
                    const bannerRef = ref(storage, `banners/${user.uid}`);
                    await uploadBytes(bannerRef, bannerFile);
                    updates.banner = await getDownloadURL(bannerRef);
                }

                if (pfpFile) {
                    const pfpRef = ref(storage, `avatars/${user.uid}`);
                    await uploadBytes(pfpRef, pfpFile);
                    updates.avatar = await getDownloadURL(pfpRef);
                }

                await updateDoc(doc(db, "users", user.uid), updates);
                alert('Settings updated successfully!');
            } catch (error) {
                console.error(error);
                alert('Error updating settings: ' + error.message);
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = 'Save Changes';
            }
        };

        lucide.createIcons();
    </script>
</body>
</html>
