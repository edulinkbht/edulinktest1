<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">
    
    <title>Account Settings - Idem</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Light Theme Variables */
            --bg-color: #ffffff;
            --text-primary: #1c1e21;
            --text-secondary: #65676b;
            --border-color: #ced0d4;
            --input-bg: #ffffff;
            --input-focus-border: #8a8d91;
            --button-bg: #0064e0;
            --button-text: #ffffff;
            --button-hover: #0056c2;
            --note-bg: #f0f2f5;
            --link-color: #0064e0;
            --placeholder-color: #8a8d91;
            --entered-text-color: #1c1e21; 
            
            /* Password Health & Status Colors */
            --health-weak: #ff3b30;
            --health-fair: #ff9500;
            --health-strong: #34c759;
            --status-success: #1e7e34;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* Dark Theme Variables */
                --bg-color: #121212;
                --text-primary: #e4e6eb;
                --text-secondary: #b0b3b8;
                --border-color: #2a2b2e;
                --input-bg: #1c1c1e;
                --input-focus-border: #5a5d61;
                --button-bg: #1877f2;
                --button-text: #ffffff;
                --button-hover: #2185f3;
                --note-bg: #242526;
                --link-color: #2d88ff;
                --placeholder-color: #65676b;
                --entered-text-color: #e4e6eb; 
                --status-success: #34c759;
            }
        }

        html {
            background-color: var(--bg-color) !important;
            color-scheme: light dark;
            height: 100%;
            overscroll-behavior: none; 
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        body {
            background-color: var(--bg-color) !important;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html::-webkit-scrollbar, body::-webkit-scrollbar {
            display: none;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: transparent;
        }

        .main-wrapper {
            width: 100%;
            max-width: 500px;
            padding: 0 20px;
        }

        .header {
            text-align: left;
            margin-bottom: 32px;
            margin-top: 40px;
        }

        .header .logo {
            margin-bottom: 24px;
            display: flex;
            align-items: center;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .header p {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* Profile Banner & Avatar Styles */
        .profile-header {
            position: relative;
            margin-bottom: 70px;
        }

        .banner-container {
            width: 100%;
            height: 250px;
            background-color: var(--note-bg);
            border-radius: 0 0 40px 40px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .banner-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-container {
            position: absolute;
            bottom: -45px;
            left: 20px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 5px solid var(--bg-color);
            background-color: var(--note-bg);
            overflow: hidden;
            cursor: pointer;
            z-index: 5;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .edit-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            color: white;
            z-index: 3;
            border-radius: inherit;
        }

        .edit-overlay i {
            width: 28px;
            height: 28px;
            color: white;
        }

        .banner-container:hover .edit-overlay,
        .avatar-container:hover .edit-overlay {
            opacity: 1;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .input-container-field {
            display: flex;
            align-items: center;
            width: 100%;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            background-color: var(--input-bg);
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
            padding: 0 18px;
        }

        .input-container-field:focus-within {
            border-color: var(--input-focus-border);
            box-shadow: 0 0 0 1px var(--input-focus-border);
        }

        .input-container-field input, .input-container-field textarea {
            flex: 1;
            width: 100%;
            padding: 16px 0;
            font-size: 16px;
            border: none;
            outline: none;
            color: var(--entered-text-color);
            background-color: transparent;
            resize: none;
        }

        .input-container-field input::placeholder, .input-container-field textarea::placeholder {
            color: var(--placeholder-color);
        }

        .form-control-raw {
            width: 100%;
            padding: 16px 18px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            background-color: var(--input-bg);
            color: var(--entered-text-color);
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
            outline: none;
        }

        .form-control-raw:focus {
            border-color: var(--input-focus-border);
            box-shadow: 0 0 0 1px var(--input-focus-border);
        }

        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .col {
            flex: 1;
            min-width: 130px;
        }

        select.form-control-raw {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%238a8d91%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 18px top 50%;
            background-size: 11px auto;
            padding-right: 42px;
        }

        .privacy-note {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 10px;
            line-height: 1.45;
        }

        .privacy-note strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--button-bg);
            color: var(--button-text);
            border: none;
            border-radius: 28px;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 24px;
            transition: background-color 0.2s ease;
        }

        .submit-btn:hover {
            background-color: var(--button-hover);
        }

        .logout-btn {
            width: 100%;
            background-color: transparent;
            color: var(--health-weak);
            border: 1px solid var(--health-weak);
            border-radius: 28px;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background-color: var(--health-weak);
            color: white;
        }

        .auth-method-badge {
            display: flex;
            align-items: center;
            width: 100%;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            background-color: var(--input-bg);
            padding: 16px 18px;
            font-size: 16px;
            color: var(--entered-text-color);
        }

        .hidden {
            display: none !important;
        }

        /* Loading Spinner */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top-color: var(--button-bg);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="loading-screen" class="loading-screen">
    <div class="spinner"></div>
</div>

<div id="account-page-content" class="hidden">
    <div class="main-wrapper">
        <div class="header">
            <div class="logo">
                <picture>
                    <source srcset="https://i.imghippo.com/files/vgr8207c.png" media="(prefers-color-scheme: dark)">
                    <img src="https://i.imghippo.com/files/fRGt5603uII.png" alt="Idem Logo" width="28" height="28">
                </picture>
            </div>
            <h1>Idem Account System</h1>
            <p>Manage your profile and account settings.</p>
        </div>
    </div>

    <div class="profile-header full-width">
        <div class="banner-container" onclick="document.getElementById('banner-input').click()">
            <img id="profile-banner" src="https://i.imghippo.com/files/vgr8207c.png" alt="Banner">
            <div class="edit-overlay">
                <i data-lucide="camera"></i>
            </div>
            <input type="file" id="banner-input" class="hidden" accept="image/*">
        </div>
        <div class="avatar-container" onclick="document.getElementById('avatar-input').click()">
            <img id="profile-avatar" src="https://i.imghippo.com/files/fRGt5603uII.png" alt="Avatar">
            <div class="edit-overlay">
                <i data-lucide="camera"></i>
            </div>
            <input type="file" id="avatar-input" class="hidden" accept="image/*">
        </div>
    </div>

    <div class="main-wrapper">
        <form id="account-form">
        <div class="form-group">
            <label>Login Method</label>
            <div id="auth-method" class="auth-method-badge">Detecting...</div>
        </div>

        <div class="form-group">
            <label>Display name</label>
            <div class="input-container-field">
                <input type="text" id="display-name" placeholder="Full name" required>
            </div>
        </div>

        <div class="form-group">
            <label>Username</label>
            <div class="input-container-field">
                <input type="text" id="username" placeholder="username" maxlength="20" oninput="validateUsername(this)" required>
            </div>
            <p class="privacy-note">Usernames can only contain lowercase letters, numbers, underscores, and periods.</p>
        </div>

        <div class="form-group">
            <label>Bio</label>
            <div class="input-container-field">
                <textarea id="bio" placeholder="Tell us about yourself..." rows="3"></textarea>
            </div>
        </div>

        <div class="form-group">
            <label>Email address</label>
            <div class="input-container-field">
                <input type="email" id="email" placeholder="name@example.com" disabled>
            </div>
            <p class="privacy-note">Email address cannot be changed here.</p>
        </div>

        <div class="form-group">
            <label>Birthday</label>
            <div class="row">
                <select id="birth-month" class="form-control-raw col" required>
                    <option value="" disabled selected>Month</option>
                    <option value="1">January</option><option value="2">February</option>
                    <option value="3">March</option><option value="4">April</option>
                    <option value="5">May</option><option value="6">June</option>
                    <option value="7">July</option><option value="8">August</option>
                    <option value="9">September</option><option value="10">October</option>
                    <option value="11">November</option><option value="12">December</option>
                </select>
                <select id="birth-day" class="form-control-raw col" required>
                    <option value="" disabled selected>Day</option>
                </select>
                <select id="birth-year" class="form-control-raw col" required>
                    <option value="" disabled selected>Year</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Location</label>
            <div class="input-container-field">
                <input type="text" id="location" placeholder="City, Country">
            </div>
        </div>

        <div class="form-group">
            <label>Biological Gender</label>
            <select id="gender" class="form-control-raw" required>
                <option value="" disabled selected>Select your gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
                <option value="Prefer not to say">Prefer not to say</option>
            </select>
        </div>

        <div class="form-group">
            <label>Sexual Orientation</label>
            <select id="sexual-orientation" class="form-control-raw" required>
                <option value="" disabled selected>Select orientation</option>
                <option value="Straight">Straight / Heterosexual</option>
                <option value="Gay/Lesbian">Gay / Lesbian</option>
                <option value="Bisexual">Bisexual</option>
                <option value="Pansexual">Pansexual</option>
                <option value="Asexual">Asexual</option>
                <option value="Prefer not to say">Prefer not to say</option>
            </select>
        </div>

        <div class="form-group">
            <label>Account Privacy</label>
            <select id="privacy" class="form-control-raw" required>
                <option value="public">Public</option>
                <option value="private">Private</option>
            </select>
            <p class="privacy-note">
                <strong>Privacy Note:</strong> If set to private, your profile will only be visible to followers.
            </p>
        </div>

        <div class="form-group" id="password-section">
            <label>New Password (Optional)</label>
            <div class="input-container-field">
                <input type="password" id="new-password" placeholder="Leave blank to keep current">
            </div>
        </div>

        <button type="submit" id="save-btn" class="submit-btn">Save Changes</button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAJH79UQl0rc96Qug0DKLevO4ZI_sn8Kno", 
        authDomain: "edulinki.firebaseapp.com", 
        projectId: "edulinki", 
        storageBucket: "edulinki.firebasestorage.app", 
        messagingSenderId: "248886466474", 
        appId: "1:248886466474:web:160043201a6b28bafbbdd3", 
        measurementId: "G-MQBH12VL7N" 
    }; 

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // Initialize Lucide Icons
    lucide.createIcons();

    let currentUser = null;

    // Initialize Date Selects
    const dayMenu = document.getElementById('birth-day');
    for (let d = 1; d <= 31; d++) {
        let option = document.createElement('option');
        option.value = d;
        option.textContent = d;
        dayMenu.appendChild(option);
    }
    const yearMenu = document.getElementById('birth-year');
    const systemYear = new Date().getFullYear();
    for (let y = systemYear; y >= 1905; y--) {
        let option = document.createElement('option');
        option.value = y;
        option.textContent = y;
        yearMenu.appendChild(option);
    }

    window.validateUsername = function(input) {
        let value = input.value.toLowerCase();
        value = value.replace(/[^a-z0-9._]/g, '');
        input.value = value;
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            await loadUserData(user.uid);
            detectAuthMethod(user);
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('account-page-content').classList.remove('hidden');
        } else {
            // Redirect to login or index if not signed in
            window.location.href = 'index.html';
        }
    });

    function detectAuthMethod(user) {
        const provider = user.providerData[0]?.providerId;
        const badge = document.getElementById('auth-method');
        if (provider === 'google.com') {
            badge.textContent = 'Signed in with Google';
            document.getElementById('password-section').classList.add('hidden');
        } else {
            badge.textContent = 'Signed in with Email';
            document.getElementById('password-section').classList.remove('hidden');
        }
    }

    async function loadUserData(uid) {
        const userDocRef = doc(db, "users", uid);
        const userDoc = await getDoc(userDocRef);
        
        if (userDoc.exists()) {
            const data = userDoc.data();
            document.getElementById('display-name').value = data.name || '';
            document.getElementById('username').value = data.username || '';
            document.getElementById('bio').value = data.bio || '';
            document.getElementById('email').value = currentUser.email;
            document.getElementById('location').value = data.location || '';
            document.getElementById('gender').value = data.gender || '';
            document.getElementById('sexual-orientation').value = data.sexualOrientation || '';
            document.getElementById('privacy').value = data.privacy || 'public';
            
            if (data.dob) {
                const parts = data.dob.split('-');
                if (parts.length === 3) {
                    document.getElementById('birth-year').value = parts[0];
                    document.getElementById('birth-month').value = parseInt(parts[1]);
                    document.getElementById('birth-day').value = parseInt(parts[2]);
                }
            }

            if (data.avatar) document.getElementById('profile-avatar').src = data.avatar;
            if (data.banner) document.getElementById('profile-banner').src = data.banner;
        } else {
            // Create initial doc if it doesn't exist
            const initialData = {
                name: currentUser.displayName || '',
                email: currentUser.email,
                username: currentUser.email.split('@')[0],
                timestamp: new Date(),
                isOfficial: false,
                verified: false,
                followers: [],
                following: []
            };
            await setDoc(userDocRef, initialData);
            
            document.getElementById('display-name').value = initialData.name;
            document.getElementById('username').value = initialData.username;
            document.getElementById('email').value = initialData.email;
        }
    }

    document.getElementById('account-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const saveBtn = document.getElementById('save-btn');
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';

        try {
            const dob = `${document.getElementById('birth-year').value}-${document.getElementById('birth-month').value.padStart(2, '0')}-${document.getElementById('birth-day').value.padStart(2, '0')}`;
            
            const userData = {
                name: document.getElementById('display-name').value,
                username: document.getElementById('username').value,
                bio: document.getElementById('bio').value,
                location: document.getElementById('location').value,
                gender: document.getElementById('gender').value,
                sexualOrientation: document.getElementById('sexual-orientation').value,
                privacy: document.getElementById('privacy').value,
                dob: dob,
                updatedAt: new Date()
            };

            await updateDoc(doc(db, "users", currentUser.uid), userData);

            const newPassword = document.getElementById('new-password').value;
            if (newPassword) {
                await updatePassword(currentUser, newPassword);
            }

            alert('Profile updated successfully!');
        } catch (error) {
            console.error(error);
            alert('Error updating profile: ' + error.message);
        } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = 'Save Changes';
        }
    });

    // Image Upload Handling
    async function handleImageUpload(file, type) {
        const storageRef = ref(storage, `users/${currentUser.uid}/${type}_${Date.now()}`);
        await uploadBytes(storageRef, file);
        const url = await getDownloadURL(storageRef);
        
        const updateData = {};
        updateData[type] = url;
        await updateDoc(doc(db, "users", currentUser.uid), updateData);
        
        document.getElementById(`profile-${type}`).src = url;
    }

    document.getElementById('avatar-input').addEventListener('change', (e) => {
        if (e.target.files[0]) handleImageUpload(e.target.files[0], 'avatar');
    });

    document.getElementById('banner-input').addEventListener('change', (e) => {
        if (e.target.files[0]) handleImageUpload(e.target.files[0], 'banner');
    });
</script>

</body>
</html>
