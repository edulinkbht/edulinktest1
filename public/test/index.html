<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover allows the page background to bleed behind the safe area notches -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tab Theme Switcher Demo</title>
  
  <!-- This tag controls the physical device status bar color. Starts as white for Home tab -->
  <meta id="theme-meta" name="theme-color" content="#ffffff">

  <style>
    /* Theme variables that will be updated by JavaScript */
    :root {
      --bg-color: #ffffff;
      --text-color: #121212;
      --nav-border: #eaeaea;
      --accent-color: #3b82f6;
    }

    /* Reset & Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s ease, color 0.3s ease;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top Navigation Area (Safe for Notch/Dynamic Island) */
    header {
      background-color: var(--bg-color);
      border-bottom: 1px solid var(--nav-border);
      transition: background-color 0.3s ease, border-color 0.3s ease;
      
      /* Safe area padding handles the mobile status bar height */
      padding-top: env(safe-area-inset-top, 20px);
      padding-left: env(safe-area-inset-left, 16px);
      padding-right: env(safe-area-inset-right, 16px);
      padding-bottom: 15px;
      
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 600px;
      margin: 0 auto;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    /* Main Content Body */
    main {
      flex: 1;
      padding: 40px 20px;
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 15px;
      background-color: var(--nav-border);
      transition: background-color 0.3s ease;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      line-height: 1.5;
    }

    /* Bottom Tab Bar (Navigation UI) */
    nav {
      background-color: var(--bg-color);
      border-top: 1px solid var(--nav-border);
      transition: background-color 0.3s ease, border-color 0.3s ease;
      
      /* Padding-bottom ensures the nav buttons are above physical home indicators */
      padding-bottom: env(safe-area-inset-bottom, 15px);
      padding-top: 10px;
      
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }

    .tab-bar {
      display: flex;
      justify-content: space-around;
      max-width: 600px;
      margin: 0 auto;
    }

    .tab-button {
      background: none;
      border: none;
      color: var(--text-color);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      padding: 8px 16px;
      opacity: 0.6;
      transition: opacity 0.2s, transform 0.1s;
    }

    .tab-button:active {
      transform: scale(0.95);
    }

    /* Highlight Active Tab */
    .tab-button.active {
      opacity: 1;
      font-weight: 700;
      color: var(--accent-color);
    }
  </style>
</head>
<body>

  <!-- TOP HEADER (Handles the Notch background color) -->
  <header id="header-nav">
    <div class="header-container">
      <div class="logo">AppShell</div>
      <div style="font-size: 0.8rem; opacity: 0.6;">Viewport Safe Zone</div>
    </div>
  </header>

  <!-- MIDDLE WORKSPACE (Swaps text depending on tab) -->
  <main>
    <div id="badge" class="status-badge">Home Tab</div>
    <h1 id="tab-title">Welcome Home</h1>
    <p id="tab-description">This tab uses a standard #ffffff white theme. Look at how the top header and your browser address bar match up cleanly.</p>
  </main>

  <!-- BOTTOM TAB BAR (Handles Home indicator bar at bottom) -->
  <nav id="bottom-nav">
    <div class="tab-bar">
      <button class="tab-button active" onclick="switchTab('home')">Home</button>
      <button class="tab-button" onclick="switchTab('reels')">🎬 Reels</button>
      <button class="tab-button" onclick="switchTab('notifications')">Alerts</button>
    </div>
  </nav>

  <script>
    function switchTab(tabName) {
      // 1. Manage Active Button CSS States
      const buttons = document.querySelectorAll('.tab-button');
      buttons.forEach(button => button.classList.remove('active'));
      
      // Select appropriate button based on click
      const eventTarget = event ? event.currentTarget : null;
      if (eventTarget) {
        eventTarget.classList.add('active');
      }

      // Grab elements we need to dynamically theme
      const root = document.documentElement;
      const themeMeta = document.getElementById('theme-meta');
      const badge = document.getElementById('badge');
      const title = document.getElementById('tab-title');
      const description = document.getElementById('tab-description');

      // 2. Theme Switching Logic
      if (tabName === 'reels') {
        // Apply Dark Mode values specifically for Reels
        root.style.setProperty('--bg-color', '#121212');
        root.style.setProperty('--text-color', '#ffffff');
        root.style.setProperty('--nav-border', '#222222');
        root.style.setProperty('--accent-color', '#ff3e3e'); // Red accent for reels

        // Update the physical browser's top bar color!
        themeMeta.setAttribute('content', '#121212');

        // Update text content
        badge.textContent = "Reels Active";
        title.textContent = "Endless Scrolling";
        description.textContent = "The background of the top notch, navigation panels, and the system bar has changed to solid #121212.";

      } else {
        // Fallback to Light Mode values for Home or Notifications
        root.style.setProperty('--bg-color', '#ffffff');
        root.style.setProperty('--text-color', '#121212');
        root.style.setProperty('--nav-border', '#eaeaea');
        root.style.setProperty('--accent-color', '#3b82f6'); // Standard Blue accent

        // Restore the physical browser's top bar color to white!
        themeMeta.setAttribute('content', '#ffffff');

        if (tabName === 'home') {
          badge.textContent = "Home Tab";
          title.textContent = "Welcome Home";
          description.textContent = "This tab uses a standard #ffffff white theme. Look at how the top header and your browser address bar match up cleanly.";
        } else if (tabName === 'notifications') {
          badge.textContent = "Notifications";
          title.textContent = "Recent Activities";
          description.textContent = "Nothing new here! This tab also remains clean white (#ffffff) to show the difference with the Reels tab.";
        }
      }
    }
  </script>
</body>
</html>
