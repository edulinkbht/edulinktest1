<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit • AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        .logo-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        .chat-bg {
            background: linear-gradient(180deg, #0a0a0a 0%, #111111 100%);
        }
        .message-ai {
            background: #1f1f1f;
        }
    </style>
</head>
<body class="h-full bg-black text-white overflow-hidden">

    <div class="flex h-screen" id="app">

        <!-- Sidebar -->
        <div class="w-72 border-r border-white/10 bg-zinc-950 flex flex-col">
            <div class="p-5 border-b border-white/10 flex items-center gap-x-3">
                <div class="w-8 h-8 bg-gradient-to-br from-amber-400 to-yellow-500 rounded-2xl flex items-center justify-center text-black font-bold text-2xl">O</div>
                <span class="logo-font text-3xl font-semibold tracking-tighter">orbit</span>
            </div>

            <div class="p-4">
                <button onclick="newChat()" 
                        class="w-full bg-white text-black font-medium py-3.5 rounded-3xl flex items-center justify-center gap-x-2 hover:bg-amber-300 transition-colors">
                    <i class="fa-solid fa-plus"></i>
                    New Chat
                </button>
            </div>

            <div class="flex-1 overflow-y-auto px-3" id="chat-list">
                <!-- JS populated -->
            </div>

            <div class="p-4 border-t border-white/10">
                <div onclick="showApiModal()" class="flex items-center justify-between bg-white/5 hover:bg-white/10 p-4 rounded-3xl cursor-pointer transition-colors">
                    <div class="flex items-center gap-x-3">
                        <i class="fa-solid fa-key text-amber-400"></i>
                        <div>
                            <div class="text-sm font-medium">API Keys</div>
                            <div id="active-provider" class="text-xs text-emerald-400">Claude Connected</div>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right"></i>
                </div>
            </div>
        </div>

        <!-- Main Chat -->
        <div class="flex-1 flex flex-col chat-bg relative">
            <!-- Top Bar -->
            <div class="h-14 border-b border-white/10 px-6 flex items-center justify-between bg-black/70 backdrop-blur-md">
                <div id="chat-title" class="font-medium">Welcome to Orbit</div>
                <div class="flex items-center gap-x-4">
                    <div id="current-model-badge" 
                         class="text-xs px-4 py-1.5 bg-white/10 rounded-3xl font-mono flex items-center gap-x-2 cursor-pointer"
                         onclick="showApiModal()">
                        <span id="model-text">claude-3.5-sonnet</span>
                    </div>
                </div>
            </div>

            <!-- Messages -->
            <div id="messages" class="flex-1 overflow-y-auto p-8 space-y-10 pb-40">
                <!-- Welcome -->
                <div id="welcome" class="max-w-2xl mx-auto text-center pt-16">
                    <div class="text-6xl mb-6">👋</div>
                    <h1 class="text-5xl font-semibold tracking-tighter logo-font mb-4">What are we exploring today?</h1>
                    <p class="text-zinc-400">Choose a model and enter your API key to begin.</p>
                </div>
            </div>

            <!-- Input -->
            <div class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black to-transparent">
                <div class="max-w-3xl mx-auto">
                    <div class="bg-zinc-900 border border-white/10 rounded-3xl p-2">
                        <textarea id="input" rows="1"
                            class="w-full bg-transparent px-6 py-5 outline-none text-lg placeholder-zinc-400 resize-y max-h-52"
                            placeholder="Type your message..."></textarea>
                        
                        <div class="flex justify-between items-center px-4 pb-3">
                            <button onclick="showApiModal()" 
                                    class="text-zinc-400 hover:text-white flex items-center gap-x-2 text-sm">
                                <i class="fa-solid fa-key"></i>
                                <span id="key-status">No key set</span>
                            </button>
                            
                            <button onclick="sendMessage()" 
                                    class="bg-amber-500 text-black px-8 py-3 rounded-3xl font-medium flex items-center gap-x-2 hover:bg-amber-400 transition-all">
                                Send
                                <i class="fa-solid fa-arrow-up"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- API Key Modal -->
    <div id="api-modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center z-50">
        <div class="bg-zinc-900 border border-white/10 rounded-3xl w-full max-w-md mx-4">
            <div class="p-8">
                <h2 class="text-2xl font-semibold mb-6">Connect AI Provider</h2>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm text-zinc-400 mb-2">Provider</label>
                        <select id="provider-select" onchange="updateModelHint()"
                            class="w-full bg-black border border-white/10 rounded-3xl px-5 py-4 outline-none">
                            <option value="claude">Anthropic Claude</option>
                            <option value="openai">OpenAI GPT</option>
                            <option value="groq">Groq (Fast)</option>
                            <option value="gemini">Google Gemini</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm text-zinc-400 mb-2">API Key</label>
                        <input id="api-key-input" type="password" 
                               class="w-full bg-black border border-white/10 rounded-3xl px-5 py-4 outline-none"
                               placeholder="sk-... or gsk_...">
                        <p id="key-hint" class="text-xs text-zinc-500 mt-2">Paste your API key here</p>
                    </div>
                </div>
            </div>
            
            <div class="border-t border-white/10 p-4 flex gap-3">
                <button onclick="hideApiModal()" 
                        class="flex-1 py-4 rounded-3xl hover:bg-white/10 transition-colors">Cancel</button>
                <button onclick="saveApiKey()" 
                        class="flex-1 py-4 bg-amber-500 text-black rounded-3xl font-medium">Connect & Save</button>
            </div>
        </div>
    </div>

    <script>
        let currentProvider = "claude";
        let apiKey = "";
        let messages = [];

        const providerModels = {
            claude: "claude-3.5-sonnet",
            openai: "gpt-4o",
            groq: "llama-3.3-70b",
            gemini: "gemini-2.0-flash"
        };

        function updateModelHint() {
            currentProvider = document.getElementById("provider-select").value;
            document.getElementById("model-text").textContent = providerModels[currentProvider];
        }

        function showApiModal() {
            document.getElementById("api-modal").classList.remove("hidden");
            document.getElementById("api-modal").classList.add("flex");
        }

        function hideApiModal() {
            const modal = document.getElementById("api-modal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        }

        function saveApiKey() {
            const key = document.getElementById("api-key-input").value.trim();
            if (!key) {
                alert("Please enter an API key");
                return;
            }
            
            apiKey = key;
            currentProvider = document.getElementById("provider-select").value;
            
            document.getElementById("key-status").innerHTML = `✅ ${currentProvider.toUpperCase()}`;
            document.getElementById("active-provider").textContent = `${currentProvider} Connected`;
            document.getElementById("model-text").textContent = providerModels[currentProvider];
            
            hideApiModal();
            
            // Welcome message if first time
            if (messages.length === 0) {
                addMessage("ai", `Connected to <strong>${currentProvider}</strong>. How can I help you today?`);
            }
        }

        function addMessage(role, content) {
            const container = document.getElementById("messages");
            const welcome = document.getElementById("welcome");
            if (welcome) welcome.style.display = "none";

            const div = document.createElement("div");
            div.className = `flex ${role === "user" ? "justify-end" : "justify-start"}`;
            
            if (role === "user") {
                div.innerHTML = `
                    <div class="max-w-[75%] bg-amber-500 text-black px-6 py-4 rounded-3xl rounded-br-none">
                        ${content}
                    </div>
                `;
            } else {
                div.innerHTML = `
                    <div class="flex gap-4 max-w-[80%]">
                        <div class="w-8 h-8 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center text-xl flex-shrink-0">✦</div>
                        <div class="message-ai px-6 py-4 rounded-3xl rounded-bl-none">
                            ${content}
                        </div>
                    </div>
                `;
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            messages.push({role, content});
        }

        async function sendMessage() {
            const input = document.getElementById("input");
            const text = input.value.trim();
            
            if (!text) return;
            if (!apiKey) {
                alert("Please set an API key first!");
                showApiModal();
                return;
            }

            addMessage("user", text);
            input.value = "";

            // Show typing
            const typingId = "typing-" + Date.now();
            const container = document.getElementById("messages");
            const typingDiv = document.createElement("div");
            typingDiv.id = typingId;
            typingDiv.className = "flex justify-start";
            typingDiv.innerHTML = `
                <div class="flex gap-4">
                    <div class="w-8 h-8 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center text-xl">✦</div>
                    <div class="message-ai px-6 py-4 rounded-3xl rounded-bl-none typing">thinking</div>
                </div>
            `;
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;

            // Simulate API call delay
            setTimeout(() => {
                document.getElementById(typingId).remove();
                
                const replies = [
                    "That's a great question. Here's my analysis...",
                    "Let me think through this step by step.",
                    "Interesting point. Building on that idea...",
                    "Here's what I know about this topic:"
                ];
                
                const response = replies[Math.floor(Math.random() * replies.length)] + 
                    ` <span class="text-xs text-zinc-500">(via ${currentProvider})</span>`;
                
                addMessage("ai", response);
            }, 1200);
        }

        function newChat() {
            messages = [];
            document.getElementById("messages").innerHTML = `
                <div id="welcome" class="max-w-2xl mx-auto text-center pt-16">
                    <div class="text-6xl mb-6">👋</div>
                    <h1 class="text-5xl font-semibold tracking-tighter logo-font mb-4">What are we exploring today?</h1>
                </div>
            `;
            document.getElementById("chat-title").textContent = "New Conversation";
        }

        // Keyboard support
        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && document.getElementById("input") === document.activeElement) {
                if (!e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            }
        });

        // Initialize
        window.onload = () => {
            // Auto show API modal on first load
            setTimeout(() => {
                showApiModal();
            }, 800);
        };
    </script>
</body>
</html>
