<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support - EduLink</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #fafafa;
    }
    .fade-in {
      animation: fadeIn 0.3s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Hide scrollbar for a cleaner look */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="bg-white max-w-md w-full rounded-2xl shadow-[0_4px_24px_rgba(0,0,0,0.04)] border border-gray-100 overflow-hidden flex flex-col max-h-[90vh]">
    
    <div class="border-b border-gray-100 p-4 flex items-center justify-between bg-white z-10 sticky top-0">
      <div class="w-8">
        <svg class="w-6 h-6 text-gray-800 cursor-pointer hover:text-gray-500 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24" onclick="history.back()">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
        </svg>
      </div>
      <h1 id="pageTitle" class="text-lg font-semibold text-gray-900">Loading...</h1>
      <div class="w-8"></div>
    </div>

    <div id="loadingState" class="p-12 flex justify-center">
      <svg class="animate-spin h-8 w-8 text-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
    </div>

    <div id="userView" class="hidden overflow-y-auto no-scrollbar">
      <div id="reportFormContainer" class="p-6">
        <p class="text-sm text-gray-500 mb-6 text-center">
          Your report will be sent directly to the EduLink admin team for review.
        </p>

        <form id="issueForm" class="space-y-5">
          <div>
            <label for="issueType" class="block text-sm font-medium text-gray-700 mb-1.5">What are you reporting?</label>
            <select id="issueType" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition-all appearance-none cursor-pointer">
              <option value="" disabled selected>Select an issue type...</option>
              <option value="Bug">App Bug or Glitch</option>
              <option value="Harassment">Harassment or Bullying</option>
              <option value="Spam">Spam or Fake Account</option>
              <option value="Content">Inappropriate Content</option>
              <option value="Other">Something Else</option>
            </select>
          </div>

          <div>
            <label for="issueDescription" class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
            <textarea id="issueDescription" required rows="4" placeholder="Please provide as much detail as possible..." class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition-all resize-none"></textarea>
          </div>

          <button type="submit" id="submitBtn" class="w-full bg-black text-white rounded-xl py-3.5 font-semibold mt-4 hover:bg-gray-800 active:scale-[0.98] transition-all flex justify-center items-center">
            <span id="btnText">Submit Report</span>
            <svg id="btnSpinner" class="animate-spin ml-2 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </button>
        </form>
      </div>

      <div id="successState" class="p-8 hidden fade-in flex-col items-center justify-center text-center">
        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mb-4 text-green-600">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
          </svg>
        </div>
        <h2 class="text-xl font-semibold text-gray-900 mb-2">Thanks for letting us know</h2>
        <p class="text-sm text-gray-500 mb-6">Your feedback helps keep the EduLink community safe.</p>
        <button onclick="window.location.href='/'" class="w-full bg-gray-100 text-gray-900 rounded-xl py-3 font-semibold hover:bg-gray-200 transition-colors">
          Return Home
        </button>
      </div>
    </div>

    <div id="adminView" class="hidden overflow-y-auto no-scrollbar bg-gray-50 flex-1">
      <div id="reportsList" class="divide-y divide-gray-100">
        </div>
      <div id="emptyAdminState" class="hidden p-8 flex flex-col items-center justify-center text-center h-full">
        <p class="text-gray-500 text-sm">No reports to show right now. Awesome!</p>
      </div>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const configResponse = await fetch('/api/data');
    const config = await configResponse.json();
    const firebaseConfig = config.firebaseConfig;

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // The emails allowed to view the admin dashboard
    const ADMIN_EMAILS = [
      "edulinkbht@gmail.com", 
      "ngawang.tphuentshok2024@academy.bt"
    ];

    // UI Elements
    const pageTitle = document.getElementById('pageTitle');
    const loadingState = document.getElementById('loadingState');
    const userView = document.getElementById('userView');
    const adminView = document.getElementById('adminView');

    let currentUser = null;

    // 1. Check Authentication & Route to correct view
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = '/login'; 
        return;
      } 
      
      currentUser = user;
      loadingState.classList.add('hidden');

      // Check if logged in user is an Admin
      if (ADMIN_EMAILS.includes(currentUser.email)) {
        // ADMIN MODE
        pageTitle.innerText = "Inbox Reports";
        adminView.classList.remove('hidden');
        await loadAdminReports();
      } else {
        // NORMAL USER MODE
        pageTitle.innerText = "Report an Issue";
        userView.classList.remove('hidden');
      }
    });

    // ------------------------------------------
    // USER LOGIC: Submit Report
    // ------------------------------------------
    const form = document.getElementById('issueForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!currentUser) return;

      const issueType = document.getElementById('issueType').value;
      const issueDescription = document.getElementById('issueDescription').value;

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      document.getElementById('btnText').innerText = 'Submitting...';
      document.getElementById('btnSpinner').classList.remove('hidden');

      try {
        await addDoc(collection(db, "reports"), {
          type: issueType,
          description: issueDescription,
          reportedByEmail: currentUser.email,
          timestamp: serverTimestamp()
        });

        document.getElementById('reportFormContainer').classList.add('hidden');
        document.getElementById('successState').classList.remove('hidden');
      } catch (error) {
        console.error("Error: ", error);
        alert("Failed to submit. Please try again.");
        submitBtn.disabled = false;
        document.getElementById('btnText').innerText = 'Submit Report';
        document.getElementById('btnSpinner').classList.add('hidden');
      }
    });

    // ------------------------------------------
    // ADMIN LOGIC: Fetch and Display Reports
    // ------------------------------------------
    async function loadAdminReports() {
      const reportsList = document.getElementById('reportsList');
      const emptyAdminState = document.getElementById('emptyAdminState');
      
      try {
        // Get reports ordered by newest first
        const q = query(collection(db, "reports"), orderBy("timestamp", "desc"));
        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
          emptyAdminState.classList.remove('hidden');
          return;
        }

        let html = '';
        querySnapshot.forEach((doc) => {
          const data = doc.data();
          // Format date if it exists
          const date = data.timestamp ? data.timestamp.toDate().toLocaleDateString() : 'Just now';
          
          // Generate a stylish card for each report (Threads/Instagram style feed)
          html += `
            <div class="p-5 bg-white fade-in">
              <div class="flex justify-between items-start mb-2">
                <div class="flex items-center gap-3">
                  <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 font-bold text-sm">
                    ${data.reportedByEmail.charAt(0).toUpperCase()}
                  </div>
                  <div>
                    <h3 class="text-sm font-semibold text-gray-900">${data.reportedByEmail}</h3>
                    <span class="text-xs text-gray-500">${date}</span>
                  </div>
                </div>
                <span class="px-2.5 py-1 bg-red-50 text-red-600 text-xs font-semibold rounded-md border border-red-100">
                  ${data.type}
                </span>
              </div>
              <p class="text-sm text-gray-800 mt-3 leading-relaxed ml-[52px]">
                ${data.description}
              </p>
            </div>
          `;
        });

        reportsList.innerHTML = html;

      } catch (error) {
        console.error("Error fetching reports: ", error);
        reportsList.innerHTML = `<p class="p-6 text-center text-red-500 text-sm">Error loading reports. Make sure Firestore Security Rules are updated.</p>`;
      }
    }
  </script>
</body>
</html>
