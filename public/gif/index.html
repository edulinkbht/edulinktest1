<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Social App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900">

    <div id="auth-screen" class="hidden flex-col items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-md shadow-sm border border-gray-200 max-w-sm w-full">
            <div class="text-center mb-8">
                <h1 id="auth-title" class="text-3xl font-bold text-gray-900" style="font-family: cursive;">SocialApp</h1>
                <p class="text-gray-500 text-sm mt-2 font-medium">Sign in to see photos and videos from your friends.</p>
            </div>
            
            <div id="auth-error" class="hidden mb-4 p-3 bg-red-50 text-red-700 border border-red-200 rounded text-sm text-center"></div>

            <form id="auth-form" onsubmit="handleEmailAuth(event)" class="space-y-3">
                <div id="name-field" style="display: none;">
                    <input type="text" id="name" placeholder="Full Name" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded text-sm focus:border-gray-400 focus:ring-0 outline-none transition-colors">
                </div>
                <div>
                    <input type="email" id="email" required placeholder="Email Address" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded text-sm focus:border-gray-400 focus:ring-0 outline-none transition-colors">
                </div>
                <div>
                    <input type="password" id="password" required minlength="8" placeholder="Password" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded text-sm focus:border-gray-400 focus:ring-0 outline-none transition-colors">
                </div>
                <button type="submit" id="auth-submit-btn" class="w-full bg-blue-500 text-white font-semibold py-2 rounded mt-2 hover:bg-blue-600 transition-colors">
                    Log In
                </button>
            </form>

            <div class="flex items-center my-5">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="mx-4 text-sm font-semibold text-gray-500 uppercase">Or</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>

            <button onclick="loginWithGoogle()" class="w-full flex items-center justify-center gap-2 text-blue-900 font-semibold text-sm hover:text-blue-700 transition-colors">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-4 h-4" alt="Google">
                Log in with Google
            </button>
        </div>

        <div class="bg-white p-4 rounded-md shadow-sm border border-gray-200 max-w-sm w-full mt-4 text-center">
            <p class="text-sm">
                <span id="auth-toggle-text">Don't have an account?</span> 
                <button type="button" onclick="toggleAuthMode()" id="auth-toggle-link" class="text-blue-500 font-semibold hover:text-blue-700">Sign up</button>
            </p>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        
        <nav class="fixed top-0 w-full bg-white border-b border-gray-200 z-50 h-14 flex items-center justify-center">
            <div class="w-full max-w-md px-4 flex justify-between items-center">
                <div class="font-bold text-xl tracking-tight" style="font-family: cursive;">SocialApp</div>
                
                <div class="flex items-center gap-4">
                    <label class="cursor-pointer group relative">
                        <div id="nav-avatar" class="w-8 h-8 rounded-full bg-gray-200 border border-gray-300 flex items-center justify-center overflow-hidden object-cover">
                            <svg class="w-4 h-4 text-gray-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg>
                        </div>
                        <input type="file" id="profileUpload" accept="image/*" class="hidden" onchange="uploadProfilePicture(event)">
                    </label>
                    <button onclick="logout()" class="text-sm font-semibold text-red-500 hover:text-red-700 transition-colors">
                        Logout
                    </button>
                </div>
            </div>
        </nav>

        <main class="pt-16 pb-20 max-w-md mx-auto w-full">
            
            <div class="bg-white border-b sm:border border-gray-200 sm:rounded-lg mb-6 p-4">
                <form id="post-form" onsubmit="createPost(event)">
                    <div class="flex gap-3">
                        <div id="composer-avatar" class="w-8 h-8 rounded-full bg-gray-200 border border-gray-300 flex-shrink-0 overflow-hidden">
                            </div>
                        <textarea id="postContent" required placeholder="Write a caption..." rows="2" class="w-full bg-transparent text-sm focus:outline-none resize-none hide-scrollbar pt-1.5"></textarea>
                    </div>
                    
                    <div class="flex justify-between items-center mt-3 pt-3 border-t border-gray-100">
                        <label class="cursor-pointer text-gray-500 hover:text-black flex items-center gap-1.5 text-sm font-semibold transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            <span>Photo/Video</span>
                            <input type="file" id="mediaUpload" accept="image/*,video/*" class="hidden" onchange="updateFileName()">
                        </label>
                        <span id="file-name" class="text-xs text-gray-400 mr-auto ml-2 overflow-hidden text-ellipsis whitespace-nowrap max-w-[100px]"></span>

                        <button type="submit" id="post-submit-btn" class="text-blue-500 font-semibold text-sm hover:text-blue-700 transition-colors">
                            Share
                        </button>
                    </div>
                </form>
            </div>

            <div id="posts-container" class="space-y-4 sm:space-y-6">
                <div class="flex justify-center items-center py-10">
                    <div class="w-6 h-6 border-2 border-gray-300 border-t-black rounded-full animate-spin"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- APPWRITE CONFIGURATION ---
        const APPWRITE_ENDPOINT = "https://sgp.cloud.appwrite.io/v1"; 
        const APPWRITE_PROJECT_ID = "6a2e4a110007f2358f48";     
        const DATABASE_ID = "6a4928f30008f6f3aab8";           
        const COLLECTION_ID = "posts";       
        const BUCKET_ID = "6a494107003e1b16b976"; 

        const client = new Appwrite.Client()
            .setEndpoint(APPWRITE_ENDPOINT)
            .setProject(APPWRITE_PROJECT_ID);

        const account = new Appwrite.Account(client);
        const databases = new Appwrite.Databases(client);
        const storage = new Appwrite.Storage(client); 

        let currentUser = null;
        let userPrefs = null;
        let isSignUp = false;

        // Check login status on page load
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                currentUser = await account.get();
                userPrefs = await account.getPrefs();
                showAppLayout();
                loadPosts();
            } catch (error) {
                showLoginLayout();
            }
        });

        // --- IMAGE COMPRESSION ---
        function compressImage(file, maxWidth = 1080, quality = 0.8) {
            return new Promise((resolve) => {
                if (!file.type.startsWith('image/') || file.type.includes('gif')) {
                    return resolve(file); 
                }
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => {
                            resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                        }, 'image/jpeg', quality);
                    };
                };
            });
        }

        // --- AUTHENTICATION ---
        function toggleAuthMode() {
            isSignUp = !isSignUp;
            document.getElementById('name-field').style.display = isSignUp ? 'block' : 'none';
            document.getElementById('auth-submit-btn').innerText = isSignUp ? 'Sign Up' : 'Log In';
            document.getElementById('auth-toggle-link').innerText = isSignUp ? 'Log in' : "Sign up";
            document.getElementById('auth-toggle-text').innerText = isSignUp ? 'Have an account?' : "Don't have an account?";
        }

        async function handleEmailAuth(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            const errorBox = document.getElementById('auth-error');
            const btn = document.getElementById('auth-submit-btn');
            
            errorBox.classList.add('hidden');
            btn.innerText = 'Processing...';
            btn.disabled = true;
            
            try {
                if (isSignUp) {
                    await account.create(Appwrite.ID.unique(), email, password, name || 'Anonymous');
                }
                await account.createEmailPasswordSession(email, password);
                window.location.reload();
            } catch (error) {
                errorBox.innerText = error.message;
                errorBox.classList.remove('hidden');
                btn.innerText = isSignUp ? 'Sign Up' : 'Log In';
                btn.disabled = false;
            }
        }

        function loginWithGoogle() {
            const redirectUrl = window.location.origin + window.location.pathname;
            account.createOAuth2Session('google', redirectUrl, redirectUrl);
        }

        async function logout() {
            await account.deleteSession('current');
            window.location.reload();
        }

        // --- PROFILE PICTURE ---
        async function uploadProfilePicture(event) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                const compressedFile = await compressImage(file, 300, 0.7); 
                const uploadedFile = await storage.createFile(BUCKET_ID, Appwrite.ID.unique(), compressedFile);
                userPrefs = await account.updatePrefs({ profilePicId: uploadedFile.$id });
                updateNavbarAvatar();
                loadPosts(); 
            } catch (error) {
                alert("Upload failed: " + error.message);
            }
        }

        function updateNavbarAvatar() {
            const navAvatar = document.getElementById('nav-avatar');
            const composerAvatar = document.getElementById('composer-avatar');
            
            if (userPrefs && userPrefs.profilePicId) {
                // ADDED .href HERE to fix broken images
                const avatarUrl = storage.getFilePreview(BUCKET_ID, userPrefs.profilePicId, 150, 150, 'center', 90).href;
                const imgTag = `<img src="${avatarUrl}" class="w-full h-full object-cover">`;
                navAvatar.innerHTML = imgTag;
                composerAvatar.innerHTML = imgTag;
            } else {
                composerAvatar.innerHTML = `<div class="w-full h-full bg-gray-200 flex items-center justify-center text-gray-500 text-xs">Me</div>`;
            }
        }

        // --- POSTING LOGIC ---
        function updateFileName() {
            const fileInput = document.getElementById('mediaUpload');
            document.getElementById('file-name').innerText = fileInput.files.length > 0 ? fileInput.files[0].name : '';
        }

        async function createPost(event) {
            event.preventDefault();
            const textarea = document.getElementById('postContent');
            const fileInput = document.getElementById('mediaUpload');
            const fileNameDisplay = document.getElementById('file-name');
            const btn = document.getElementById('post-submit-btn');
            
            const content = textarea.value.trim();
            const originalFile = fileInput.files[0];

            if (!content && !originalFile) return; 

            btn.innerText = 'Sharing...';
            btn.disabled = true;

            try {
                let mediaId = null;
                let mediaType = null;

                if (originalFile) {
                    const finalFile = await compressImage(originalFile, 1080, 0.8);
                    const uploadedFile = await storage.createFile(BUCKET_ID, Appwrite.ID.unique(), finalFile);
                    mediaId = uploadedFile.$id;
                    mediaType = finalFile.type.startsWith('video') ? 'video' : 'image';
                }

                await databases.createDocument(
                    DATABASE_ID,
                    COLLECTION_ID,
                    Appwrite.ID.unique(),
                    {
                        content: content,
                        userName: currentUser.name || currentUser.email.split('@')[0] || "user",
                        mediaId: mediaId,
                        mediaType: mediaType,
                        userProfilePic: userPrefs.profilePicId || null 
                    }
                );
                
                textarea.value = '';
                fileInput.value = '';
                fileNameDisplay.innerText = '';
                loadPosts(); 
            } catch (error) {
                alert("Failed to post: " + error.message);
            } finally {
                btn.innerText = 'Share';
                btn.disabled = false;
            }
        }

        // --- FETCHING & RENDERING POSTS ---
        async function loadPosts() {
            const container = document.getElementById('posts-container');
            try {
                const response = await databases.listDocuments(
                    DATABASE_ID,
                    COLLECTION_ID,
                    [Appwrite.Query.orderDesc('$createdAt')]
                );
                
                if (response.documents.length === 0) {
                    container.innerHTML = `<div class="text-center py-10 text-gray-500 text-sm">No posts yet. Be the first!</div>`;
                    return;
                }

                container.innerHTML = response.documents.map(post => {
                    // Time formatting (e.g. "2 HOURS AGO")
                    const dateObj = new Date(post.$createdAt);
                    const timeAgo = Math.floor((new Date() - dateObj) / 1000 / 60 / 60);
                    const dateText = timeAgo < 24 && timeAgo > 0 ? `${timeAgo} HOURS AGO` : dateObj.toLocaleDateString().toUpperCase();
                    
                    const displayName = escapeHtml(post.userName).toLowerCase();
                    
                    // Avatar Rendering (Fixed .href)
                    let avatarHTML = `<div class="w-8 h-8 rounded-full bg-gray-200 border border-gray-300 flex items-center justify-center text-xs font-bold text-gray-500">${displayName.charAt(0).toUpperCase()}</div>`;
                    if (post.userProfilePic) {
                        const avatarUrl = storage.getFilePreview(BUCKET_ID, post.userProfilePic, 150, 150, 'center', 90).href;
                        avatarHTML = `<img src="${avatarUrl}" class="w-8 h-8 rounded-full object-cover border border-gray-200">`;
                    }

                    // Media Rendering (Fixed .href & Instagram Edge-to-Edge styling)
                    let mediaHTML = '';
                    if (post.mediaId) {
                        if (post.mediaType === 'video') {
                            const videoUrl = storage.getFileView(BUCKET_ID, post.mediaId).href;
                            mediaHTML = `<video controls class="w-full max-h-[600px] object-contain bg-black" src="${videoUrl}"></video>`;
                        } else {
                            const imageUrl = storage.getFilePreview(BUCKET_ID, post.mediaId, 1080, 0, 'center', 90).href;
                            mediaHTML = `<img class="w-full h-auto object-cover max-h-[600px] bg-gray-100" src="${imageUrl}" loading="lazy">`;
                        }
                    }

                    return `
                        <article class="bg-white border-b sm:border border-gray-200 sm:rounded-lg">
                            <div class="flex items-center p-3 gap-3">
                                ${avatarHTML}
                                <span class="font-semibold text-sm text-gray-900">${displayName}</span>
                            </div>
                            
                            ${mediaHTML}

                            <div class="p-3 pb-1 flex gap-4">
                                <svg class="w-6 h-6 hover:text-gray-500 cursor-pointer" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                                <svg class="w-6 h-6 hover:text-gray-500 cursor-pointer" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                            </div>

                            <div class="px-3 pb-3 text-sm">
                                <p class="text-gray-900 leading-relaxed">
                                    <span class="font-semibold mr-1">${displayName}</span>
                                    ${escapeHtml(post.content)}
                                </p>
                                <p class="text-[10px] text-gray-400 mt-2 tracking-wide">${dateText}</p>
                            </div>
                        </article>
                    `;
                }).join('');
            } catch (error) {
                container.innerHTML = `<div class="text-center py-4 text-red-500 text-sm">Error: ${error.message}</div>`;
            }
        }

        // --- LAYOUT HELPERS ---
        function showAppLayout() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('auth-screen').classList.remove('flex');
            document.getElementById('app-screen').classList.remove('hidden');
            updateNavbarAvatar();
        }

        function showLoginLayout() {
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('auth-screen').classList.add('flex');
        }

        function escapeHtml(str) {
            if (!str) return "";
            return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
