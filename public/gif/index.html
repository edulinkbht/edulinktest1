<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom scrollbar matching modern web views */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #dbdbdb; border-radius: 10px; }
    </style>
</head>
<body class="bg-white min-h-screen font-sans antialiased text-gray-900 selection:bg-gray-200">

    <div id="auth-screen" class="hidden flex-col items-center justify-center min-h-screen p-4 bg-gray-50">
        <div class="bg-white p-10 rounded-sm border border-gray-300 max-w-sm w-full text-center">
            <h1 class="text-4xl font-serif italic font-bold tracking-wide my-6 text-gray-900">Instagram</h1>
            
            <div id="auth-error" class="hidden mb-4 p-3 bg-red-50 text-red-600 border border-red-200 text-xs rounded font-medium"></div>

            <form id="auth-form" onsubmit="handleEmailAuth(event)" class="space-y-2 mt-4">
                <div id="name-field" style="display: none;">
                    <input type="text" id="name" placeholder="Full Name" class="w-full p-2 text-xs bg-gray-50 border border-gray-300 rounded focus:border-gray-500 outline-none transition-all">
                </div>
                <div>
                    <input type="email" id="email" required placeholder="Phone number, username, or email" class="w-full p-2 text-xs bg-gray-50 border border-gray-300 rounded focus:border-gray-500 outline-none transition-all">
                </div>
                <div>
                    <input type="password" id="password" required minlength="8" placeholder="Password" class="w-full p-2 text-xs bg-gray-50 border border-gray-300 rounded focus:border-gray-500 outline-none transition-all">
                </div>
                <button type="submit" id="auth-submit-btn" class="w-full bg-blue-500 text-white font-semibold py-1.5 px-4 rounded text-sm hover:bg-blue-600 transition-all mt-2 disabled:opacity-50">
                    Log In
                </button>
            </form>

            <div class="flex items-center my-5">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="mx-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Or</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <button onclick="loginWithGoogle()" class="w-full flex items-center justify-center gap-2 text-blue-900 font-semibold text-sm hover:opacity-80 transition-all">
                <i class="fab fa-google"></i> Log in with Google
            </button>
        </div>

        <div class="bg-white p-5 rounded-sm border border-gray-300 max-w-sm w-full text-center mt-3">
            <button type="button" onclick="toggleAuthMode()" id="auth-toggle-link" class="text-sm font-medium text-blue-500 hover:text-blue-700 transition-colors">
                Don't have an account? <span class="font-semibold">Sign Up</span>
            </button>
        </div>
    </div>


    <div id="app-screen" class="hidden min-h-screen bg-white">
        
        <nav class="sticky top-0 bg-white border-b border-gray-200 z-50 h-14 flex items-center justify-between px-4 max-w-4xl mx-auto w-full">
            <div class="text-2xl font-serif italic font-bold tracking-wide text-gray-900 cursor-pointer" onclick="switchTab('feed')">Instagram</div>
            <div class="flex items-center gap-5 text-xl">
                <button onclick="switchTab('feed')" class="hover:scale-110 transition-transform"><i class="fas fa-home"></i></button>
                <button onclick="switchTab('create')" class="hover:scale-110 transition-transform"><i class="far fa-plus-square"></i></button>
                <button onclick="switchTab('profile')" class="w-6 h-6 rounded-full overflow-hidden border border-gray-300 flex items-center justify-center">
                    <img id="nav-avatar" src="https://via.placeholder.com/150" class="w-full h-full object-cover hidden">
                    <i id="nav-avatar-icon" class="fas fa-user-circle text-gray-400 text-lg"></i>
                </button>
                <button onclick="logout()" class="text-sm text-red-500 font-semibold"><i class="fas fa-sign-out-alt text-lg"></i></button>
            </div>
        </nav>

        <main class="max-w-2xl mx-auto p-0 sm:p-4 pb-20 pt-2">
            
            <div id="view-feed" class="tab-view space-y-6">
                <div id="posts-container" class="divide-y divide-gray-200 sm:space-y-6 sm:divide-y-0">
                    <p class="text-gray-400 text-center py-12 text-sm">Loading your feed...</p>
                </div>
            </div>

            <div id="view-create" class="tab-view hidden p-4">
                <div class="border border-gray-200 rounded p-6 bg-white max-w-md mx-auto shadow-sm">
                    <h2 class="text-lg font-semibold mb-4 text-center">Create New Post</h2>
                    <form id="post-form" onsubmit="createPost(event)" class="space-y-4">
                        <textarea id="postContent" required placeholder="Write a caption..." rows="4" class="w-full border-0 focus:ring-0 p-2 text-sm resize-none outline-none border-b border-gray-100"></textarea>
                        
                        <div class="flex flex-col items-center justify-center border-2 border-dashed border-gray-200 rounded-lg p-6 bg-gray-50 hover:bg-gray-100 transition-colors cursor-pointer relative">
                            <input type="file" id="mediaUpload" accept="image/*,video/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="updateFileName()">
                            <i class="far fa-images text-3xl text-gray-400 mb-2"></i>
                            <span id="file-name" class="text-xs text-gray-500 font-medium text-center px-2">Select photos or videos from your device</span>
                        </div>

                        <button type="submit" id="post-submit-btn" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 rounded text-sm transition-all disabled:opacity-50">
                            Share Post
                        </button>
                    </form>
                </div>
            </div>

            <div id="view-profile" class="tab-view hidden p-4 sm:p-0">
                <div class="flex flex-col sm:flex-row items-center gap-6 sm:gap-12 pb-8 border-b border-gray-200 mb-6">
                    <div class="relative group cursor-pointer w-24 h-24 sm:w-32 sm:h-32 rounded-full overflow-hidden border border-gray-200 bg-gray-50 flex items-center justify-center">
                        <img id="profile-avatar" src="https://via.placeholder.com/150" class="w-full h-full object-cover hidden">
                        <i id="profile-avatar-icon" class="fas fa-user text-gray-300 text-5xl"></i>
                        
                        <label class="absolute inset-0 bg-black bg-opacity-40 flex flex-col items-center justify-center text-white opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
                            <i class="fas fa-camera text-xl"></i>
                            <span class="text-[10px] mt-1 font-semibold">Update Picture</span>
                            <input type="file" id="avatarUpload" accept="image/*" class="hidden" onchange="uploadProfilePicture()">
                        </label>
                    </div>

                    <div class="text-center sm:text-left flex-1 space-y-3">
                        <div class="flex flex-col sm:flex-row sm:items-center gap-3">
                            <h2 id="profile-username" class="text-xl font-light text-gray-900">Username</h2>
                            <span id="profile-email" class="text-xs text-gray-400 font-mono">user@email.com</span>
                        </div>
                        <div class="flex justify-center sm:justify-start gap-6 text-sm text-gray-700">
                            <div><span id="profile-post-count" class="font-semibold text-gray-900">0</span> posts</div>
                            <div><span class="font-semibold text-gray-900">1.2k</span> followers</div>
                            <div><span class="font-semibold text-gray-900">480</span> following</div>
                        </div>
                        <div class="text-sm font-semibold" id="profile-display-name">Anonymous User</div>
                    </div>
                </div>

                <div id="profile-posts-grid" class="grid grid-cols-3 gap-1 sm:gap-4">
                    </div>
            </div>

        </main>

        <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 h-12 flex items-center justify-around text-xl text-gray-700 sm:hidden z-50">
            <button onclick="switchTab('feed')"><i class="fas fa-home"></i></button>
            <button onclick="switchTab('create')"><i class="far fa-plus-square"></i></button>
            <button onclick="switchTab('profile')"><i class="far fa-user"></i></button>
        </div>
    </div>

    <script>
        // --- APPWRITE CONFIGURATION ---
        const APPWRITE_ENDPOINT = "https://sgp.cloud.appwrite.io/v1"; 
        const APPWRITE_PROJECT_ID = "6a2e4a110007f2358f48";     
        const DATABASE_ID = "6a4928f30008f6f3aab8";           
        const COLLECTION_ID = "posts";       
        const BUCKET_ID = "6a494107003e1b16b976"; 

        // Initialize Appwrite Clients
        const client = new Appwrite.Client().setEndpoint(APPWRITE_ENDPOINT).setProject(APPWRITE_PROJECT_ID);
        const account = new Appwrite.Account(client);
        const databases = new Appwrite.Databases(client);
        const storage = new Appwrite.Storage(client);

        let currentUser = null;
        let isSignUp = false;
        let globalPostsCache = [];

        // Check verification states inside DOM lifecycle
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                currentUser = await account.get();
                showAppLayout();
                updateUserAvatarViews();
                loadPosts();
            } catch (error) {
                showLoginLayout();
            }
        });

        // Toggle UI modes between Sign In vs Register Account screens
        function toggleAuthMode() {
            isSignUp = !isSignUp;
            document.getElementById('name-field').style.display = isSignUp ? 'block' : 'none';
            document.getElementById('auth-submit-btn').innerText = isSignUp ? 'Sign Up' : 'Log In';
            document.getElementById('auth-toggle-link').innerHTML = isSignUp ? "Have an account? <span class='font-semibold'>Log In</span>" : "Don't have an account? <span class='font-semibold'>Sign Up</span>";
        }

        async function handleEmailAuth(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            const errorBox = document.getElementById('auth-error');
            const btn = document.getElementById('auth-submit-btn');
            
            errorBox.classList.add('hidden');
            btn.innerText = 'Processing...';
            btn.disabled = true;
            
            try {
                if (isSignUp) {
                    await account.create(Appwrite.ID.unique(), email, password, name || 'Anonymous');
                }
                await account.createEmailPasswordSession(email, password);
                window.location.reload();
            } catch (error) {
                errorBox.innerText = error.message;
                errorBox.classList.remove('hidden');
                btn.innerText = isSignUp ? 'Sign Up' : 'Log In';
                btn.disabled = false;
            }
        }

        function loginWithGoogle() {
            const redirectUrl = window.location.origin + window.location.pathname;
            account.createOAuth2Session('google', redirectUrl, redirectUrl);
        }

        async function logout() {
            try {
                await account.deleteSession('current');
                window.location.reload();
            } catch (error) {
                console.error("Logout failed:", error);
            }
        }

        // Tab views system routing switches
        function switchTab(tabId) {
            document.querySelectorAll('.tab-view').forEach(view => view.classList.add('hidden'));
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            
            if (tabId === 'profile') {
                renderProfileView();
            }
        }

        function updateFileName() {
            const fileInput = document.getElementById('mediaUpload');
            const fileNameDisplay = document.getElementById('file-name');
            if (fileInput.files.length > 0) {
                fileNameDisplay.innerText = `Selected: ${fileInput.files[0].name}`;
            }
        }

        // Universal Profile Picture Sync Layer
        function getUserAvatarUrl(userObject) {
            // Evaluates preferences metadata tags for assigned profile pictures
            if (userObject && userObject.prefs && userObject.prefs.avatarId) {
                return storage.getFileView(BUCKET_ID, userObject.prefs.avatarId);
            }
            return null;
        }

        function updateUserAvatarViews() {
            const avatarUrl = getUserAvatarUrl(currentUser);
            const navAvatar = document.getElementById('nav-avatar');
            const navIcon = document.getElementById('nav-avatar-icon');
            const profileAvatar = document.getElementById('profile-avatar');
            const profileIcon = document.getElementById('profile-avatar-icon');

            if (avatarUrl) {
                if (navAvatar) { navAvatar.src = avatarUrl; navAvatar.classList.remove('hidden'); }
                if (navIcon) navIcon.classList.add('hidden');
                
                if (profileAvatar) { profileAvatar.src = avatarUrl; profileAvatar.classList.remove('hidden'); }
                if (profileIcon) profileIcon.classList.add('hidden');
            }
        }

        // Update User Profile Images Engine File Uploader
        async function uploadProfilePicture() {
            const fileInput = document.getElementById('avatarUpload');
            if (fileInput.files.length === 0) return;

            const file = fileInput.files[0];
            try {
                // Upload avatar layout directly onto appwrite cloud storage buckets
                const uploadedFile = await storage.createFile(BUCKET_ID, Appwrite.ID.unique(), file);
                
                // Save avatar metadata references straight onto the preferences parameters mapping table
                const currentPrefs = currentUser.prefs || {};
                await account.updatePrefs({ ...currentPrefs, avatarId: uploadedFile.$id });
                
                // Refresh local session configuration cache
                currentUser = await account.get();
                updateUserAvatarViews();
                loadPosts(); // Re-render feeds with structural identity shifts
                alert("Profile image updated successfully!");
            } catch (error) {
                alert("Failed to change profile asset: " + error.message);
            }
        }

        // Fetch updates from active structural application documents
        async function loadPosts() {
            const container = document.getElementById('posts-container');
            try {
                const response = await databases.listDocuments(
                    DATABASE_ID,
                    COLLECTION_ID,
                    [Appwrite.Query.orderDesc('$createdAt')]
                );
                
                globalPostsCache = response.documents;
                
                if (globalPostsCache.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-20 bg-white border border-gray-200 rounded sm:p-12">
                            <i class="far fa-image text-5xl text-gray-300 mb-3"></i>
                            <p class="text-gray-500 font-medium text-sm">No Posts Yet</p>
                        </div>`;
                    return;
                }

                container.innerHTML = globalPostsCache.map(post => {
                    const date = new Date(post.$createdAt).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
                    const displayName = escapeHtml(post.userName || 'Anonymous User');
                    
                    // Handle Post Avatar Verification Layouts
                    let avatarMarkup = `<i class="fas fa-user-circle text-gray-300 text-3xl"></i>`;
                    // If your collection tracks avatarId per post, pull it from post attributes
                    if (post.avatarId) {
                        avatarMarkup = `<img src="${storage.getFileView(BUCKET_ID, post.avatarId)}" class="w-full h-full object-cover">`;
                    } else if (post.userId === currentUser.$id && getUserAvatarUrl(currentUser)) {
                        avatarMarkup = `<img src="${getUserAvatarUrl(currentUser)}" class="w-full h-full object-cover">`;
                    }

                    let mediaHTML = '';
                    if (post.mediaId) {
                        const fileUrl = storage.getFileView(BUCKET_ID, post.mediaId);
                        if (post.mediaType === 'video') {
                            mediaHTML = `<div class="bg-black w-full flex items-center justify-center"><video controls class="w-full max-h-[500px] object-contain" src="${fileUrl}"></video></div>`;
                        } else {
                            mediaHTML = `<div class="bg-gray-50 w-full flex items-center justify-center"><img class="w-full max-h-[600px] object-contain" src="${fileUrl}" alt="Post image"></div>`;
                        }
                    }

                    return `
                        <article class="bg-white border-b sm:border border-gray-200 sm:rounded-sm overflow-hidden max-w-lg mx-auto">
                            <div class="flex items-center justify-between p-3">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-full overflow-hidden border border-gray-200 flex items-center justify-center bg-gray-50">
                                        ${avatarMarkup}
                                    </div>
                                    <span class="font-semibold text-sm text-gray-900">${displayName}</span>
                                </div>
                                <span class="text-[11px] font-semibold text-gray-400 uppercase">${date}</span>
                            </div>

                            ${mediaHTML}

                            <div class="p-3 space-y-2">
                                <div class="flex items-center gap-4 text-xl text-gray-800">
                                    <button class="hover:text-red-500 transition-colors"><i class="far fa-heart"></i></button>
                                    <button class="hover:text-gray-500 transition-colors"><i class="far fa-comment"></i></button>
                                    <button class="hover:text-blue-500 transition-colors"><i class="far fa-paper-plane"></i></button>
                                </div>
                                <p class="text-sm text-gray-800 leading-relaxed">
                                    <span class="font-semibold mr-2">${displayName}</span>${escapeHtml(post.content)}
                                </p>
                            </div>
                        </article>
                    `;
                }).join('');
            } catch (error) {
                container.innerHTML = `<p class="text-red-500 p-4 text-center text-xs">Failed to load feed: ${error.message}</p>`;
            }
        }

        // Profile Dashboard Page Controller Viewport Architecture Mapping Layer
        function renderProfileView() {
            document.getElementById('profile-username').innerText = currentUser.email.split('@')[0];
            document.getElementById('profile-email').innerText = currentUser.email;
            document.getElementById('profile-display-name').innerText = currentUser.name || "Anonymous User";

            // Filters global dataset rows matching user identities directly
            const myPosts = globalPostsCache.filter(post => post.userId === currentUser.$id || post.userName === currentUser.name || post.userName === currentUser.email);
            document.getElementById('profile-post-count').innerText = myPosts.length;

            const gridContainer = document.getElementById('profile-posts-grid');
            if (myPosts.length === 0) {
                gridContainer.className = "block text-center py-12 text-gray-400 text-sm border-t border-gray-100";
                gridContainer.innerHTML = `<i class="fas fa-camera text-4xl mb-2 text-gray-200"></i><p>No Posts Formed Yet</p>`;
                return;
            }

            // Standardize responsive 3x3 layout formats layout configurations configurations
            gridContainer.className = "grid grid-cols-3 gap-1 sm:gap-4";
            gridContainer.innerHTML = myPosts.map(post => {
                if (!post.mediaId) {
                    return `
                        <div onclick="switchTab('feed')" class="aspect-square bg-gray-100 p-3 flex items-center justify-center text-xs font-medium text-gray-500 overflow-hidden border border-gray-200 cursor-pointer hover:opacity-90">
                           <p class="line-clamp-3">${escapeHtml(post.content)}</p>
                        </div>
                    `;
                }

                const assetUrl = storage.getFileView(BUCKET_ID, post.mediaId);
                if (post.mediaType === 'video') {
                    return `
                        <div onclick="switchTab('feed')" class="aspect-square bg-gray-50 relative overflow-hidden cursor-pointer hover:opacity-90 border border-gray-100">
                            <video src="${assetUrl}" class="w-full h-full object-cover"></video>
                            <div class="absolute top-2 right-2 text-white drop-shadow"><i class="fas fa-video text-xs"></i></div>
                        </div>
                    `;
                }

                return `
                    <div onclick="switchTab('feed')" class="aspect-square bg-gray-50 overflow-hidden cursor-pointer hover:opacity-90 border border-gray-100">
                        <img src="${assetUrl}" class="w-full h-full object-cover" alt="Grid preview">
                    </div>
                `;
            }).join('');
        }

        // Post Creation Actions Submission Dispatcher
        async function createPost(event) {
            event.preventDefault();
            const textarea = document.getElementById('postContent');
            const fileInput = document.getElementById('mediaUpload');
            const btn = document.getElementById('post-submit-btn');
            
            const content = textarea.value.trim();
            const file = fileInput.files[0];

            if (!content && !file) return;

            btn.innerText = 'Sharing...';
            btn.disabled = true;

            try {
                let mediaId = null;
                let mediaType = null;

                if (file) {
                    const uploadedFile = await storage.createFile(BUCKET_ID, Appwrite.ID.unique(), file);
                    mediaId = uploadedFile.$id;
                    mediaType = file.type.startsWith('video') ? 'video' : 'image';
                }

                // Append your custom current user profile state parameters inside data rows
                await databases.createDocument(
                    DATABASE_ID,
                    COLLECTION_ID,
                    Appwrite.ID.unique(),
                    {
                        content: content,
                        userName: currentUser.name || currentUser.email,
                        mediaId: mediaId,
                        mediaType: mediaType,
                        userId: currentUser.$id,
                        avatarId: currentUser.prefs ? currentUser.prefs.avatarId : null // optional fallback tracker property field mapping
                    }
                );
                
                textarea.value = '';
                fileInput.value = '';
                document.getElementById('file-name').innerText = 'Select photos or videos from your device';
                
                await loadPosts(); 
                switchTab('feed');
            } catch (error) {
                alert("Error making post: " + error.message);
            } finally {
                btn.innerText = 'Share Post';
                btn.disabled = false;
            }
        }

        // Authentication Screen Visual Switch Layout Handlers
        function showAppLayout() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
        }

        function showLoginLayout() {
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('auth-screen').classList.add('flex');
        }

        function escapeHtml(str) {
            if (!str) return "";
            return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
