<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Social App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans antialiased text-gray-900">

    <div id="auth-screen" class="hidden flex-col items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-gray-100">
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-blue-100 text-blue-600 mb-4">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z"></path></svg>
                </div>
                <h1 id="auth-title" class="text-2xl font-bold text-gray-900">Welcome Back</h1>
                <p class="text-gray-500 text-sm mt-1">Sign in to see what's happening.</p>
            </div>
            
            <div id="auth-error" class="hidden mb-4 p-3 bg-red-50 text-red-700 border border-red-200 rounded-lg text-sm text-center"></div>

            <form id="auth-form" onsubmit="handleEmailAuth(event)" class="space-y-4">
                <div id="name-field" style="display: none;">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Display Name</label>
                    <input type="text" id="name" placeholder="John Doe" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="email" required placeholder="you@example.com" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" required minlength="8" placeholder="••••••••" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none">
                </div>
                <button type="submit" id="auth-submit-btn" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-xl hover:bg-blue-700 active:scale-[0.98] transition-all shadow-md shadow-blue-200">
                    Sign In
                </button>
            </form>

            <div class="mt-5 text-center">
                <button type="button" onclick="toggleAuthMode()" id="auth-toggle-link" class="text-sm font-medium text-blue-600 hover:text-blue-800 transition-colors">
                    Don't have an account? Sign Up
                </button>
            </div>

            <div class="flex items-center my-6">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="mx-4 text-xs font-semibold text-gray-400 uppercase">Or</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <button onclick="loginWithGoogle()" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-100 text-gray-700 font-bold py-2.5 px-4 rounded-xl hover:bg-gray-50 hover:border-gray-200 active:scale-[0.98] transition-all">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google Logo">
                Continue with Google
            </button>
        </div>
    </div>

    <div id="app-screen" class="hidden max-w-2xl mx-auto p-4 sm:p-6 pb-24">
        
        <nav class="flex flex-col sm:flex-row justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-gray-100 mb-6 gap-4">
            <div class="font-black text-xl text-blue-600 tracking-tight w-full sm:w-auto text-center sm:text-left">SocialApp</div>
            
            <div class="flex items-center gap-4">
                <label class="cursor-pointer group relative">
                    <div id="nav-avatar" class="w-10 h-10 rounded-full bg-gray-100 border-2 border-gray-200 flex items-center justify-center overflow-hidden object-cover">
                        <svg class="w-5 h-5 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg>
                    </div>
                    <div class="absolute inset-0 bg-black bg-opacity-50 rounded-full hidden group-hover:flex items-center justify-center transition-all">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </div>
                    <input type="file" id="profileUpload" accept="image/*" class="hidden" onchange="uploadProfilePicture(event)">
                </label>
                
                <span id="user-name" class="font-semibold text-gray-700 text-sm"></span>
                <button onclick="logout()" class="text-sm bg-gray-100 hover:bg-red-50 hover:text-red-600 text-gray-700 px-4 py-2 rounded-xl font-bold transition-colors">
                    Sign Out
                </button>
            </div>
        </nav>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-8">
            <form id="post-form" onsubmit="createPost(event)">
                <textarea id="postContent" required placeholder="What's on your mind right now?" rows="3" class="w-full bg-gray-50 border border-gray-100 rounded-xl p-4 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all resize-none"></textarea>
                
                <div class="flex justify-between items-center mt-3">
                    <label class="cursor-pointer text-gray-500 hover:text-blue-600 flex items-center gap-2 text-sm font-medium transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <span>Attach Media</span>
                        <input type="file" id="mediaUpload" accept="image/*,video/*" class="hidden" onchange="updateFileName()">
                    </label>
                    <span id="file-name" class="text-xs text-gray-400 mr-auto ml-3 overflow-hidden text-ellipsis whitespace-nowrap max-w-[150px]"></span>

                    <button type="submit" id="post-submit-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-xl shadow-md shadow-blue-200 active:scale-[0.97] transition-all">
                        Post
                    </button>
                </div>
            </form>
        </div>

        <div>
            <h2 class="text-lg font-bold mb-4 text-gray-800 px-1">Latest Updates</h2>
            <div id="posts-container" class="space-y-4">
                <p class="text-gray-500 text-center py-8 font-medium">Fetching feed...</p>
            </div>
        </div>
    </div>

    <script>
        // --- APPWRITE CONFIGURATION ---
        const APPWRITE_ENDPOINT = "https://sgp.cloud.appwrite.io/v1"; 
        const APPWRITE_PROJECT_ID = "6a2e4a110007f2358f48";     
        const DATABASE_ID = "6a4928f30008f6f3aab8";           
        const COLLECTION_ID = "posts";       
        const BUCKET_ID = "6a494107003e1b16b976"; 

        const client = new Appwrite.Client()
            .setEndpoint(APPWRITE_ENDPOINT)
            .setProject(APPWRITE_PROJECT_ID);

        const account = new Appwrite.Account(client);
        const databases = new Appwrite.Databases(client);
        const storage = new Appwrite.Storage(client); 

        let currentUser = null;
        let userPrefs = null;
        let isSignUp = false;

        // Check login status on page load
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                currentUser = await account.get();
                userPrefs = await account.getPrefs();
                showAppLayout();
                loadPosts();
            } catch (error) {
                console.error("Login Error:", error);
                // Keeping the alert so you can debug if Vercel still blocks you!
                if(error.code !== 401) alert("Connection note: " + error.message); 
                showLoginLayout();
            }
        });

        // --- IMAGE COMPRESSION LOGIC (HTML5 CANVAS) ---
        function compressImage(file, maxWidth = 1200, quality = 0.8) {
            return new Promise((resolve) => {
                // Do not compress videos or gifs
                if (!file.type.startsWith('image/') || file.type.includes('gif')) {
                    return resolve(file); 
                }

                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;

                        // Calculate new dimensions maintaining aspect ratio
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        canvas.toBlob((blob) => {
                            resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                        }, 'image/jpeg', quality);
                    };
                };
            });
        }

        // --- AUTHENTICATION ---
        function toggleAuthMode() {
            isSignUp = !isSignUp;
            document.getElementById('name-field').style.display = isSignUp ? 'block' : 'none';
            document.getElementById('auth-submit-btn').innerText = isSignUp ? 'Create Account' : 'Sign In';
            document.getElementById('auth-toggle-link').innerText = isSignUp ? 'Already have an account? Sign In' : "Don't have an account? Sign Up";
            document.getElementById('auth-title').innerText = isSignUp ? 'Join the Community' : 'Welcome Back';
        }

        async function handleEmailAuth(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            const errorBox = document.getElementById('auth-error');
            const btn = document.getElementById('auth-submit-btn');
            
            errorBox.classList.add('hidden');
            btn.innerText = 'Processing...';
            btn.disabled = true;
            
            try {
                if (isSignUp) {
                    await account.create(Appwrite.ID.unique(), email, password, name || 'Anonymous');
                }
                await account.createEmailPasswordSession(email, password);
                window.location.reload();
            } catch (error) {
                errorBox.innerText = error.message;
                errorBox.classList.remove('hidden');
                btn.innerText = isSignUp ? 'Create Account' : 'Sign In';
                btn.disabled = false;
            }
        }

        function loginWithGoogle() {
            const redirectUrl = window.location.origin + window.location.pathname;
            account.createOAuth2Session('google', redirectUrl, redirectUrl);
        }

        async function logout() {
            try {
                await account.deleteSession('current');
                window.location.reload();
            } catch (error) {
                console.error("Logout failed:", error);
            }
        }

        // --- PROFILE PICTURE UPLOAD ---
        async function uploadProfilePicture(event) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                // 1. Compress Image
                const compressedFile = await compressImage(file, 400, 0.7); // Smaller max-width for avatars

                // 2. Upload to Storage
                const uploadedFile = await storage.createFile(BUCKET_ID, Appwrite.ID.unique(), compressedFile);
                
                // 3. Save to User Preferences
                userPrefs = await account.updatePrefs({ profilePicId: uploadedFile.$id });
                
                // 4. Update UI
                updateNavbarAvatar();
                alert("Profile picture updated successfully!");
                loadPosts(); // Reload feed to show new avatar on new posts (if applied dynamically)

            } catch (error) {
                alert("Error updating profile picture: " + error.message);
            }
        }

        function updateNavbarAvatar() {
            const navAvatar = document.getElementById('nav-avatar');
            if (userPrefs && userPrefs.profilePicId) {
                // Get heavily compressed thumbnail preview from Appwrite CDN
                const avatarUrl = storage.getFilePreview(BUCKET_ID, userPrefs.profilePicId, 100, 100, 'center', 90);
                navAvatar.innerHTML = `<img src="${avatarUrl}" class="w-full h-full object-cover">`;
            }
        }

        // --- POSTING LOGIC ---
        function updateFileName() {
            const fileInput = document.getElementById('mediaUpload');
            const fileNameDisplay = document.getElementById('file-name');
            if (fileInput.files.length > 0) {
                fileNameDisplay.innerText = fileInput.files[0].name;
            } else {
                fileNameDisplay.innerText = '';
            }
        }

        async function createPost(event) {
            event.preventDefault();
            const textarea = document.getElementById('postContent');
            const fileInput = document.getElementById('mediaUpload');
            const fileNameDisplay = document.getElementById('file-name');
            const btn = document.getElementById('post-submit-btn');
            
            const content = textarea.value.trim();
            const originalFile = fileInput.files[0];

            if (!content && !originalFile) return; 

            btn.innerText = 'Posting...';
            btn.disabled = true;

            try {
                let mediaId = null;
                let mediaType = null;

                if (originalFile) {
                    btn.innerText = 'Compressing...';
                    // Compress file before upload to save space!
                    const finalFile = await compressImage(originalFile, 1080, 0.8);
                    
                    btn.innerText = 'Uploading...';
                    const uploadedFile = await storage.createFile(BUCKET_ID, Appwrite.ID.unique(), finalFile);
                    mediaId = uploadedFile.$id;
                    mediaType = finalFile.type.startsWith('video') ? 'video' : 'image';
                }

                btn.innerText = 'Saving Post...';
                await databases.createDocument(
                    DATABASE_ID,
                    COLLECTION_ID,
                    Appwrite.ID.unique(),
                    {
                        content: content,
                        userName: currentUser.name || currentUser.email || "Anonymous User",
                        mediaId: mediaId,
                        mediaType: mediaType,
                        // Attach the user's current profile picture ID to the post
                        userProfilePic: userPrefs.profilePicId || null 
                    }
                );
                
                textarea.value = '';
                fileInput.value = '';
                fileNameDisplay.innerText = '';
                loadPosts(); 
            } catch (error) {
                alert("Error sending update: " + error.message);
            } finally {
                btn.innerText = 'Post';
                btn.disabled = false;
            }
        }

        // --- FETCHING & RENDERING POSTS ---
        async function loadPosts() {
            const container = document.getElementById('posts-container');
            try {
                const response = await databases.listDocuments(
                    DATABASE_ID,
                    COLLECTION_ID,
                    [Appwrite.Query.orderDesc('$createdAt')]
                );
                
                if (response.documents.length === 0) {
                    container.innerHTML = `
                        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 text-center">
                            <span class="text-4xl block mb-2">👋</span>
                            <p class="text-gray-500 font-medium">It's quiet in here. Be the first to post!</p>
                        </div>`;
                    return;
                }

                container.innerHTML = response.documents.map(post => {
                    const date = new Date(post.$createdAt).toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    const displayName = escapeHtml(post.userName || 'Anonymous User');
                    
                    // Render Avatar
                    let avatarHTML = '';
                    if (post.userProfilePic) {
                        const avatarUrl = storage.getFilePreview(BUCKET_ID, post.userProfilePic, 100, 100, 'center', 90);
                        avatarHTML = `<img src="${avatarUrl}" class="w-full h-full object-cover">`;
                    } else {
                        const initial = displayName.charAt(0).toUpperCase();
                        avatarHTML = `<span class="text-blue-700 font-black text-sm">${initial}</span>`;
                    }

                    // Render Post Media (Using getFilePreview for automatic CDN compression on display)
                    let mediaHTML = '';
                    if (post.mediaId) {
                        if (post.mediaType === 'video') {
                            const videoUrl = storage.getFileView(BUCKET_ID, post.mediaId);
                            mediaHTML = `<video controls class="w-full mt-3 rounded-xl border border-gray-100 max-h-[400px] object-cover bg-black" src="${videoUrl}"></video>`;
                        } else {
                            // Using getFilePreview here gives us WebP format automatically, saving huge amounts of bandwidth
                            const imageUrl = storage.getFilePreview(BUCKET_ID, post.mediaId, 800, 0, 'center', 90);
                            mediaHTML = `<img class="w-full mt-3 rounded-xl border border-gray-100 max-h-[400px] object-cover" src="${imageUrl}" alt="Post attachment" loading="lazy">`;
                        }
                    }

                    return `
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                            <div class="flex items-center justify-between mb-3">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full bg-blue-100 border border-blue-200 flex items-center justify-center overflow-hidden">
                                        ${avatarHTML}
                                    </div>
                                    <span class="font-bold text-gray-900">${displayName}</span>
                                </div>
                                <span class="text-xs font-semibold text-gray-400 bg-gray-50 py-1 px-2 rounded-lg">${date}</span>
                            </div>
                            <p class="text-gray-700 whitespace-pre-wrap leading-relaxed mt-2 text-[15px]">${escapeHtml(post.content)}</p>
                            ${mediaHTML}
                        </div>
                    `;
                }).join('');
            } catch (error) {
                container.innerHTML = `<p class="text-red-500 bg-red-50 border border-red-100 p-4 rounded-xl text-center">Failed to load feed data: ${error.message}</p>`;
            }
        }

        // --- LAYOUT HELPERS ---
        function showAppLayout() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('auth-screen').classList.remove('flex');
            document.getElementById('app-screen').classList.remove('hidden');
            
            const displayName = currentUser.name || currentUser.email.split('@')[0];
            document.getElementById('user-name').innerText = `Hi, ${displayName}`;
            
            updateNavbarAvatar();
        }

        function showLoginLayout() {
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('auth-screen').classList.add('flex');
        }

        function escapeHtml(str) {
            if (!str) return "";
            return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
