<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern GIF Picker (Powered by KLIPY)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar configurations */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0f172a;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 9999px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4 antialiased">

    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl flex flex-col h-[550px] overflow-hidden relative">
        
        <div class="p-4 border-b border-slate-800 flex items-center justify-between bg-slate-900/50 backdrop-blur">
            <h1 class="text-base font-bold tracking-tight text-white flex items-center gap-2">
                <span class="inline-block w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span>
                GIF Picker
            </h1>
            <span class="text-[10px] font-bold px-2 py-0.5 bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 rounded-full tracking-wider uppercase">KLIPY API Enabled</span>
        </div>

        <div class="p-3 bg-slate-900 border-b border-slate-800/60 sticky top-0 z-10">
            <div class="relative">
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Search KLIPY..." 
                    class="w-full bg-slate-950 border border-slate-800 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 text-slate-200 placeholder-slate-500 rounded-xl pl-10 pr-9 py-2 text-sm transition-all outline-none"
                >
                <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
                    </svg>
                </div>
                <button id="clear-btn" class="hidden absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>

        <div id="gif-container" class="flex-1 overflow-y-auto custom-scrollbar p-3 grid grid-cols-2 gap-2 content-start">
            </div>

        <div id="skeleton-loader" class="hidden grid grid-cols-2 gap-2 p-3 absolute inset-x-0 bottom-10 top-28 bg-slate-900 pointer-events-none z-20 overflow-hidden">
            <div class="bg-slate-800/40 rounded-xl animate-pulse h-32"></div>
            <div class="bg-slate-800/40 rounded-xl animate-pulse h-32"></div>
            <div class="bg-slate-800/40 rounded-xl animate-pulse h-32"></div>
            <div class="bg-slate-800/40 rounded-xl animate-pulse h-32"></div>
        </div>

        <div class="p-2.5 bg-slate-950 border-t border-slate-800 flex items-center justify-between text-[10px] text-slate-500 font-medium px-4">
            <div>Click any image to copy its source link</div>
            <div class="flex items-center gap-1 opacity-70">
                <span>Powered by</span>
                <span class="font-black tracking-widest text-slate-300">KLIPY</span>
            </div>
        </div>

        <div id="toast" class="absolute bottom-14 left-1/2 -translate-x-1/2 px-4 py-1.5 bg-indigo-600 text-white text-xs font-bold rounded-full shadow-xl opacity-0 pointer-events-none transition-all duration-300 translate-y-2 z-30">
            Copied link to clipboard! 🚀
        </div>
    </div>

    <script>
        // Injected Key configurations
        const API_KEY = 'oSbUXvrwkPMlofREhdZqXvaE3acHBX1zpMeS3vm2a1pYsIDPItqo3URrn8tHt75t';
        const BASE_URL = `https://api.klipy.com/api/v1/${API_KEY}/gifs`;
        
        // Context state machines
        let currentQuery = '';
        let currentPage = 1;
        let isLoading = false;
        let hasMore = true;

        // UI Handlers Cache
        const gifContainer = document.getElementById('gif-container');
        const searchInput = document.getElementById('search-input');
        const clearBtn = document.getElementById('clear-btn');
        const skeletonLoader = document.getElementById('skeleton-loader');
        const toast = document.getElementById('toast');

        // Extracting standard/high quality full-frame URLs securely
        function getGifUrl(item) {
            if (item.files) {
                const resolutionPriority = ['md', 'hd', 'sm', 'xs'];
                for (const res of resolutionPriority) {
                    if (item.files[res]) {
                        if (typeof item.files[res] === 'string') return item.files[res];
                        if (item.files[res].url) return item.files[res].url;
                        if (item.files[res].gif) return item.files[res].gif;
                    }
                }
            }
            if (item.media?.tinygif?.url) return item.media.tinygif.url;
            if (item.url) return item.url;
            return '';
        }

        // Resolving low-overhead asset pointers for responsive previews
        function getPreviewUrl(item) {
            if (item.files) {
                const lightweightPriority = ['sm', 'xs', 'md', 'hd'];
                for (const res of lightweightPriority) {
                    if (item.files[res]) {
                        if (typeof item.files[res] === 'string') return item.files[res];
                        if (item.files[res].url) return item.files[res].url;
                        if (item.files[res].gif) return item.files[res].gif;
                    }
                }
            }
            if (item.media?.nanogif?.url) return item.media.nanogif.url;
            return getGifUrl(item);
        }

        // Network pipeline executor
        async function loadGifs(isNewQuery = false) {
            if (isLoading) return;
            isLoading = true;

            if (isNewQuery) {
                currentPage = 1;
                gifContainer.innerHTML = '';
                skeletonLoader.classList.remove('hidden');
                hasMore = true;
            }

            try {
                const endpoint = currentQuery ? 'search' : 'trending';
                const queryParameters = new URLSearchParams({
                    per_page: 20,
                    page: currentPage
                });
                
                if (currentQuery) {
                    queryParameters.append('q', currentQuery);
                }

                const endpointResponse = await fetch(`${BASE_URL}/${endpoint}?${queryParameters.toString()}`);
                if (!endpointResponse.ok) throw new Error('API processing communication error.');

                const dataPayload = await endpointResponse.json();
                const items = dataPayload.results || [];

                if (items.length === 0) {
                    if (isNewQuery) {
                        gifContainer.innerHTML = `
                            <div class="col-span-2 text-center py-16 text-slate-500 text-xs tracking-wide">
                                No content discovered matching "${currentQuery}"
                            </div>
                        `;
                    }
                    hasMore = false;
                } else {
                    renderGifs(items);
                    currentPage++;
                }
            } catch (error) {
                console.error('Fatal API compilation runtime failure:', error);
                if (isNewQuery) {
                    gifContainer.innerHTML = `
                        <div class="col-span-2 text-center py-16 text-rose-400/80 text-xs">
                            Engine failed to compile content feed. Check Key configuration or network connection.
                        </div>
                    `;
                }
            } finally {
                isLoading = false;
                skeletonLoader.classList.add('hidden');
            }
        }

        // UI rendering engine
        function renderGifs(items) {
            items.forEach(item => {
                const targetLink = getGifUrl(item);
                const visualSource = getPreviewUrl(item);
                const descriptor = item.title || 'Klipy Expressive Stream';

                if (!targetLink) return;

                const wrapperNode = document.createElement('div');
                wrapperNode.className = 'relative overflow-hidden rounded-xl bg-slate-950 border border-slate-800/60 cursor-pointer group hover:border-indigo-500/50 transition-all duration-300 h-28 bg-cover bg-center';
                
                wrapperNode.innerHTML = `
                    <img 
                        src="${visualSource}" 
                        alt="${descriptor}" 
                        loading="lazy"
                        class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
                        onerror="this.style.display='none';"
                    >
                    <div class="absolute inset-0 bg-gradient-to-t from-slate-950/90 via-slate-950/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-2">
                        <span class="text-[9px] text-slate-300 font-medium truncate w-full tracking-wide">${descriptor}</span>
                    </div>
                `;

                // Clipboard Event
                wrapperNode.addEventListener('click', () => {
                    navigator.clipboard.writeText(targetLink).then(() => {
                        triggerNotificationBadge();
                    }).catch(error => {
                        console.error('System Clipboard access denied:', error);
                    });
                });

                gifContainer.appendChild(wrapperNode);
            });
        }

        // Animation badge popups
        function triggerNotificationBadge() {
            toast.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-2');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'pointer-events-none', 'translate-y-2');
            }, 1800);
        }

        // Input monitoring with typing delay (Debounce)
        let keystrokeThrottleTimer;
        searchInput.addEventListener('input', (event) => {
            const rawStringValue = event.target.value.trim();
            
            if (rawStringValue) {
                clearBtn.classList.remove('hidden');
            } else {
                clearBtn.classList.add('hidden');
            }

            clearTimeout(keystrokeThrottleTimer);
            keystrokeThrottleTimer = setTimeout(() => {
                if (rawStringValue !== currentQuery) {
                    currentQuery = rawStringValue;
                    loadGifs(true);
                }
            }, 450); 
        });

        // Reset click handling
        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearBtn.classList.add('hidden');
            if (currentQuery !== '') {
                currentQuery = '';
                loadGifs(true);
            }
            searchInput.focus();
        });

        // Smart Infinite Scrolling Observer Setup
        gifContainer.addEventListener('scroll', () => {
            if (!hasMore || isLoading) return;
            
            // Fires download pipeline slightly before user triggers zero-bound base bottom boundary
            if (gifContainer.scrollTop + gifContainer.clientHeight >= gifContainer.scrollHeight - 65) {
                loadGifs();
            }
        });

        // Core Document Loop Initialization
        document.addEventListener('DOMContentLoaded', () => {
            loadGifs(true);
        });
    </script>
</body>
</html>
