<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAJH79UQl0rc96Qug0DKLevO4ZI_sn8Kno",
            authDomain: "edulinki.firebaseapp.com",
            projectId: "edulinki",
            storageBucket: "edulinki.firebasestorage.app",
            messagingSenderId: "248886466474",
            appId: "1:248886466474:web:160043201a6b28bafbbdd3"
        };

        // Initialize Firebase & Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Cloudinary Settings (From your prompt)
        const CLOUDINARY_URL = 'https://api.cloudinary.com/v1_1/dcpuyfslg/image/upload';
        const CLOUDINARY_UPLOAD_PRESET = 'unsigned_preset'; // You must create an "unsigned" preset in Cloudinary settings

        // DOM Elements
        const uploadForm = document.getElementById('uploadForm');
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = fileInput.files[0];
            if (!file) return alert("Please select a file first!");

            status.innerText = "Uploading to Cloudinary...";

            try {
                // 1. Upload to Cloudinary
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', 'ml_default'); // Change this to your actual preset name

                const cloudRes = await fetch(CLOUDINARY_URL, {
                    method: 'POST',
                    body: formData
                });
                const cloudData = await cloudRes.json();
                
                if (!cloudData.secure_url) throw new Error("Cloudinary upload failed");

                // 2. Save Link to Firebase Firestore
                status.innerText = "Saving to database...";
                await addDoc(collection(db, "anonymous_posts"), {
                    imageUrl: cloudData.secure_url,
                    createdAt: serverTimestamp(),
                    type: "anonymous"
                });

                status.innerHTML = `<span class="text-green-500">Success! Post shared anonymously.</span>`;
                fileInput.value = ''; // Reset
            } catch (error) {
                console.error(error);
                status.innerHTML = `<span class="text-red-500">Error: ${error.message}</span>`;
            }
        });
    </script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700">
        <h1 class="text-2xl font-bold mb-2 text-center text-blue-400">AnonShare</h1>
        <p class="text-gray-400 text-sm text-center mb-6">Post photos completely anonymously.</p>

        <form id="uploadForm" class="space-y-4">
            <div class="border-2 border-dashed border-gray-600 rounded-lg p-4 text-center hover:border-blue-500 transition">
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                <label for="fileInput" class="cursor-pointer block py-4">
                    <span class="block text-gray-300">Click to select an image</span>
                    <span class="text-xs text-gray-500">PNG, JPG, or GIF</span>
                </label>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200">
                Post Anonymously
            </button>
        </form>

        <div id="status" class="mt-4 text-center text-sm font-medium"></div>
    </div>

</body>
</html>
