<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduLink Reels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        /* Custom scrollbar hiding for the feed */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="bg-white text-gray-900 font-sans h-screen w-screen overflow-hidden flex flex-col">

    <div id="login-page" class="flex flex-col items-center justify-center h-full w-full bg-gray-50 absolute z-50">
        <div class="bg-white p-10 rounded-2xl shadow-lg flex flex-col items-center space-y-6 max-w-sm w-full border border-gray-100">
            <div class="bg-black text-white p-3 rounded-xl flex items-center justify-center">
                <i class="ph-bold ph-graduation-cap text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold">Welcome to EduLink</h1>
            <p class="text-gray-500 text-center text-sm">Sign in to watch and share educational reels.</p>
            <button id="google-login-btn" class="w-full flex items-center justify-center space-x-3 bg-white border border-gray-300 rounded-full py-3 px-4 hover:bg-gray-50 transition font-medium">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                <span>Continue with Google</span>
            </button>
        </div>
    </div>

    <div id="main-app" class="hidden flex h-full w-full">
        
        <aside class="w-20 border-r border-gray-100 flex flex-col items-center py-6 justify-between h-full flex-shrink-0">
            <div class="flex flex-col items-center space-y-8">
                <div class="bg-black text-white p-2 rounded-lg cursor-pointer">
                    <i class="ph-bold ph-graduation-cap text-xl"></i>
                </div>
                
                <div class="flex flex-col items-center space-y-6 text-gray-600">
                    <button class="bg-gray-100 text-black p-3 rounded-xl"><i class="ph-fill ph-house text-2xl"></i></button>
                    <button class="hover:text-black p-3"><i class="ph ph-magnifying-glass text-2xl"></i></button>
                    <button id="upload-trigger-btn" class="hover:text-black p-3"><i class="ph ph-plus-square text-2xl"></i></button>
                    <button class="hover:text-black p-3"><i class="ph ph-bell text-2xl"></i></button>
                    <button class="hover:text-black p-3"><i class="ph ph-bookmark-simple text-2xl"></i></button>
                    <img id="sidebar-profile-img" src="https://ui-avatars.com/api/?name=User" class="w-8 h-8 rounded-full border border-gray-200 mt-2 cursor-pointer">
                </div>
            </div>

            <div class="flex flex-col items-center space-y-6 text-gray-400">
                <button class="hover:text-gray-600"><i class="ph-fill ph-squares-four text-2xl"></i></button>
                <button class="hover:text-gray-600"><i class="ph ph-grid-four text-2xl"></i></button>
                <button class="hover:text-gray-600"><i class="ph ph-sidebar-simple text-2xl"></i></button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative">
            
            <header class="flex items-center justify-between px-8 py-4 w-full max-w-5xl mx-auto">
                <div class="flex-1 flex justify-center ml-20">
                    <div class="relative w-96">
                        <i class="ph ph-magnifying-glass absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 text-lg"></i>
                        <input type="text" placeholder="Search EduLink" class="w-full bg-gray-50 border border-gray-100 rounded-full py-2.5 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-gray-200 text-sm">
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <button class="flex items-center space-x-2 border border-gray-200 rounded-full py-2 px-4 hover:bg-gray-50 text-sm font-medium text-gray-700">
                        <i class="ph ph-sliders-horizontal text-lg"></i>
                        <span>Filter</span>
                    </button>
                    <img id="top-profile-img" src="https://ui-avatars.com/api/?name=User" class="w-8 h-8 rounded-full border border-gray-200 cursor-pointer">
                    <button id="logout-btn" class="text-xs text-red-500 hover:underline hidden">Logout</button>
                </div>
            </header>

            <div class="flex-1 overflow-y-scroll no-scrollbar flex justify-center items-center pb-10">
                
                <div class="relative flex items-end">
                    <div class="relative bg-black rounded-[2.5rem] overflow-hidden w-[450px] h-[550px] shadow-sm">
                        <img src="https://images.unsplash.com/photo-1518331539958-316279f53c9b?q=80&w=1000&auto=format&fit=crop" class="w-full h-full object-cover opacity-80" alt="Video thumbnail">
                        
                        <div class="absolute inset-0 flex items-center justify-center">
                            <button class="bg-gray-900/60 text-white rounded-full p-4 backdrop-blur-sm hover:bg-gray-900/80 transition">
                                <i class="ph-fill ph-play text-2xl"></i>
                            </button>
                        </div>

                        <div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black/60 to-transparent">
                            <div class="flex items-start space-x-3 text-white">
                                <div class="bg-green-500 w-10 h-10 rounded-full flex items-center justify-center overflow-hidden border-2 border-white">
                                    <i class="ph-fill ph-globe-hemisphere-west text-2xl text-blue-800"></i>
                                </div>
                                <div>
                                    <h3 class="font-semibold text-sm">@dino</h3>
                                    <p class="text-xs text-gray-200 mt-1 leading-tight">introducing the new things that are really <span class="text-gray-400 cursor-pointer">see more..</span></p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col space-y-4 ml-6 mb-10">
                        <button class="w-12 h-12 bg-white border border-gray-200 rounded-full flex items-center justify-center hover:bg-gray-50 shadow-sm text-gray-600">
                            <i class="ph ph-heart text-2xl"></i>
                        </button>
                        <button class="w-12 h-12 bg-white border border-gray-200 rounded-full flex items-center justify-center hover:bg-gray-50 shadow-sm text-gray-600">
                            <i class="ph ph-chat-circle text-2xl"></i>
                        </button>
                        <button class="w-12 h-12 bg-white border border-gray-200 rounded-full flex items-center justify-center hover:bg-gray-50 shadow-sm text-gray-600">
                            <i class="ph ph-bookmark-simple text-2xl"></i>
                        </button>
                        <button class="w-12 h-12 bg-white border border-gray-200 rounded-full flex items-center justify-center hover:bg-gray-50 shadow-sm text-gray-600">
                            <i class="ph ph-share-fat text-2xl"></i>
                        </button>
                    </div>

                    <div class="absolute -right-32 top-1/2 transform -translate-y-1/2 flex flex-col space-y-16">
                        <button class="w-12 h-12 bg-white border border-gray-200 rounded-full flex items-center justify-center hover:bg-gray-50 shadow-sm text-gray-400">
                            <i class="ph-bold ph-caret-up text-xl"></i>
                        </button>
                        <button class="w-12 h-12 bg-white border border-gray-200 rounded-full flex items-center justify-center hover:bg-gray-50 shadow-sm text-gray-400">
                            <i class="ph-bold ph-caret-down text-xl"></i>
                        </button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div id="upload-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl relative">
            <button id="close-upload-btn" class="absolute top-4 right-4 text-gray-400 hover:text-gray-800"><i class="ph-bold ph-x text-xl"></i></button>
            <h2 class="text-xl font-bold mb-4">Post a new Reel</h2>
            <input type="file" id="video-input" accept="video/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-gray-50 file:text-gray-700 hover:file:bg-gray-100 mb-4 border border-gray-200 rounded-xl p-2">
            <textarea id="caption-input" placeholder="Write a caption..." class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-gray-200 resize-none h-24 mb-4" required></textarea>
            <button id="submit-post-btn" class="w-full bg-black text-white font-semibold py-3 rounded-full hover:bg-gray-800 transition">Upload Video</button>
            <p id="upload-status" class="text-sm text-center mt-3 text-gray-500 hidden">Uploading...</p>
        </div>
    </div>

    <script type="module">
        // Import Firebase functions
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // Firebase Configuration (from prompt)
        const firebaseConfig = {
            apiKey: "AIzaSyAJH79UQl0rc96Qug0DKLevO4ZI_sn8Kno",
            authDomain: "edulinki.firebaseapp.com",
            projectId: "edulinki",
            storageBucket: "edulinki.firebasestorage.app",
            messagingSenderId: "248886466474",
            appId: "1:248886466474:web:160043201a6b28bafbbdd3",
            measurementId: "G-MQBH12VL7N"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // DOM Elements
        const loginPage = document.getElementById('login-page');
        const mainApp = document.getElementById('main-app');
        const googleLoginBtn = document.getElementById('google-login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const sidebarProfileImg = document.getElementById('sidebar-profile-img');
        const topProfileImg = document.getElementById('top-profile-img');

        // Cloudinary Credentials (from prompt)
        // WARNING: Storing Secret in frontend is dangerous. Using Unsigned Presets is recommended.
        const CLOUDINARY_API_KEY = "628741775643666";
        const CLOUDINARY_API_SECRET = "gCCrAX5SjBbtD4THU1hDji-PkZQ";
        const CLOUDINARY_CLOUD_NAME = "YOUR_CLOUD_NAME_HERE"; // <--- Add your cloud name here!
        const CLOUDINARY_UPLOAD_URL = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/video/upload`;

        // Authentication State Listener
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is signed in
                loginPage.classList.add('hidden');
                mainApp.classList.remove('hidden');
                logoutBtn.classList.remove('hidden');
                
                // Update profile pictures
                if(user.photoURL) {
                    sidebarProfileImg.src = user.photoURL;
                    topProfileImg.src = user.photoURL;
                }
            } else {
                // User is signed out
                loginPage.classList.remove('hidden');
                mainApp.classList.add('hidden');
                logoutBtn.classList.add('hidden');
            }
        });

        // Login Logic
        googleLoginBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider).catch((error) => {
                console.error("Error signing in:", error);
                alert("Login failed: " + error.message);
            });
        });

        // Logout Logic
        topProfileImg.addEventListener('click', () => {
             logoutBtn.classList.toggle('hidden');
        });
        logoutBtn.addEventListener('click', () => {
            signOut(auth);
        });

        // ================= Upload Logic =================
        const uploadModal = document.getElementById('upload-modal');
        const uploadTriggerBtn = document.getElementById('upload-trigger-btn');
        const closeUploadBtn = document.getElementById('close-upload-btn');
        const submitPostBtn = document.getElementById('submit-post-btn');
        const videoInput = document.getElementById('video-input');
        const uploadStatus = document.getElementById('upload-status');

        uploadTriggerBtn.addEventListener('click', () => uploadModal.classList.remove('hidden'));
        closeUploadBtn.addEventListener('click', () => uploadModal.classList.add('hidden'));

        submitPostBtn.addEventListener('click', async () => {
            const file = videoInput.files[0];
            if (!file) {
                alert("Please select a video file first.");
                return;
            }

            if(CLOUDINARY_CLOUD_NAME === "YOUR_CLOUD_NAME_HERE") {
                alert("Please set your CLOUDINARY_CLOUD_NAME in the code to enable uploads.");
                return;
            }

            uploadStatus.classList.remove('hidden');
            uploadStatus.textContent = "Uploading to Cloudinary...";
            submitPostBtn.disabled = true;

            // Constructing upload data
            // NOTE: For a secure production app, use an 'upload_preset' for unsigned uploads instead of api_key directly.
            const formData = new FormData();
            formData.append("file", file);
            formData.append("api_key", CLOUDINARY_API_KEY);
            // formData.append("upload_preset", "your_unsigned_preset"); // Recommended approach
            
            try {
                const response = await fetch(CLOUDINARY_UPLOAD_URL, {
                    method: "POST",
                    body: formData
                });
                
                const data = await response.json();
                
                if(data.secure_url) {
                    uploadStatus.textContent = "Upload successful!";
                    uploadStatus.classList.add('text-green-500');
                    console.log("Video URL:", data.secure_url);
                    
                    // Here you would typically save data.secure_url and the caption to your Firebase Firestore database
                    setTimeout(() => {
                        uploadModal.classList.add('hidden');
                        uploadStatus.classList.add('hidden');
                        submitPostBtn.disabled = false;
                        videoInput.value = "";
                    }, 2000);
                } else {
                    throw new Error(data.error?.message || "Upload failed");
                }
            } catch (error) {
                console.error("Upload error:", error);
                uploadStatus.textContent = "Error: " + error.message;
                uploadStatus.classList.add('text-red-500');
                submitPostBtn.disabled = false;
            }
        });

    </script>
</body>
</html>
