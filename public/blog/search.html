<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBlog - Search Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent-color: #C05636;
            --text-main: #1A1A1A;
            --text-muted: #666666;
            --text-faint: #999999;
            --bg-main: #FFFFFF;
            --bg-sidebar: #FDFCFB;
            --bg-navbar: #FFFFFF;
            --border-color: #EAEAEA;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Merriweather', serif;
            color: var(--text-main);
            background-color: var(--bg-main);
            line-height: 1.8;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .navbar {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0;
            background-color: var(--bg-navbar);
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .navbar-left {
            padding-left: 2rem;
        }

        .logo {
            font-weight: 900;
            font-size: 1.1rem;
            color: var(--text-main);
            text-decoration: none;
        }

        .main-content {
            flex: 1;
            padding: 3rem 4rem;
            overflow-y: auto;
        }

        .content-inner {
            max-width: 720px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
        }

        .search-container {
            margin-bottom: 2rem;
        }

        .search-input-full {
            width: 100%;
            padding: 1rem;
            font-size: 1.2rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: sans-serif;
            outline: none;
        }

        .search-input-full:focus {
            border-color: var(--accent-color);
        }

        .results-list {
            list-style: none;
        }

        .result-item {
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .result-item h3 {
            margin-bottom: 0.5rem;
        }

        .result-item p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: var(--text-faint);
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="navbar-left">
            <a href="launch.html" class="logo">EduBlog.</a>
        </div>
    </header>

    <main class="main-content">
        <div class="content-inner">
            <h1>Search Articles</h1>
            
            <div class="search-container">
                <input type="text" id="main-search-input" class="search-input-full" placeholder="Type to search..." autofocus>
            </div>

            <div id="results-count" style="margin-bottom: 1rem; font-size: 0.9rem; color: var(--text-faint);"></div>
            <div id="main-results-list" class="results-list">
                <!-- Results will be injected here -->
            </div>
        </div>
    </main>

    <script src="search-data.js"></script>
    <script>
        const searchInput = document.getElementById('main-search-input');
        const resultsList = document.getElementById('main-results-list');
        const resultsCount = document.getElementById('results-count');

        function performSearch(query) {
            if (!query) {
                resultsList.innerHTML = '';
                resultsCount.textContent = '';
                return;
            }

            const filtered = database.filter(item => 
                item.title.toLowerCase().includes(query.toLowerCase()) || 
                item.snippet.toLowerCase().includes(query.toLowerCase())
            );

            resultsCount.textContent = `Found ${filtered.length} result(s)`;

            if (filtered.length > 0) {
                resultsList.innerHTML = filtered.map(item => `
                    <div class="result-item">
                        <h3><a href="${item.url}">${item.title}</a></h3>
                        <p>${item.snippet}</p>
                    </div>
                `).join('');
            } else {
                resultsList.innerHTML = '<div class="no-results">No matches found.</div>';
            }
        }

        searchInput.addEventListener('input', (e) => {
            performSearch(e.target.value.trim());
        });

        // Check if there's a query param
        const urlParams = new URLSearchParams(window.location.search);
        const q = urlParams.get('q');
        if (q) {
            searchInput.value = q;
            performSearch(q);
        }
    </script>
</body>
</html>
